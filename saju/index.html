<!DOCTYPE html> 
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | V56 초정밀 사주 분석</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9954282181306694" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-base: #05070a; 
            --bg-report: #0a0e14; 
            --border-line: #1f242c; 
            --border-light: #2d333b;
            --gold-primary: #d4af37; 
            --gold-light: #f9e596; 
            --text-main: #d1d5db; 
            --text-muted: #8b949e; 
            --color-danger: #f85149; 
            --color-info: #58a6ff;
            /* 오행 컬러 (Dark Theme) */
            --color-wood: #4ade80; 
            --color-fire: #fb923c; 
            --color-earth: #fbbf24; 
            --color-metal: #cbd5e1; 
            --color-water: #60a5fa;
            
            --wood-bg: rgba(74, 222, 128, 0.1);
            --fire-bg: rgba(251, 146, 60, 0.1);
            --earth-bg: rgba(251, 191, 36, 0.1);
            --metal-bg: rgba(203, 213, 225, 0.1);
            --water-bg: rgba(96, 165, 250, 0.1);
        }
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; word-break: keep-all; -webkit-tap-highlight-color: transparent;}
        body { background: radial-gradient(circle at top, #080b12, #020305); color: var(--text-main); line-height: 1.8; font-size: 16px; overflow-x: hidden; min-height: 100vh;}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .app-container { max-width: 800px; margin: 0 auto; padding: 50px 20px 120px; position: relative; z-index: 1; }
        
        /* ── 홈 화면 UI ── */
        .hero { text-align: center; margin-bottom: 40px; padding: 20px 0;}
        .hero h1 { color: var(--gold-light); font-size: 3.2rem; font-weight: 900; letter-spacing: -2px; margin: 0; text-shadow: 0 0 20px rgba(212,175,55,0.2);}
        
        .input-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-line); border-radius: 20px; padding: 45px 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); backdrop-filter: blur(10px);}
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 0.95rem; }
        .form-control { width: 100%; padding: 16px 20px; border-radius: 10px; border: 1px solid var(--border-light); background: rgba(0,0,0,0.4); color: #fff; font-size: 1.05rem; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--gold-primary); box-shadow: 0 0 15px rgba(212,175,55,0.15); }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn-submit { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--gold-primary), #b8860b); color: #000; padding: 20px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; margin-top: 35px; font-size: 1.25rem; transition: 0.3s; box-shadow: 0 10px 20px rgba(212,175,55,0.2);}
        .btn-submit:hover { background: var(--gold-light); transform: translateY(-3px); box-shadow: 0 15px 30px rgba(212,175,55,0.3); }

        /* ── 리포트 래퍼 ── */
        .report-wrapper { background: var(--bg-report); border: 1px solid var(--border-line); border-radius: 20px; padding: 50px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); margin-bottom: 30px; position: relative; overflow:hidden;}
        
        .r-header { text-align: center; margin-bottom: 45px; padding-bottom: 35px; border-bottom: 1px solid var(--border-line); }
        .r-header h2 { font-size: 2.4rem; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 15px;}
        .date-box { display: inline-block; background: rgba(255,255,255,0.02); border: 1px solid var(--border-light); padding: 15px 30px; border-radius: 15px; }
        .date-box p { color: var(--gold-primary); font-size: 1.05rem; font-weight: 700; margin: 3px 0; letter-spacing: 0.5px;}
        .date-box .lunar { color: var(--text-muted); font-size: 0.95rem; }

        /* ── 명식 테이블 ── */
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 35px; background: rgba(0,0,0,0.4); padding: 25px 15px; border-radius: 16px; border: 1px solid var(--border-line); }
        .bazi-col { text-align: center; display: flex; flex-direction: column; gap: 6px;}
        .bazi-header { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 700;}
        .bazi-char { font-size: 1.9rem; font-weight: 900; color: #fff; padding: 12px 0 6px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid var(--border-light); display:flex; flex-direction:column; align-items:center;}
        .bazi-char-kr { font-size:0.75rem; color:var(--text-muted); font-weight:600; margin-top:2px; letter-spacing:2px; }
        .bazi-ten { font-size: 0.8rem; color: var(--gold-primary); font-weight: bold; }
        .bazi-hidden { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; border-top: 1px dashed var(--border-light); padding-top: 8px; line-height: 1.5;}
        .bazi-day-master { border-color: var(--gold-primary) !important; background: rgba(212,175,55,0.08) !important; color: var(--gold-light) !important; }
        .bazi-day-master .bazi-char-kr { color: rgba(212,175,55,0.6); }

        /* ── 오행 바 차트 ── */
        .bar-wrap { display: flex; align-items: center; margin-bottom: 15px; gap: 15px; }
        .bar-label { width: 60px; font-weight: 900; font-size: 1.05rem; text-align: left; }
        .bar-bg { flex: 1; height: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 1.5s ease-out; }
        .bar-val { width: 45px; text-align: right; font-size: 0.95rem; color: var(--text-muted); font-weight: 700;}
        .fill-wood { background: var(--color-wood); box-shadow: 0 0 10px rgba(74, 222, 128, 0.4); } 
        .fill-fire { background: var(--color-fire); box-shadow: 0 0 10px rgba(251, 146, 60, 0.4); } 
        .fill-earth { background: var(--color-earth); box-shadow: 0 0 10px rgba(251, 191, 36, 0.4); } 
        .fill-metal { background: var(--color-metal); box-shadow: 0 0 10px rgba(203, 213, 225, 0.4); } 
        .fill-water { background: var(--color-water); box-shadow: 0 0 10px rgba(96, 165, 250, 0.4); }

        /* ── 통변 섹션 ── */
        .r-section { background: rgba(255,255,255,0.015); border: 1px solid var(--border-line); border-radius: 20px; padding: 40px 35px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .r-section h3 { font-size: 1.45rem; color: #fff; margin-bottom: 25px; display: flex; align-items: flex-start; gap: 12px; font-weight: 900; border-bottom: 1px solid var(--border-line); padding-bottom: 18px; line-height:1.4;}
        .r-section h3::before { content: ''; display:inline-block; width:6px; height:22px; background:var(--gold-primary); border-radius:3px; margin-top:5px;}
        .r-content { font-size: 1.05rem; line-height: 1.95; color: var(--text-main); text-align: justify; word-break: keep-all;} 
        .r-content p { margin-bottom: 22px; }
        .r-content strong { color: #fff; font-weight: 800; background:rgba(255,255,255,0.05); padding:2px 6px; border-radius:4px;}

        /* ── 토글 박스 (도출 근거 & 용어 해설) ── */
        .proc-toggle { width: 100%; padding: 16px 22px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-line); border-radius: 10px; text-align: left; font-size: 0.95rem; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 700; transition: 0.2s; margin-bottom: 20px; }
        .proc-toggle:hover { background: rgba(255,255,255,0.05); border-color: var(--border-light); color:#fff;}
        .proc-toggle.term-btn { border-left: 3px solid var(--gold-primary); color:var(--gold-light); background:rgba(212,175,55,0.03);}
        .proc-toggle.basis-btn { border-left: 3px solid var(--color-info); color:var(--color-info); background:rgba(88,166,255,0.03);}
        .proc-toggle::before { content: '▼'; font-size: 0.75rem; transition: transform 0.3s; }
        .proc-toggle.open::before { transform: rotate(-180deg); }
        
        .proc-box { display: none; background: rgba(0,0,0,0.4); border: 1px solid var(--border-line); border-radius: 10px; padding: 25px; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.8; color: var(--text-muted); }
        .proc-box.show { display: block; animation: fadeIn 0.4s ease; }
        .proc-box code { background: rgba(255,255,255,0.05); padding: 3px 8px; border-radius: 6px; color: #fff; font-family: monospace; font-size:0.9rem;}

        .term-row { display: flex; gap: 15px; padding: 12px 0; border-bottom: 1px dashed var(--border-line); align-items: flex-start; }
        .term-row:last-child { border-bottom: none; padding-bottom: 0; }
        .term-key { font-weight: 900; color: var(--gold-light); min-width: 90px; font-size: 0.95rem; letter-spacing:1px;}
        .term-val { color: var(--text-main); font-size: 0.95rem; line-height: 1.7; }

        /* ── 대운 스크롤 & 세운 차트 ── */
        .daewun-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 10px 0 25px 0; scroll-snap-type: x mandatory; }
        .daewun-scroll::-webkit-scrollbar { height: 6px; }
        .daewun-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .daewun-scroll::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.4); border-radius: 10px; }
        .daewun-card { flex: 0 0 125px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-line); border-radius: 14px; padding: 25px 10px; text-align: center; scroll-snap-align: start; transition: 0.3s; position: relative;}
        .daewun-card.active { border-color: var(--gold-primary); background: linear-gradient(145deg, rgba(212,175,55,0.15), rgba(0,0,0,0.7)); box-shadow: 0 10px 30px rgba(212,175,55,0.25); transform: translateY(-5px); }
        .daewun-card.active::before { content: '현재 대운'; position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--gold-primary); color: #000; font-size: 0.75rem; font-weight: 900; padding: 4px 12px; border-radius: 20px; white-space: nowrap;}
        .d-age { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; display: block; }
        .d-char { font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: 2px; text-shadow: 0 2px 15px rgba(0,0,0,0.6); display:flex; flex-direction:column;}
        .d-char-kr {font-size:0.8rem; color:var(--text-muted); font-weight:600; letter-spacing:4px;}
        .d-ten { font-size: 0.85rem; color: var(--gold-light); margin-top: 12px; display: block; font-weight: 700; }

        .chart-wrap { position: relative; height: 280px; margin: 30px 0; }
        
        .yr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 10px; margin-top: 25px; }
        .yr-cell { text-align: center; padding: 15px 8px; border: 1px solid var(--border-line); border-radius: 10px; background: rgba(0,0,0,0.4); position: relative; }
        .yr-cell.now { border-color: var(--gold-primary); background: rgba(212,175,55,0.08); }
        .yc-yr { font-size: 0.85rem; color: var(--text-muted); font-weight: 800; }
        .yc-bar { height: 5px; margin: 10px 0; background: var(--border-line); border-radius: 3px; overflow: hidden; }
        .yc-fill { height: 100%; border-radius: 3px; }
        .yc-num { font-size: 1rem; font-weight: 900; }
        .yc-ganzhi { font-size: 0.85rem; font-weight: 700; margin-top: 5px; color: #fff;}

        /* ── 형충파해 테이블 ── */
        .csp-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; margin-top: 20px; }
        .csp-table th { background: rgba(0,0,0,0.6); color: var(--gold-light); padding: 15px; text-align: left; font-weight: 800; border-bottom: 1px solid var(--border-line); font-size: 0.9rem;}
        .csp-table td { padding: 16px 15px; border-bottom: 1px solid var(--border-line); vertical-align: top; line-height: 1.7; }
        .csp-badge { display: inline-block; font-size: 0.8rem; font-weight: 800; padding: 5px 10px; border-radius: 6px; }
        .cb-chung { background: var(--fire-bg); color: var(--color-fire); border: 1px solid var(--color-fire); }
        .cb-hyeong { background: var(--earth-bg); color: var(--color-earth); border: 1px solid var(--color-earth); }
        .cb-pa { background: var(--metal-bg); color: var(--color-metal); border: 1px solid var(--color-metal); }
        .cb-hae { background: var(--water-bg); color: var(--color-water); border: 1px solid var(--color-water); }
        .cb-hap { background: var(--wood-bg); color: var(--color-wood); border: 1px solid var(--color-wood); }
        .cb-kiban { background: rgba(139,148,158,0.1); color: var(--text-muted); border: 1px solid var(--border-light); }

        /* ── 행운 요소 박스 ── */
        .lucky-grid { display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin: 25px 0;}
        .lucky-item { background: rgba(255,255,255,0.02); border:1px solid var(--border-line); padding:20px; border-radius:12px; text-align:center;}
        .lucky-icon { font-size: 2rem; margin-bottom:10px; display:block;}
        .lucky-title { font-size:0.85rem; color:var(--text-muted); font-weight:700; margin-bottom:5px; letter-spacing:2px;}
        .lucky-val { font-size:1.1rem; color:#fff; font-weight:900;}

        /* ── 하단 버튼 ── */
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 40px; }
        .btn-tool { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); color: #fff; padding: 22px; border-radius: 14px; font-size: 1.15rem; font-weight: 700; border: 1px solid var(--border-line); cursor: pointer; transition: 0.3s; width: 100%;}
        .btn-tool:hover { background: rgba(255,255,255,0.08); border-color: var(--border-light);}
        .btn-home { display: flex; align-items: center; justify-content: center; background: var(--border-light); color: #fff; padding: 22px; border-radius: 14px; font-weight: 800; border: none; width: 100%; cursor: pointer; font-size: 1.2rem; transition: 0.3s; margin-top:10px;}
        .btn-home:hover { background: var(--text-muted); color:#000;}

        /* ── 로더 ── */
        #loader { display: none; position: fixed; inset: 0; background: rgba(2,3,5,0.98); z-index: 100000; flex-direction: column; justify-content: center; align-items: center;} 
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite; margin-bottom:30px;} 
        .loading-txt { color: var(--gold-light); font-size: 1.2rem; font-weight: 800; letter-spacing: 2px;}
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .modal { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #161b22; color: #fff; padding: 25px; border-radius: 16px; z-index: 100001; text-align: center; width: 90%; max-width: 350px; border: 1px solid var(--border-line); box-shadow: 0 20px 50px rgba(0,0,0,0.9);}
        
        @media (max-width: 600px) { 
            .report-wrapper { padding: 40px 20px; border-radius:0; border-left:none; border-right:none;} 
            .grid-row, .grid-half { grid-template-columns: 1fr; }
            .bazi-grid { gap: 6px; padding: 20px 8px; }
            .bazi-char { font-size: 1.5rem; padding: 10px 0; }
            .bazi-char-kr { font-size: 0.7rem; letter-spacing:1px; margin-top:0;}
            .r-section { padding: 30px 20px; border-radius: 16px;}
            .lucky-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-text" class="loading-txt">V56 운명 궤적 추적 중...</div>
</div>

<div id="custom-modal" class="modal">
    <h3 id="modal-title" style="margin-bottom:10px; font-size:1.15rem; color:var(--color-danger); font-weight:900;">System</h3>
    <p id="modal-msg" style="margin-bottom:20px; font-size:1rem; color:var(--text-main); line-height:1.6;"></p>
    <button onclick="document.getElementById('custom-modal').style.display='none'" style="background:var(--gold-primary); color:#000; border:none; padding:12px 30px; border-radius:10px; font-weight:800; cursor:pointer; font-size:1.05rem; width:100%;">확인</button>
</div>

<div class="app-container">
    <div id="input-view">
        <div class="hero">
            <h1>운명뿌리</h1>
            <p style="color:var(--text-muted); margin-top:15px; font-size:1.05rem; letter-spacing:1px;">당신의 진짜 궤적을 읽어냅니다.</p>
        </div>
        
        <div class="input-card">
            <div class="form-group">
                <label>이름 / 별명</label>
                <input type="text" id="user-name" class="form-control" placeholder="홍길동">
            </div>
            <div class="form-group">
                <label>생년월일</label>
                <div class="grid-row">
                    <select id="user-year" class="form-control"></select>
                    <select id="user-month" class="form-control"></select>
                    <select id="user-day" class="form-control"></select>
                </div>
            </div>
            <div class="form-group grid-half">
                <div>
                    <label>성별</label>
                    <select id="user-gender" class="form-control">
                        <option value="male">남성(男)</option>
                        <option value="female">여성(女)</option>
                    </select>
                </div>
                <div>
                    <label>역법</label>
                    <select id="user-cal" class="form-control">
                        <option value="solar">양력</option>
                        <option value="lunar">음력</option>
                    </select>
                </div>
            </div>
            <div class="form-group" style="margin-top:15px;">
                <label>태어난 시각 <span style="font-size:0.85rem; font-weight:400; color:var(--gold-primary);">(정밀 통변 필수)</span></label>
                <select id="user-time" class="form-control">
                    <option value="none">모름 / 미정 (3주 6자로 분석)</option>
                    <option value="yaja">야자시 23:30~01:29 (子)</option>
                    <option value="joja">조자시 00:00~01:29 (子)</option>
                    <option value="2">축시 01:30~03:29 (丑)</option>
                    <option value="4">인시 03:30~05:29 (寅)</option>
                    <option value="6">묘시 05:30~07:29 (卯)</option>
                    <option value="8">진시 07:30~09:29 (辰)</option>
                    <option value="10">사시 09:30~11:29 (巳)</option>
                    <option value="12">오시 11:30~13:29 (午)</option>
                    <option value="14">미시 13:30~15:29 (未)</option>
                    <option value="16">신시 15:30~17:29 (申)</option>
                    <option value="18">유시 17:30~19:29 (酉)</option>
                    <option value="20">술시 19:30~21:29 (戌)</option>
                    <option value="22">해시 21:30~23:29 (亥)</option>
                </select>
            </div>
            <button class="btn-submit" onclick="SaaSFrontend.requestReport()">초정밀 운명 스캔 시작</button>
        </div>
    </div>

    <div id="report-view" style="display:none;">
        <div class="report-wrapper" id="capture-target">
            <div class="r-header">
                <h2 id="r-title-name">운명 분석 리포트</h2>
                <div class="date-box">
                    <p id="r-title-date-solar"></p>
                    <p id="r-title-date-lunar" class="lunar"></p>
                </div>
            </div>

            <div class="bazi-grid" id="r-bazi-grid"></div>
            
            <div id="dynamic-sections"></div>

            <div id="cta-container"></div>

        </div>

        <div class="controls animate-fade">
            <button class="btn-tool" onclick="SaaSFrontend.shareLink()">🔗 사이트 링크 공유하기</button>
            <button class="btn-home" onclick="SaaSFrontend.goHome()">🏠 처음으로 돌아가기</button>
        </div>
    </div>
</div>

<script>
/**
 * UI 토글 동작 헬퍼
 */
function toggleProc(id){
    const box = document.getElementById(id);
    const btn = document.getElementById('btn-'+id);
    if(!box || !btn) return;
    box.classList.toggle('show');
    btn.classList.toggle('open');
}

/**
 * ============================================================================
 * 🔒 [SERVER-SIDE CODE] : V56 초정밀 백엔드 코어 엔진
 * ============================================================================
 */
const OrthodoxEngine = (() => {

            "火": "심장 펌핑, 혈액순환에 신경 써야 합니다. 스트레스로 쌓인 내면의 열기를 가라앉히는 조용한 명상과 충분한 수면 시간의 확보가 필수적입니다.", 
            "土": "소화기 계통이 예민해져 스트레스를 받으면 위장병이 생기기 쉽습니다. 과식을 피하고 규칙적이고 소식하는 식습관 유지와 가벼운 산책이 매우 중요합니다.", 
            "金": "폐, 대장, 호흡기 및 피부 질환에 취약할 수 있습니다. 건조한 환경을 피하고 실내 습도를 잘 맞추며 맑은 공기를 들이마시는 유산소 운동이 큰 도움이 됩니다.", 
            "水": "신장, 방광 등 하복부 생식기 계통을 항상 따뜻하게 보호해야 강한 면역력을 유지할 수 있으며, 차가운 음식을 피하고 수분 밸런스를 맞춰야 합니다." 
        }
    };

    // 3. 엔진 핵심 연산 함수 모음
    const getTenGod = (dayMaster, targetChar) => {
        if (!dayMaster || !targetChar || targetChar === '-' || dayMaster === '-') return '-';
        const dmEl = ELEMENTS[dayMaster]; const dPol = YIN_YANG[dayMaster];
        let tgEl, tgPol;
        if (ELEMENTS[targetChar] && !MAIN_QI[targetChar]) { tgEl = ELEMENTS[targetChar]; tgPol = YIN_YANG[targetChar]; } 
        else if (MAIN_QI[targetChar]) { const mainQi = MAIN_QI[targetChar]; tgEl = ELEMENTS[mainQi]; tgPol = YIN_YANG[mainQi]; } 
        else { return '-'; }
        if (!dmEl || !tgEl) return '-';
        const suffix = (dPol === tgPol) ? 'same' : 'diff';
        if (dmEl === tgEl) return TEN_GODS_NAME[`same_${suffix}`];
        if (RELATIONS[dmEl].genBy === tgEl) return TEN_GODS_NAME[`genBy_${suffix}`];
        if (RELATIONS[dmEl].gen === tgEl) return TEN_GODS_NAME[`gen_${suffix}`];
        if (RELATIONS[dmEl].ctrlBy === tgEl) return TEN_GODS_NAME[`ctrlBy_${suffix}`];
        if (RELATIONS[dmEl].ctrl === tgEl) return TEN_GODS_NAME[`ctrl_${suffix}`];
        return '-';
    };

    const MultiplierEngine = {
        getWangSang(monthEl, targetEl) {
            if (!monthEl || !targetEl) return 1.0;
            const rel = RELATIONS[monthEl];
            if (monthEl === targetEl) return 2.0; 
            if (rel.gen === targetEl) return 1.5; 
            if (rel.genBy === targetEl) return 0.8; 
            if (rel.ctrlBy === targetEl) return 0.5; 
            if (rel.ctrl === targetEl) return 0.2; 
            return 1.0;
        }
    };

    const calculateOhaengScores = (bazi) => {
        let scores = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
        const monthEl = ELEMENTS[MAIN_QI[bazi.monthZhi]]; 
        const addScore = (char, weight) => {
            if(!char || char === '-') return;
            const el = ELEMENTS[char];
            if(el) scores[el] += (weight * MultiplierEngine.getWangSang(monthEl, el));
        };
        addScore(bazi.stems[0], 10); addScore(bazi.stems[1], 10); addScore(bazi.stems[2], 10); addScore(bazi.stems[3], 10);
        bazi.branches.forEach((b, i) => {
            if (b === '-') return;
            addScore(MAIN_QI[b], i === 1 ? 35 : 15);
            const hidden = HIDDEN_STEMS[b];
            if(hidden) { if(hidden[0] !== '-') addScore(hidden[0], 2); if(hidden[1] !== '-') addScore(hidden[1], 4); }
        });
        const total = Object.values(scores).reduce((a,b)=>a+b, 0) || 1;
        for (let key in scores) scores[key] = Math.round((scores[key] / total) * 100);
        return scores;
    };

    // 💡 결단력 텍스트 수정 적용 완료
    const getOhaengDesc = (scores) => {
        let maxEl = '', minEl = '', maxSc = -1, minSc = 999;
        for(let el in scores) {
            if(scores[el] > maxSc) { maxSc = scores[el]; maxEl = el; }
            if(scores[el] < minSc) { minSc = scores[el]; minEl = el; }
        }
        const O_DESC = {
            '木': { max: "위로 뻗어 나가는 강한 추진력과 호기심, 생장하는 에너지가 탁월합니다.", min: "새로운 시작을 주도하는 추진력과 호기심이 살아나 생동감을 얻게 됩니다." },
            '火': { max: "세상을 밝히는 열정과 화려함, 타인을 매료시키는 표현력이 압도적입니다.", min: "숨겨진 열정이 깨어나고 자신을 밖으로 표현하는 데 자신감이 생깁니다." },
            '土': { max: "흔들림 없는 안정감과 모든 것을 포용하는 넓은 마음으로 신뢰를 얻습니다.", min: "방황을 멈추고 삶의 든든한 중심과 안정감을 찾게 됩니다." },
            '金': { max: "불의를 참지 않는 정의감과 결단력, 예리한 실행력이 돋보입니다.", min: "단호한 결단력이 생겨 우유부단함과 인간관계의 피로에서 벗어날 수 있습니다." }, 
            '水': { max: "어떤 환경에도 스며드는 유연함과 타인을 이해하는 깊은 지혜를 갖추었습니다.", min: "상황에 대처하는 유연함과 타인을 수용하는 넓은 지혜를 갖추게 됩니다." }
        };
        return `당신을 지배하는 가장 강력한 기운과 가장 부족한 기운의 극명한 대비는, 삶을 관통하는 다음과 같은 심리적 기질을 만들어냅니다.<br><br><b>[가장 발달한 ${maxEl}(${HANGUL_MAP[maxEl]})의 긍정적 잠재력 및 경계점]</b><br>${O_DESC[maxEl].max}<br><br><b>[가장 결핍된 ${minEl}(${HANGUL_MAP[minEl]}) 보완 시 얻게 될 효과]</b><br>${O_DESC[minEl].min}`;
    };

    const applyHapAndChung = (branches, monthZhi, scObj) => {
        const b = branches.filter(x => x !== '-');
        const hapList = []; const cspList = []; const usedChars = new Set();
        const mEl = ELEMENTS[MAIN_QI[monthZhi]]; let sc = { ...scObj };

        for (const [combo, resEl] of Object.entries(DB_HAP_BANG)) {
            const cs = combo.split('');
            if (cs.every(c => b.includes(c))) {
                cs.forEach(c => { usedChars.add(c); });
                hapList.push({ type: '방합(方合)', chars: combo.split('').map(x=>`${x}(${HANGUL_MAP[x]})`).join(''), result: `${resEl}(${HANGUL_MAP[resEl]})` });
            }
        }
        for (const [combo, resEl] of Object.entries(DB_HAP3)) {
            const cs = combo.split('');
            if (cs.length === 3 && cs.every(c => b.includes(c) && !usedChars.has(c))) {
                cs.forEach(c => { usedChars.add(c); });
                hapList.push({ type: '삼합(三合)', chars: combo.split('').map(x=>`${x}(${HANGUL_MAP[x]})`).join(''), result: `${resEl}(${HANGUL_MAP[resEl]})` });
            }
        }
        for (let i = 0; i < b.length; i++) {
            for (let j = i + 1; j < b.length; j++) {
                const c1 = b[i], c2 = b[j];
                if (usedChars.has(c1) || usedChars.has(c2)) continue;
                const resEl = DB_HAP6[c1 + c2] || DB_HAP6[c2 + c1];
                if (resEl) {
                    const isHwa = (mEl === resEl) || (sc[resEl] > 25);
                    if (isHwa) hapList.push({ type: '육합(합화)', chars: `${c1}(${HANGUL_MAP[c1]})${c2}(${HANGUL_MAP[c2]})`, result: `${resEl}(${HANGUL_MAP[resEl]})` });
                    else hapList.push({ type: '육합(기반)', chars: `${c1}(${HANGUL_MAP[c1]})${c2}(${HANGUL_MAP[c2]})`, result: '무효' });
                    usedChars.add(c1); usedChars.add(c2);
                }
            }
        }
        const chungUsed = new Set();
        for (let i = 0; i < b.length; i++) {
            for (let j = i + 1; j < b.length; j++) {
                const c1 = b[i], c2 = b[j];
                if (DB_CHUNG[c1] === c2 && !chungUsed.has(c1+c2)) {
                    if (usedChars.has(c1) || usedChars.has(c2)) cspList.push({ type: '충(해소)', chars: `${c1}↔${c2}`, desc: '합(合)으로 묶여 충이 무효화(탐합망충) 되었습니다.', severity: 'low' });
                    else cspList.push({ type: '충(沖)', chars: `${c1}↔${c2}`, desc: `정면으로 상충합니다. 극적인 변동성이 나타납니다.`, severity: 'high' });
                    chungUsed.add(c1+c2); chungUsed.add(c2+c1);
                }
            }
        }
        return { hapList, cspList };
    };

    const calcYearScore = (bazi, yongEl, kiEl, birthYear, daewoons) => {
        const curYr = new Date().getFullYear();
        const graph = [];
        for (let yr = curYr - 2; yr <= curYr + 8; yr++) {
            let ipDate = new Date(yr, 1, 4); 
            try { const terms = window.Solar.fromYmd(yr, 2, 1).getTermsInYear(); if(terms){ const ip = terms.find(t=>t.getName()==='立春'); if(ip) ipDate = new Date(ip.getYear(), ip.getMonth()-1, ip.getDay()); } } catch(e){}
            
            const seunL = window.Lunar.fromDate(new Date(ipDate.getTime() + 864e5));
            const sg = seunL.getYearGan(), sz = seunL.getYearZhi();
            const sEl = ELEMENTS[sg], sZEl = ELEMENTS[sz];
            const age = yr - birthYear;
            const currentDw = daewoons.find(d => age >= d.startAge && age <= d.endAge) || daewoons[0];
            const dwEl = ELEMENTS[currentDw.zhi];

            let bonus = 0;
            if (sEl === yongEl) bonus += 15; if (sZEl === yongEl) bonus += 15;
            if (sEl === kiEl) bonus -= 15; if (sZEl === kiEl) bonus -= 15;
            if (dwEl === yongEl && sZEl === yongEl) bonus += 10;
            if (dwEl === kiEl && sZEl === kiEl) bonus -= 10;
            if (DB_CHUNG[currentDw.zhi] === sz) bonus -= 12; 
            
            const sajuB = bazi.branches.filter(x => x !== '-');
            sajuB.forEach(b => { if (DB_CHUNG[b] === sz) bonus -= 8; });
            
            const score = Math.round(Math.max(10, Math.min(93, 50 + bonus)));
            graph.push({ year: yr, score, isBroken: score < 33, isPeak: score >= 68, seunGan: sg, seunZhi: sz, ipchunDate: `${ipDate.getMonth()+1}/${ipDate.getDate()}` });
        }
        return graph;
    };

    // 💡 에러의 원인이었던 명식 구조 도출 함수!
    const determineStructure = (bazi) => {
        const hidden = HIDDEN_STEMS[bazi.monthZhi];
        if(!hidden) return { name: "불명격", basis: "월지가 불분명하여 격을 잡기 어렵습니다.", type: "-" };
        let projectingChar = null;
        for (let hs of [hidden[2], hidden[1], hidden[0]]) { if (hs !== '-' && bazi.stems.includes(hs)) { projectingChar = hs; break; } }
        if (!projectingChar) projectingChar = MAIN_QI[bazi.monthZhi]; 
        const tg = getTenGod(bazi.dayGan, projectingChar);
        
        let basis = `월지 <b>${bazi.monthZhi}(${HANGUL_MAP[bazi.monthZhi]})</b>의 지장간 중 핵심 세력인 <b>${projectingChar}(${HANGUL_MAP[projectingChar]})</b>이(가) 일간과 작용하여 <b>${tg}</b>의 기운을 가장 강력하게 뿜어냅니다.`;
        
        let typeGroup = "-";
        if (tg.includes('비견') || tg.includes('겁재')) typeGroup = "비겁";
        else if (tg.includes('식신') || tg.includes('상관')) typeGroup = "식상";
        else if (tg.includes('정재') || tg.includes('편재')) typeGroup = "재성";
        else if (tg.includes('정관') || tg.includes('편관')) typeGroup = "관성";
        else if (tg.includes('정인') || tg.includes('편인')) typeGroup = "인성";

        if (tg === '비견') return { name: "건록격", basis, type: typeGroup };
        if (tg === '겁재') return { name: "양인격", basis, type: typeGroup };
        if (tg !== '-') return { name: `${tg}격`, basis, type: typeGroup };
        return { name: "중화잡격", basis: "오행이 고르게 섞여 밸런스를 맞춘 구조입니다.", type: "-" };
    };

    const determineYongshin = (bazi, scores) => {
        const dmEl = ELEMENTS[bazi.dayGan] || '木';
        const isWinter = ['亥', '子', '丑'].includes(bazi.monthZhi);
        const isSummer = ['巳', '午', '未'].includes(bazi.monthZhi);
        
        if (isWinter) return { el: '火', ki: '水', method: '조후(調候)', reason: '혹한기 사주로 얼어붙은 기운을 녹이는 화(火) 보완이 최우선입니다.', isStrong: null };
        if (isSummer) return { el: '水', ki: '火', method: '조후(調候)', reason: '폭염기 사주로 극악한 열기를 식히는 수(水) 보완이 최우선입니다.', isStrong: null };
        
        const dmScore = scores[dmEl] || 0;
        const isStrong = dmScore > 22;
        if (isStrong) return { el: RELATIONS[dmEl].ctrlBy || '金', ki: dmEl, method: '억부(抑扶)', reason: `강한 일간 에너지를 적절히 통제하는 기운이 유리합니다.`, isStrong };
        else return { el: RELATIONS[dmEl].genBy || '水', ki: RELATIONS[dmEl].ctrlBy, method: '억부(抑扶)', reason: `약한 일간 에너지를 든든하게 생부(生扶)해 주는 기운이 유리합니다.`, isStrong };
    };

    const scanShinsal = (stems, branches, dZ, dG) => {
        const abyss = [];
        const pillars = [stems[0]+branches[0], stems[1]+branches[1], stems[2]+branches[2], stems[3]+branches[3]];
        const BAEKHO = ['甲辰','乙未','丙戌','丁丑','戊辰','壬戌','癸丑'];
        const SAMHYUNG = [['寅','巳','申'], ['丑','戌','未']];
        const WONJIN = ['子未','丑午','寅酉','卯申','辰亥','巳戌','午丑','未子','申卯','酉寅','戌巳','亥辰'];
        const GWIMUN = ['子酉','丑午','寅未','卯申','辰亥','巳戌','酉子','午丑','未寅','申卯','亥辰','戌巳'];
        const GOEGANG = ['庚辰','庚戌','壬辰','壬戌','戊戌'];

        if(pillars.some(p => BAEKHO.includes(p))) abyss.push({name:'백호대살(白虎大殺)', desc:'극한의 위기나 피말리는 스트레스 앞에서도 절대 굴하지 않고 뚫고 나가는 폭발적인 돌파력과 프로페셔널한 기질을 지녔습니다. 억눌린 분노 관리가 필수적입니다.'});
        if(pillars.some(p => GOEGANG.includes(p))) abyss.push({name:'괴강살(魁罡殺)', desc:'무리를 뚫고 우두머리가 되려는 압도적인 기백과 총명함이 깃들어 있습니다. 타인의 지배를 받기 싫어하며 독립적으로 판을 뒤집는 카리스마를 발산합니다.'});
        if(SAMHYUNG.some(set => set.every(z => branches.includes(z)))) abyss.push({name:'삼형살(三刑殺)', desc:'강력한 에너지가 서로 깎아내고 조정하는 날카로운 형국으로, 법, 규칙, 정밀한 기술 분야에서 압도적인 능력을 발휘하는 양날의 검입니다.'});
        
        const hasYeongma = branches.some(z => ['寅','申','巳','亥'].includes(z));
        if(hasYeongma) abyss.push({name:'역마살(驛馬殺)', desc:'한 곳에 정체되는 것을 극도로 거부하며, 역동적인 이동과 변화 속에서 오히려 큰 기회와 재물을 마주하게 되는 활동적 에너지입니다.'});
        const hasDohwa = branches.some(z => ['子','午','卯','酉'].includes(z));
        if(hasDohwa) abyss.push({name:'도화살(桃花殺)', desc:'가만히 있어도 타인의 시선과 관심을 강하게 끌어당기는 치명적인 매력이 잠재되어 있습니다. 이 에너지를 무대 위나 대인관계에서 긍정적으로 발산하면 엄청난 무기가 됩니다.'});
        const hasHwagae = branches.some(z => ['辰','戌','丑','未'].includes(z));
        if(hasHwagae) abyss.push({name:'화개살(華蓋殺)', desc:'화려함을 덮고 고독한 내면 세계로 파고드는 깊은 사색의 기운입니다. 철학, 예술, 종교 등 남들이 범접할 수 없는 깊이 있는 영적/학문적 천재성을 폭발시킬 수 있습니다.'});

        branches.forEach(z => {
            if (z !== '-' && dZ !== z) {
                if (WONJIN.includes(dZ+z) && !abyss.some(a=>a.name.includes('원진'))) abyss.push({name:'원진살(怨嗔殺)', desc:'사물의 이면을 예리하게 캐치하는 고도의 통찰력이 있으나, 가까운 사람과 까닭 없는 애증이 발생하기 쉬운 예민한 기운입니다.'});
                if (GWIMUN.includes(dZ+z) && !abyss.some(a=>a.name.includes('귀문'))) abyss.push({name:'귀문관살(鬼門關殺)', desc:'남들이 보지 못하는 것을 꿰뚫어 보는 비상한 영감과 고도의 직관력이 존재합니다. 아이디어 기획 분야에서 신의 경지에 오를 수 있습니다.'});
            }
        });
        return abyss;
    };

    const getWounsung = (dayGan, zhi) => {
        if (!dayGan || !zhi || zhi === '-') return '-';
        const w12Arr = W12_MAP[dayGan]; if (!w12Arr) return '-';
        const idx = w12Arr.indexOf(zhi); return idx !== -1 ? W12_NAMES[idx] : '-';
    };

    const getGongmang = (dayGan, dayZhi) => {
        const ganIdx = '甲乙丙丁戊己庚辛壬癸'.indexOf(dayGan);
        const zhiIdx = '子丑寅卯辰巳午未申酉戌亥'.indexOf(dayZhi);
        if(ganIdx===-1 || zhiIdx===-1) return [];
        let diff = zhiIdx - ganIdx; if(diff < 0) diff += 12;
        const branches = '子丑寅卯辰巳午未申酉戌亥';
        return [branches.charAt((diff+10)%12), branches.charAt((diff+11)%12)];
    };
    const generateHapChungStory = (stems, branches) => {
        const findings = [];
        const stemHap = { '甲己':'천간합', '乙庚':'천간합', '丙辛':'천간합', '丁壬':'천간합', '戊癸':'천간합' };
        const branchChung = ['子午', '丑未', '寅申', '卯酉', '辰戌', '巳亥'];

        const dayGan = stems[2], dayZhi = branches[2];

        stems.forEach((gan, idx) => {
            if (idx !== 2 && gan !== '-') {
                if (stemHap[dayGan + gan] || stemHap[gan + dayGan]) findings.push({ type: '합', target: idx === 0 ? '초년/조상' : (idx === 1 ? '사회/부모' : '말년/자식') });
            }
        });

        branches.forEach((zhi, idx) => {
             if (idx !== 2 && zhi !== '-') {
                 const pair = dayZhi + zhi;
                 if (branchChung.includes(pair) || branchChung.includes(zhi + dayZhi)) findings.push({ type: '충', target: idx === 0 ? '초년/조상' : (idx === 1 ? '사회/부모' : '말년/자식') });
             }
        });

        if(findings.length === 0) {
            return "당신의 궤적은 큰 요동이나 파괴 없이, 깊고 고요한 강물처럼 묵직한 안정감을 유지하며 흘러갑니다. 극적인 위기가 적은 대신 스스로 변화를 주도해야 하는 사명감을 쥐고 있습니다.";
        }
        
        let story = "과거의 기억과 앞으로 다가올 시간들을 짚어보면, 당신의 운명에는 강렬한 끌림과 피할 수 없는 부딪힘이 교차하는 드라마틱한 변곡점들이 짙게 새겨져 있습니다.<br><br>";
        findings.forEach(f => {
            if(f.type === '합') story += `<b>[운명적 결속 : ${f.target}과의 합]</b><br>마치 자석의 양극이 만나듯, 당신의 이성과 목표는 특정 시기와 인연에 불가항력적으로 묶여 들어가는 깊은 서사를 지니고 있습니다. 이는 단순한 우연이 아니라, 당신의 영혼이 진정으로 갈망하는 방향으로 삶의 닻을 내리려는 묵직한 이끌림입니다.<br><br>`;
            if(f.type === '충') story += `<b>[피할 수 없는 격랑 : ${f.target}과의 충]</b><br>잔잔한 수면에 거대한 바위가 떨어지듯, 당신이 굳게 뿌리내린 현실의 환경에서 예기치 못한 강렬한 충돌이 일어나는 순간이 존재합니다. 하지만 이 부서짐은 결코 파멸을 의미하지 않습니다. 낡고 굳어버린 껍데기를 깨부수고 나와, 완전히 새로운 세계를 맞이하기 위해 당신이 반드시 겪어내야만 했던 눈부신 성장의 진통입니다.<br><br>`;
        });
        return story;
    };

    // 💡 [동적 텍스트 결합 로직]
    const dynamicReading = (bazi, scores, struct, yong, category) => {
        const dmEl = ELEMENTS[bazi.dayGan];
        const isStrong = yong.isStrong;
        const tgStr = struct.type;

        let content = "";

        if (category === 'early') {
            content += `당신의 유년과 청년기를 지배하는 에너지는 <b>${bazi.stems[0]}(${HANGUL_MAP[bazi.stems[0]]})</b>와 <b>${bazi.branches[0]}(${HANGUL_MAP[bazi.branches[0]]})</b>의 파동입니다. 이 시기에는 환경의 변화에 몹시 민감하게 반응하며, 내면에 깃든 ${HANGUL_MAP[dmEl]}의 본능이 처음으로 세상을 향해 껍질을 깨고 나오는 진통을 겪습니다.<br><br>`;
            if (isStrong) content += `자아(自我)의 기운이 강하게 타고났기에, 남들의 간섭이나 엄격한 규율 속에서는 오히려 반항심이 커지고 재능이 억눌립니다. 스스로 부딪히고 실패하며 깨달음을 얻는 자율적인 방목형 환경이 주어졌을 때 비로소 내재된 천재성이 발현되기 시작합니다. 일찍부터 승부욕과 주관이 확고해져 또래 사이에서 묘한 리더십을 발휘했을 가능성이 높습니다.<br><br>`;
            else content += `자아의 기운이 세상을 향해 조심스럽게 나아가는 형태이기에, 초년기에는 주변 환경이나 멘토(부모, 스승)의 질적인 수준이 당신의 가치관 형성에 절대적인 영향을 미칩니다. 타인의 감정을 예민하게 읽어내는 스펀지 같은 수용력이 돋보이며, 자신을 안전하게 보호해 주는 울타리 안에서 내면의 깊고 풍요로운 상상력을 키워나가는 은밀한 시기입니다.<br><br>`;
            content += DB_LIFETIME.e[dmEl] + `<br><br>인생의 첫 단추를 채우는 이 시기에 마주한 수많은 콤플렉스와 결핍감조차도, 당신의 거대한 운명의 수레바퀴를 굴리기 위해 뼈대에 새겨넣은 필연적인 담금질의 과정이었습니다.`;
        }
        else if (category === 'mid') {
            content += `청년을 지나 사회의 한복판으로 뛰어드는 이 시기, 당신의 운명은 월주(月柱)에 각인된 <b>${struct.name}</b>의 거대한 지배를 받으며 폭발적으로 확장됩니다. 이제 무대는 준비되었고, 당신이 품어온 야심을 현실의 물질과 권력으로 치환해 내야 하는 치열한 전투가 시작됩니다.<br><br>`;
            if (tgStr === '식상' || tgStr === '재성') content += `당신의 능력은 고여있지 않고 세상을 향해 거칠게 뻗어 나갑니다. 타인의 니즈를 읽고 새로운 가치를 창출하는 감각이 절정에 달하며, 이 과정에서 필연적으로 다양한 인간 군상과 얽히게 됩니다. 재물의 흐름이 가장 역동적으로 요동치는 시기이며, 이때 쟁취한 결과물이 남은 인생의 등급을 결정짓는 잣대가 됩니다.<br><br>`;
            else if (tgStr === '관성' || tgStr === '인성') content += `당신은 무질서한 세상 속에서 확고한 자신의 자리를 세우는 데 모든 에너지를 쏟아붓습니다. 뼈를 깎는 수양과 인내를 통해 사회적 시스템 안에서 남들이 함부로 대할 수 없는 묵직한 권력을 손에 쥐게 됩니다. 찰나의 화려함보다는 늙지 않는 불멸의 가치와 명예를 축적하는 숭고한 시기입니다.<br><br>`;
            else content += `누구에게도 의존하지 않고 오직 나의 주먹과 실력만으로 척박한 땅을 개척해 나갑니다. 치열한 경쟁 속에서 수차례 엎어지고 다시 일어나는 과정에서, 세상 그 누구도 꺾을 수 없는 강철 같은 자생력이 완성됩니다.<br><br>`;
            content += DB_LIFETIME.m[dmEl] + `<br><br>이 시기의 가장 큰 과제는 <b>용신인 ${yong.el}(${HANGUL_MAP[yong.el]})</b>의 기운을 삶 속에 적극적으로 끌어들여, 폭주하는 에너지를 제어하고 스스로의 멘탈을 다스리는 것입니다.`;
        }
        else if (category === 'late') {
            content += `모든 전투가 끝난 후, 인생의 황혼을 관장하는 시주(時柱)의 기운이 묵직하게 내려앉습니다. 세파에 시달리며 단단해진 당신의 영혼은 물질적 집착을 넘어 정신적인 해탈과 완성을 향해 방향을 틉니다.<br><br>`;
            if (yong.el === dmEl || yong.el === RELATIONS[dmEl].genBy) content += `젊은 시절 세상을 향해 끝없이 퍼주었던 에너지가 마침내 당신에게 돌아와 평온한 안식처를 제공합니다. 주변의 자잘한 풍파에 흔들리지 않으며, 그동안 축적한 깊은 철학적 지혜를 무기로 타인에게 존경받는 평화롭고 고즈넉한 노후를 맞이합니다.<br><br>`;
            else content += `나이가 무색할 만큼 마지막 순간까지도 세상을 향한 호기심과 영향력을 놓지 않습니다. 뒷방으로 물러나기보다는 당신이 이룩한 제국을 통제하고 권위 있는 멘토로서 남은 여생을 화려하고 꼿꼿하게 불태웁니다.<br><br>`;
            content += DB_LIFETIME.l[dmEl] + `<br><br>이 시기 당신이 남기는 족적은 곧 다음 세대에게 이정표가 될 것입니다.`;
        }
        else if (category === 'career') {
            content += `직업은 당신의 운명을 깎아내는 가장 예리한 조각칼입니다. 사주의 뼈대인 <b>${struct.name}</b>의 성향이 당신의 일터에서 가장 완벽한 형태로 투영될 때, 당신의 사회적 가치는 상상을 초월하게 증폭됩니다.<br><br>`;
            if (tgStr === '비겁') content += `당신은 프리랜서, 전문기술직, 자영업 등 '내가 곧 회사'가 되는 독립적인 환경에서 신의 능력을 발휘합니다. 위계질서가 강한 곳에서는 숨이 막힙니다. 스스로 룰을 세우고 돌파하십시오.<br><br>`;
            else if (tgStr === '식상') content += `언론, 미디어, 예술, 기획, IT개발 등 세상에 없는 무언가를 빚어내는 크리에이터의 직군이 천직입니다. 당신의 아이디어가 억눌리지 않는 자율적인 무대가 필수적입니다.<br><br>`;
            else if (tgStr === '재성') content += `금융, 회계, 무역, 사업, 유통 등 실물 경제의 피냄새를 맡고 자본의 흐름을 조종하는 곳에서 당신의 후각이 빛을 발합니다. 숫자를 다루고 결과를 도출하는 일에서 희열을 느낍니다.<br><br>`;
            else if (tgStr === '관성') content += `법조계, 군경, 공직, 대기업 관리직 등 엄격한 시스템과 규율을 통제하는 곳에서 무서운 두각을 나타냅니다. 남을 지휘하고 카리스마로 조직을 이끄는 리더의 자리에 올라야 직성이 풀립니다.<br><br>`;
            else content += `교육, 학문, 종교, 연구, 심리상담 등 보이지 않는 정신세계를 파고들어 사람들을 계몽하고 지혜를 보존하는 일에서 독보적인 학자의 권위를 쌓아 올립니다.<br><br>`;
            content += DB_LIFETIME.c[dmEl] + `<br><br>무엇보다 당신의 직장 환경에 용신 <b>${yong.el}</b>의 속성(색상, 방위, 오행)을 스며들게 하는 것이 출세를 앞당기는 가장 확실한 영적 부스터(Booster)가 될 것입니다.`;
        }
        else if (category === 'wealth') {
            content += `재물은 당신이 세상과 투쟁하여 얻어낸 에너지의 결정체입니다. 일간 ${HANGUL_MAP[dmEl]}의 입장에서 재성을 어떻게 장악하고 다루느냐가 당신의 부의 크기를 결정짓습니다.<br><br>`;
            const rePct = scores[RELATIONS[dmEl].ctrl] || 0;
            if (rePct > 20) content += `당신의 명식 내부에는 이미 재물을 움켜쥐려는 욕망과 감각(재성 비율 ${rePct}%)이 매우 강하게 소용돌이치고 있습니다. 돈 냄새를 맡는 감각이 짐승처럼 예리하여 큰 판을 벌려 거대한 부를 쓸어 담을 자질이 충분합니다. 단, 에너지가 흩어지면 돈을 벌고도 건강이나 명예를 잃을 수 있으니 들어온 돈을 묵직한 실물 자산으로 단단히 묶어두는 통제력이 필수적입니다.<br><br>`;
            else content += `당신의 명식에서 재물을 상징하는 기운이 겉으로 강하게 드러나 있지는 않습니다. 이는 돈 자체가 인생의 일순위 목표가 아님을 의미합니다. 일확천금을 노리는 투기나 섣부른 확장은 당신의 운로를 꼬이게 만듭니다. 당신은 본연의 압도적인 전문성(자격증, 지식, 기술)을 무기 삼아 명예를 먼저 쟁취할 때, 재물은 그 뒤를 그림자처럼 불어나 따라붙는 고결한 부자의 형상을 띄고 있습니다.<br><br>`;
            content += DB_LIFETIME.w[dmEl] + `<br><br>돈이 샌다고 느껴질 때는 주저 없이 수호 기운을 일상에 들이십시오. 보이지 않는 주파수를 맞추는 자만이 진정한 억만장자의 궤도에 오를 수 있습니다.`;
        }
        else if (category === 'family') {
            content += `가족이라는 끈끈하고도 잔혹한 혈연의 굴레 속에서 당신은 어떤 포지션을 취해야 할까요? 당신의 부모궁(월지)과 자녀궁(시지)의 암투를 스캔했습니다.<br><br>`;
            content += DB_LIFETIME.f[dmEl] + `<br><br>가족과의 관계에서 파음(破音)이 날 때, 명식 내의 충돌을 무효화 시키기 위한 은밀한 비방이 필요합니다. 각자의 사생활을 존중하는 심리적 거리두기가 때로는 최고의 액뜸(厄除)이 됩니다.`;
        }
        else if (category === 'love') {
            content += `연인과 배우자, 당신의 삶에 가장 깊숙이 개입하는 이성과의 관계 주파수를 스캔했습니다.<br><br>`;
            if (isStrong) content += `당신의 강력한 자아 에너지는 연애에서도 고스란히 드러납니다. 주도권을 쥐어야 직성이 풀리며 상대를 내 울타리 안에 두고 보호하려는 헌신이 강합니다. 하지만 그 에너지가 상대에게는 족쇄처럼 느껴질 수 있습니다. 사랑할수록 상대와 나의 경계를 긋고 쿨하게 놓아주는 법을 배워야만 파국을 막을 수 있습니다.<br><br>`;
            else content += `당신은 관계 속에서 안정감을 얻고 상대를 통해 내면의 결핍을 채우려는 의존적 낭만주의자의 기질을 지녔습니다. 겉으로는 맞춰주는 듯 하지만, 상대가 내 기준에 도달하지 못하면 서늘하게 마음을 닫아버립니다. 소울메이트를 만나면 세상 누구보다 헌신하지만, 그 기준이 너무 높아 인연이 닿기까지 시간이 걸릴 수 있습니다.<br><br>`;
            content += DB_LIFETIME.l_v[dmEl] + `<br><br>가장 좋은 배우자의 조건은 당신의 용신인 <b>${yong.el}</b>의 에너지를 듬뿍 가진 사람을 만나는 것입니다.`;
        }
        return content;
    };

    // 💡 [엔진 결합] V56 종합 분석 파이프라인 (최종 조립)
    return { 
        analyze: async (req) => {
            const { y, m, d, h, cal, name, gender } = req;
            let hr = 12, min = 0; if(h === 'yaja') hr = 23; else if(h === 'joja') hr = 0; else if(h !== 'none' && !isNaN(parseInt(h))) hr = parseInt(h);
            let lun, sol;
            try {
                if(cal === 'solar'){ sol = window.Solar.fromYmdHms(y,m,d,hr,min,0); lun = sol.getLunar(); } 
                else { lun = window.Lunar.fromYmdHms(y,m,d,hr,min,0); sol = lun.getSolar(); } 
                if(!lun || lun.getYear() === -1) throw new Error();
            } catch(e) { throw new Error("달력 변환에 실패했습니다."); }

            const baziData = lun.getEightChar();
            const bazi = { 
                dayGan: baziData.getDayGan(), dayZhi: baziData.getDayZhi(), monthZhi: baziData.getMonthZhi(),
                stems: [baziData.getYearGan(), baziData.getMonthGan(), baziData.getDayGan(), h!=='none'?baziData.getTimeGan():'-'], 
                branches: [baziData.getYearZhi(), baziData.getMonthZhi(), baziData.getDayZhi(), h!=='none'?baziData.getTimeZhi():'-']
            };

            const structData = determineStructure(bazi);
            const ohaengScores = calculateOhaengScores(bazi);
            const yongshin = determineYongshin(bazi, ohaengScores);
            const { hapList, cspList } = applyHapAndChung(bazi.branches, bazi.monthZhi, ohaengScores);
            const dmEl = ELEMENTS[bazi.dayGan] || '木';

            const shinsal = scanShinsal(bazi.stems, bazi.branches, bazi.dayZhi, bazi.dayGan);
            const wYear = getWounsung(bazi.dayGan, bazi.branches[0]);
            const wMonth = getWounsung(bazi.dayGan, bazi.branches[1]);
            const wDay = getWounsung(bazi.dayGan, bazi.branches[2]);
            const wTime = getWounsung(bazi.dayGan, bazi.branches[3]);

            const buildBaziCol = (pos, gan, zhi, w) => {
                return { pos, gan, zhi, ganTen: getTenGod(bazi.dayGan, gan), zhiTen: zhi !== '-' ? getTenGod(bazi.dayGan, MAIN_QI[zhi] || zhi) : '-', w };
            };

                    `<div class="lucky-grid">
                        <div class="lucky-item"><span class="lucky-icon">🧭</span><div class="lucky-title">에너지가 흐르는 방위</div><div class="lucky-val">${aus.dir}</div></div>
                        <div class="lucky-item"><span class="lucky-icon">🎨</span><div class="lucky-title">행운을 부르는 색상 파동</div><div class="lucky-val" style="font-size:0.9rem;">${aus.color}</div></div>
                        <div class="lucky-item"><span class="lucky-icon">🔢</span><div class="lucky-title">비밀의 주파수 숫자</div><div class="lucky-val">${aus.num}</div></div>
                        <div class="lucky-item"><span class="lucky-icon">🏺</span><div class="lucky-title">운의 흐름을 돕는 물성</div><div class="lucky-val" style="font-size:0.85rem;">${aus.item.split(',')[0]}</div></div>
                    </div>`
                ]
            });

            const reportJSON = {
                meta: { name: name || "고객", baziGridData, ohaengScores, yongshinEl: yongshin.el, solarStr, lunarStr, ausItem: aus.item },
                sections: sections
            };
            return { statusCode: 200, data: reportJSON };
        } 
    }; 
})();

/**
 * =====================================================================
 * 🎨 [FRONTEND LAYER] : UI / 렌더링 / 제어 로직
 * =====================================================================
 */
window.MockAPI = { post: async (endpoint, payload) => { if(endpoint === '/api/analyze') return await OrthodoxEngine.analyze(payload); throw new Error("404"); } };

const SaaSFrontend = (() => {

    let chartInst = null;
    const HANGUL_MAP = {
        '甲':'갑', '乙':'을', '丙':'병', '丁':'정', '戊':'무', '己':'기', '庚':'경', '辛':'신', '壬':'임', '癸':'계',
        '子':'자', '丑':'축', '寅':'인', '卯':'묘', '辰':'진', '巳':'사', '午':'오', '未':'미', '申':'신', '酉':'유', '戌':'술', '亥':'해'
    };

    const safeText = (id, text) => { const el = document.getElementById(id); if (el) el.textContent = text; };

    const showMsg = (msg, isError = false) => {
        const modal = document.getElementById('custom-modal');
        if(!modal) return;
        const msgEl = document.getElementById('modal-msg');
        if(msgEl) msgEl.textContent = msg;
        const titleEl = document.getElementById('modal-title');
        if(titleEl) {
            titleEl.textContent = isError ? 'SYSTEM ERROR' : '알림';
            titleEl.style.color = isError ? 'var(--color-danger)' : 'var(--gold-primary)';
        }
        modal.style.display = 'block';
    };

    const isValidDate = (y, m, d) => { const date = new Date(y, m - 1, d); return date.getFullYear() === y && date.getMonth() === (m - 1) && date.getDate() === d; };

    const createSafeDOM = (htmlString) => {
        const div = document.createElement('div');
        div.className = 'r-text-block';
        div.style.marginBottom = '22px';
        div.innerHTML = htmlString;
        return div;
    };

    const renderBaziGrid = (gridData) => {
        const wrap = document.getElementById('r-bazi-grid');
        if(!wrap) return;
        wrap.innerHTML = '';
        gridData.forEach(col => {
            const isDayMaster = col.ganTen === '일간(나)';
            wrap.innerHTML += `
                <div class="bazi-col">
                    <div class="bazi-header">${col.pos}</div>
                    <div class="bazi-ten">${col.ganTen !== '-' ? col.ganTen : '&nbsp;'}</div>
                    <div class="bazi-char ${isDayMaster ? 'bazi-day-master' : ''}">
                        ${col.gan}<span class="bazi-char-kr">${HANGUL_MAP[col.gan]||''}</span>
                    </div>
                    <div class="bazi-char">
                        ${col.zhi}<span class="bazi-char-kr">${HANGUL_MAP[col.zhi]||''}</span>
                    </div>
                    <div class="bazi-ten">${col.zhiTen !== '-' ? col.zhiTen : '&nbsp;'}</div>
                    <div class="bazi-hidden"><span>12운성: ${col.w}</span></div>
                </div>
            `;
        });
    };

    const renderOhaengChart = (scores) => {
        const wrap = document.getElementById('r-element-chart');
        if(!wrap) return;
        wrap.innerHTML = ''; 
        const colors = {'木':'wood','火':'fire','土':'earth','金':'metal','水':'water'};
        let maxScore = Math.max(...Object.values(scores), 1); 

        ['木','火','土','金','水'].forEach(el => {
            const percentage = (scores[el] / maxScore) * 100;
            wrap.innerHTML += `
                <div class="bar-wrap">
                    <div class="bar-label" style="color:var(--color-${colors[el]})">${el}</div>
                    <div class="bar-bg">
                        <div class="bar-fill fill-${colors[el]}" style="width:${percentage}%"></div>
                    </div>
                    <div class="bar-val">${scores[el]}%</div>
                </div>
            `;
        });
    };

    // 💡 돋보기 아이콘과 새로운 문구가 반영된 스텔스 CTA 렌더링 함수
    const renderStealthCTA = (yongshinEl) => {
        const wrap = document.createElement('div');
        let targetUrl = 'https://link.coupang.com/a/eu5td7'; 
        
        if (yongshinEl === '木' || yongshinEl === '火') targetUrl = 'https://link.coupang.com/a/eu5td7';
        else if (yongshinEl === '土' || yongshinEl === '金') targetUrl = 'https://link.coupang.com/a/eu5uLR';
        else targetUrl = 'https://link.coupang.com/a/eu5vYe';

        wrap.innerHTML = `
            <a href="${targetUrl}" target="_blank" class="proc-toggle term-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: flex-start; margin-top: 30px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(212,175,55,0.15);">
                <span style="font-size:0.75rem; transition: transform 0.3s;">▼</span>
                <span style="font-weight:700; letter-spacing:0.5px;">🔍 나의 행운템 보기</span>
            </a>
            <p style="text-align:center; font-size:0.75rem; color:rgba(255,255,255,0.15); margin-top:0px; margin-bottom:30px;">* 파트너스 활동을 통해 소정의 수수료를 제공받을 수 있습니다.</p>
        `;
        return wrap;
    };

    const renderChartAndGrid = (graphData) => {
        const ctx = document.getElementById('yearChart');
        if(ctx) {
            if(chartInst) chartInst.destroy();
            chartInst = new Chart(ctx.getContext('2d'), {
                type:'line',
                data:{
                    labels: graphData.map(g=>`${g.year}`),
                    datasets:[{
                        label:'에너지 파동',
                        data: graphData.map(g=>g.score),
                        borderColor: '#d4af37',
                        backgroundColor: 'rgba(212,175,55,0.08)',
                        pointBackgroundColor: graphData.map(g=>g.isBroken?'#f85149':g.year===new Date().getFullYear()?'#4ade80':'#d4af37'),
                        pointRadius: graphData.map(g=>g.year===new Date().getFullYear()?7:4),
                        pointBorderWidth: 2, pointBorderColor: '#0a0e14',
                        fill: true, tension: 0.45, borderWidth: 2
                    }]
                },
                options:{
                    maintainAspectRatio: false,
                    plugins:{ legend:{ display: false } },
                    scales:{
                        y:{ min: 0, max: 100, grid:{ color: 'rgba(255,255,255,0.03)' }, ticks:{ color: '#8b949e', font:{ size: 10 } } },
                        x:{ grid:{ color: 'rgba(255,255,255,0.03)' }, ticks:{ color: '#8b949e', font:{ size: 10 } } }
                    }
                }
            });
        }

        const gridWrap = document.getElementById('yr-grid-container');
        if(gridWrap && graphData) {
            let html = `<div class="yr-grid">`;
            graphData.forEach(g => {
                const isNow = g.year === new Date().getFullYear();
                const color = g.isBroken ? '#f85149' : g.isPeak ? '#4ade80' : '#d4af37';
                html += `
                <div class="yr-cell ${isNow ? 'now' : ''}">
                    <div class="yc-yr">${g.year}${isNow ? ' ★' : ''}</div>
                    <div class="yc-bar"><div class="yc-fill" style="width:${g.score}%; background:${color}"></div></div>
                    <div class="yc-num" style="color:${color}">${g.score}</div>
                    <div class="yc-ganzhi" style="color:${color}">${g.seunGan}(${HANGUL_MAP[g.seunGan]})<br>${g.seunZhi}(${HANGUL_MAP[g.seunZhi]})</div>
                </div>`;
            });
            html += `</div>`;
            gridWrap.innerHTML = html;
        }
    };

    const renderReportTarget = (resData) => {
        const wrap = document.getElementById('dynamic-sections');
        if(!wrap) return;
        wrap.innerHTML = '';
        
        safeText('r-title-name', `${String(resData.meta.name).replace(/[&<>"']/g, '')} 님의 운명 리포트`);
        safeText('r-title-date-solar', resData.meta.solarStr);
        safeText('r-title-date-lunar', resData.meta.lunarStr);

        renderBaziGrid(resData.meta.baziGridData);
        
        const mainFrag = document.createDocumentFragment();
        let graphDataToRender = null;

        resData.sections.forEach(sec => {
            const secDiv = document.createElement('div');
            secDiv.className = 'r-section';
            
            const title = document.createElement('h3'); 
            title.innerHTML = sec.title; 
            secDiv.appendChild(title);
            
            const content = document.createElement('div'); 
            content.className = 'r-content';
            
            sec.paragraphs.forEach(p => { content.appendChild(createSafeDOM(p)); });
            secDiv.appendChild(content);
            mainFrag.appendChild(secDiv);

            if(sec.graphData) graphDataToRender = sec.graphData;
        });

        wrap.appendChild(mainFrag);

        if(graphDataToRender) setTimeout(() => renderChartAndGrid(graphDataToRender), 150);
        setTimeout(() => renderOhaengChart(resData.meta.ohaengScores), 150); 
    };

    const requestReport = () => {
        const nameEl = document.getElementById('user-name');
        const name = nameEl ? nameEl.value.trim() : "고객";
        const y = parseInt(document.getElementById('user-year').value), m = parseInt(document.getElementById('user-month').value), d = parseInt(document.getElementById('user-day').value);
        if (!isValidDate(y, m, d)) { showMsg("유효하지 않은 날짜입니다.", true); return; }

        const h = document.getElementById('user-time').value, cal = document.getElementById('user-cal').value, gender = document.getElementById('user-gender').value;
        if(typeof window.Lunar === 'undefined') { showMsg("코어 모듈 접속 지연. 새로고침 해주세요.", true); return; }

        const loader = document.getElementById('loader');
        const loaderText = document.querySelector('.loading-txt');
        if(loader) loader.style.display = 'flex';

        const loaderMsgs = ["과거의 궤적을 스캔 중...", "월령 승수 기반 오행 가중치 연산...", "은밀한 흉살과 공망 추적 중...", "원국/대운/세운 3중 궤적 교차...", "거대한 운명 텍스트 생성 중..."];
        let msgIdx = 0; 
        if(loaderText) loaderText.textContent = loaderMsgs[msgIdx];
        const msgInterval = setInterval(() => { 
            msgIdx = (msgIdx + 1) % loaderMsgs.length; 
            if(loaderText) loaderText.textContent = loaderMsgs[msgIdx]; 
        }, 900);

        setTimeout(async () => {
            try {
                const response = await window.MockAPI.post('/api/analyze', {y, m, d, h, cal, gender, name});
                if(!response || response.statusCode !== 200) throw new Error("엔진 파괴 오류");

                renderReportTarget(response.data);
                
                const ctaContainer = document.getElementById('cta-container');
                if(ctaContainer) {
                    ctaContainer.innerHTML = '';
                    ctaContainer.appendChild(renderStealthCTA(response.data.meta.yongshinEl));
                }

                clearInterval(msgInterval);
                if(loader) loader.style.display = 'none';
                
                const inputView = document.getElementById('input-view');
                if(inputView) inputView.style.display = 'none';
                const reportView = document.getElementById('report-view');
                if(reportView) reportView.style.display = 'block';
                window.scrollTo(0,0);

            } catch (e) {
                console.error(e);
                clearInterval(msgInterval);
                if(loader) loader.style.display = 'none';
                showMsg(e.message || "서버 통신에 실패했습니다.", true);
            }
        }, 5000); 
    };

    const shareLink = async () => {
        const url = 'https://chomibinine.github.io/destinyroot/';
        const shareData = { title: '운명뿌리 | 사주 분석', text: '정통 명리 데이터 기반의 내 사주 리포트를 확인해보세요.', url: url };
        
        if (navigator.share) {
            try { await navigator.share(shareData); } catch (err) { console.error("Share canceled", err); }
        } else {
            const dummy = document.createElement('input');
            document.body.appendChild(dummy);
            dummy.value = url;
            dummy.select(); document.execCommand('copy');
            document.body.removeChild(dummy);
            showMsg('사이트 주소가 복사되었습니다.');
        }
    };

    const goHome = () => { window.location.reload(); };

    const init = () => {
        const ys = document.getElementById('user-year'), ms = document.getElementById('user-month'), ds = document.getElementById('user-day');
        if(ys && ms && ds) {
            const currY = new Date().getFullYear();
            for(let i=currY; i>=1930; i--) ys.add(new Option(i+'년', i));
            for(let i=1; i<=12; i++) ms.add(new Option(i+'월', i));
            for(let i=1; i<=31; i++) ds.add(new Option(i+'일', i));
            ys.value = 1990; ms.value = 1; ds.value = 1; 
        }
    };

    return { init, requestReport, shareLink, goHome };
})();

window.onload = SaaSFrontend.init;
</script>
</body>
</html>
