<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 사주 분석</title>
    
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-base: #05070a; 
            --bg-report: #0d1118; 
            --border-line: #1f242c; 
            --border-light: #2d333b;
            --gold-primary: #d4af37; 
            --gold-light: #f9e596; 
            --text-main: #d1d5db; 
            --text-muted: #8b949e; 
            --color-danger: #f85149; 
            --color-info: #58a6ff;
            /* 오행 컬러 */
            --color-wood: #4ade80; 
            --color-fire: #fb923c; 
            --color-earth: #fbbf24; 
            --color-metal: #cbd5e1; 
            --color-water: #60a5fa;
        }
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; word-break: keep-all; -webkit-tap-highlight-color: transparent;}
        body { background: radial-gradient(circle at top, #0b0f17, #05070a); color: var(--text-main); line-height: 1.75; font-size: 16px; overflow-x: hidden; min-height: 100vh;}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .app-container { max-width: 800px; margin: 0 auto; padding: 50px 20px 120px; position: relative; z-index: 1; }
        
        /* 홈 화면 UI */
        .hero { text-align: center; margin-bottom: 40px; padding: 20px 0;}
        .hero h1 { color: var(--gold-light); font-size: 3rem; font-weight: 900; letter-spacing: -1px; margin: 0; }
        
        .input-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-line); border-radius: 16px; padding: 45px 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 0.95rem; }
        .form-control { width: 100%; padding: 16px 20px; border-radius: 10px; border: 1px solid var(--border-light); background: rgba(0,0,0,0.4); color: #fff; font-size: 1.05rem; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--gold-primary); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .btn-submit { display: flex; align-items: center; justify-content: center; background: var(--gold-primary); color: #000; padding: 20px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; margin-top: 35px; font-size: 1.25rem; transition: 0.2s; }
        .btn-submit:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212,175,55,0.3); }

        /* 📄 리포트 영역 */
        .report-wrapper { background: var(--bg-report); border: 1px solid var(--border-line); border-radius: 16px; padding: 50px 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); margin-bottom: 30px; position: relative; overflow:hidden;}
        
        .r-header { text-align: center; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid var(--border-line); }
        .r-header h2 { font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 15px;}
        .date-box { display: inline-block; background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); padding: 12px 25px; border-radius: 12px; }
        .date-box p { color: var(--gold-primary); font-size: 1rem; font-weight: 600; margin: 3px 0; letter-spacing: 0.5px;}
        .date-box .lunar { color: var(--text-muted); font-size: 0.9rem; }

        /* 명식 테이블 */
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 40px; background: rgba(0,0,0,0.3); padding: 20px 10px; border-radius: 12px; border: 1px solid var(--border-line); }
        .bazi-col { text-align: center; display: flex; flex-direction: column; gap: 5px;}
        .bazi-header { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 600;}
        .bazi-char { font-size: 1.8rem; font-weight: 900; color: #fff; padding: 10px 0; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border-light); }
        .bazi-ten { font-size: 0.8rem; color: var(--gold-primary); font-weight: bold; }
        .bazi-hidden { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; border-top: 1px dashed var(--border-light); padding-top: 6px; line-height: 1.4;}
        .bazi-hidden span { display: block; }
        .bazi-day-master { border-color: var(--gold-primary) !important; background: rgba(212,175,55,0.1) !important; color: var(--gold-light) !important; }

        /* 오행 그래프 */
        .element-chart-container { margin: 40px 0; padding: 35px 30px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border-line); }
        .element-chart-container h4 { color: #fff; font-size: 1.25rem; margin-bottom: 25px; text-align: center; font-weight: 800;}
        .bar-wrap { display: flex; align-items: center; margin-bottom: 18px; gap: 15px; }
        .bar-label { width: 40px; font-weight: 900; font-size: 1.15rem; text-align: center; }
        .bar-bg { flex: 1; height: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 10px; transition: width 1.5s ease-out; }
        .bar-val { width: 45px; text-align: right; font-size: 0.95rem; color: var(--text-muted); font-weight: 600;}
        .fill-wood { background: var(--color-wood); box-shadow: 0 0 10px rgba(74, 222, 128, 0.4); } 
        .fill-fire { background: var(--color-fire); box-shadow: 0 0 10px rgba(251, 146, 60, 0.4); } 
        .fill-earth { background: var(--color-earth); box-shadow: 0 0 10px rgba(251, 191, 36, 0.4); } 
        .fill-metal { background: var(--color-metal); box-shadow: 0 0 10px rgba(203, 213, 225, 0.4); } 
        .fill-water { background: var(--color-water); box-shadow: 0 0 10px rgba(96, 165, 250, 0.4); }

        /* 섹션 공통 */
        .r-section { margin-bottom: 55px; }
        .r-section h3 { font-size: 1.4rem; color: #fff; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-weight: 800;}
        .r-section h3::before { content: ''; display:inline-block; width:5px; height:20px; background:var(--gold-primary); border-radius:3px;}
        .r-content { font-size: 1.1rem; line-height: 1.9; color: var(--text-main); text-align: justify;} 
        .r-content p { margin-bottom: 20px; }
        
        /* 분석 근거 박스 */
        .basis-box { background: rgba(88,166,255,0.05); padding: 20px 25px; margin-bottom: 25px; border-radius: 12px; font-size: 0.95rem; color: #a1b0c0; line-height: 1.7; border-left: 4px solid var(--color-info);}
        .basis-box strong { color: var(--color-info); font-weight: 800; margin-right: 5px; }
        .basis-box .magnify { font-size: 1.15rem; vertical-align: middle; margin-right: 5px;}
        
        .r-content strong { color: #fff; font-weight: 800; }
        .highlight { color: var(--gold-light); font-weight: 800; }
        
        .r-conclusion { margin-top: 60px; padding: 35px 30px; background: rgba(212,175,55,0.05); border-radius: 16px; border: 1px solid rgba(212,175,55,0.2); text-align: center; }
        .r-conclusion h3 { font-size: 1.4rem; color: var(--gold-light); margin-bottom: 15px; font-weight: 900;}
        .r-conclusion p { font-size: 1.1rem; line-height: 1.9; color: #fff; font-weight: 500; }

        /* 스텔스 CTA 박스 (상품명 제거, 추천 텍스트 유지) */
        .cta-box { margin-top: 50px; padding: 45px 30px; border-radius: 16px; background: linear-gradient(145deg, #0b101a, #131924); border: 1px solid var(--border-light); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-coupang { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: #fff; font-size: 1.2rem; font-weight: 800; padding: 18px 35px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; transition: 0.2s;}
        .btn-coupang:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.05);}

        /* 하단 제어 버튼 */
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 40px; }
        .btn-tool { flex: 1; display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: #fff; padding: 20px; border-radius: 12px; font-size: 1.15rem; font-weight: 700; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s; width: 100%;}
        .btn-tool:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2);}
        
        .btn-home { display: flex; align-items: center; justify-content: center; background: var(--gold-primary); color: #000; padding: 22px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 1.3rem; transition: 0.2s; box-shadow: 0 5px 20px rgba(212,175,55,0.2);}
        .btn-home:hover { background: var(--gold-light); transform: translateY(-2px);}

        /* 로더 연출 */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,10,0.95); z-index: 100000; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px);} 
        .spinner { width: 55px; height: 55px; border: 4px solid transparent; border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite; margin-bottom:25px;} 
        .loading-txt { color: var(--gold-light); font-size: 1.25rem; font-weight: 700; letter-spacing: 1px;}
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .modal { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #161b22; color: #fff; padding: 20px 25px; border-radius: 12px; z-index: 100001; text-align: center; width: 90%; max-width: 320px; border: 1px solid var(--border-line); box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
        
        @media (max-width: 600px) { 
            .report-wrapper { padding: 40px 20px; border-radius:0; border-left:none; border-right:none;} 
            .grid-row, .grid-half { grid-template-columns: 1fr; }
            .bazi-grid { gap: 5px; padding: 15px 5px; }
            .bazi-char { font-size: 1.5rem; padding: 8px 0; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div id="loader-text" class="loading-txt">명리 엔진 가동 중...</div></div>

<div id="custom-modal" class="modal">
    <h3 id="modal-title" style="margin-bottom:8px; font-size:1.05rem; color:var(--color-danger);">System</h3>
    <p id="modal-msg" style="margin-bottom:15px; font-size:0.95rem; color:var(--text-muted);"></p>
    <button onclick="document.getElementById('custom-modal').style.display='none'" style="background:#fff; color:#000; border:none; padding:8px 20px; border-radius:8px; font-weight:600; cursor:pointer;">확인</button>
</div>

<div class="app-container">
    <div id="input-view">
        <div class="hero">
            <h1>사주 분석</h1>
        </div>
        
        <div class="input-card">
            <div class="form-group"><label>이름</label><input type="text" id="user-name" class="form-control" placeholder="홍길동"></div>
            <div class="form-group"><label>생년월일</label>
                <div class="grid-row"><select id="user-year" class="form-control"></select><select id="user-month" class="form-control"></select><select id="user-day" class="form-control"></select></div>
            </div>
            <div class="form-group grid-half">
                <div><label>성별</label><select id="user-gender" class="form-control"><option value="male">남성</option><option value="female">여성</option></select></div>
                <div><label>역법</label><select id="user-cal" class="form-control"><option value="solar">양력</option><option value="lunar">음력</option></select></div>
            </div>
            <div class="form-group" style="margin-top:15px;">
                <label>태어난 시각 <span style="font-size:0.8rem; font-weight:400; color:var(--gold-primary);">(정밀 분석 필수)</span></label>
                <select id="user-time" class="form-control">
                    <option value="none">모름 / 미정 (3주 6자로 분석)</option>
                    <option value="yaja">야자시 (23:30~)</option><option value="joja">조자시 (~01:29)</option>
                    <option value="2">축시 (01:30~)</option><option value="4">인시 (03:30~)</option><option value="6">묘시 (05:30~)</option>
                    <option value="8">진시 (07:30~)</option><option value="10">사시 (09:30~)</option><option value="12">오시 (11:30~)</option>
                    <option value="14">미시 (13:30~)</option><option value="16">신시 (15:30~)</option><option value="18">유시 (17:30~)</option>
                    <option value="20">술시 (19:30~)</option><option value="22">해시 (21:30~)</option>
                </select>
            </div>
            <button class="btn-submit" onclick="SaaSFrontend.requestReport()">사주 분석 결과 보기</button>
        </div>
    </div>

    <div id="report-view" style="display:none;">
        <div class="report-wrapper" id="capture-target">
            <div class="r-header">
                <h2 id="r-title-name">사주 분석 리포트</h2>
                <div class="date-box">
                    <p id="r-title-date-solar"></p>
                    <p id="r-title-date-lunar" class="lunar"></p>
                </div>
            </div>

            <div class="bazi-grid" id="r-bazi-grid"></div>

            <div class="element-chart-container" id="r-element-chart"></div>
            
            <div id="dynamic-sections"></div>

            <div id="cta-container"></div>

            <div class="r-conclusion" id="r-conclusion-box"></div>
        </div>

        <div class="controls animate-fade">
            <button class="btn-tool" onclick="SaaSFrontend.shareLink()">🔗 사이트 링크 공유하기</button>
            <button class="btn-home" onclick="SaaSFrontend.goHome()">🏠 홈으로 돌아가기</button>
        </div>
    </div>
</div>

<script>

 * - 방대한 명리학 텍스트 DB 복원 및 오행 밸런스 풀이 추가

        "e": { "木": "호기심이 매우 강해...", "火": "자신을 표현하고 드러내길...", "土": "또래에 비해 생각이 깊고...", "金": "스스로의 깐깐한 규율을...", "水": "생각의 바다에 빠져..." },
        "m": { "木": "자신의 영역을 사방으로...", "火": "사회적 무대 중심에서...", "土": "안정망을 구축하는...", "金": "냉혹한 원칙을 바탕으로...", "水": "통찰력을 발휘하여..." },
        "l": { "木": "정신적으로 풍요로운 말년...", "火": "활력과 호기심으로 생기 넘치는...", "土": "궁극의 안락함과 여유...", "金": "존경받는 꼿꼿한 시기...", "水": "지혜로운 멘토이자 현자..." },
        "w": { "木": "창작 분야에서 재물이...", "火": "마케팅 무대에서 폭발적인 부가...", "土": "부동산 등 실물 자산 분야에서...", "金": "금융, 기술 분야에서 권력을...", "水": "IT, 정보의 흐름에서 막대한 부를..." },
        "c": { "木": "기획자, 교육자, 창업가...", "火": "방송인, 마케터, 예술가...", "土": "상담가, 관리자, 공무원...", "金": "군인, 펀드매니저, 외과의사...", "水": "무역업자, IT 기획자, 외교관..." },
        "l_v": { "木": "따뜻하고 포용력 있는 연애...", "火": "솔직하고 뜨거운 연애...", "土": "변치 않는 신뢰의 연애...", "金": "이성적이고 세련된 연애...", "水": "영혼이 교감하는 연애..." },
        "f": { "木": "다정다감한 기둥 역할...", "火": "밝은 활력과 이벤트...", "土": "가장 든든한 울타리...", "金": "책임감과 원칙의 가장...", "水": "완벽한 정신적 지주..." },
        "h": { "木": "간, 담, 자율신경계 주의...", "火": "심장, 혈액순환 주의...", "土": "위장, 비장 소화기 주의...", "金": "폐, 대장, 호흡기 주의...", "水": "신장, 방광 생식기 주의..." }
    };

    const getTenGod = (dayMaster, targetChar) => {
        if (!dayMaster || !targetChar || targetChar === '-' || dayMaster === '-') return '-';
        const dmEl = ELEMENTS[dayMaster], tgEl = ELEMENTS[targetChar];
        if (!dmEl || !tgEl) return '-';
        const sameYinYang = YIN_YANG[dayMaster] === YIN_YANG[targetChar];
        const suffix = sameYinYang ? 'same' : 'diff';
        if (dmEl === tgEl) return TEN_GODS_NAME[`same_${suffix}`];
        if (RELATIONS[dmEl].genBy === tgEl) return TEN_GODS_NAME[`genBy_${suffix}`];
        if (RELATIONS[dmEl].gen === tgEl) return TEN_GODS_NAME[`gen_${suffix}`];
        if (RELATIONS[dmEl].ctrlBy === tgEl) return TEN_GODS_NAME[`ctrlBy_${suffix}`];
        if (RELATIONS[dmEl].ctrl === tgEl) return TEN_GODS_NAME[`ctrl_${suffix}`];
        return '-';
    };

    const calculateOhaengScores = (bazi) => {
        let scores = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
        const addScore = (char, weight) => {
            if(!char || char === '-') return;
            const el = ELEMENTS[char]; if(el) scores[el] += weight;
        };
        addScore(bazi.stems[0], 10); addScore(bazi.stems[1], 10); addScore(bazi.stems[2], 10); addScore(bazi.stems[3], 10);
        bazi.branches.forEach((b, i) => { if (b === '-') return; let weight = 10; if (i === 1) weight = 35; else if (i === 2) weight = 15; addScore(MAIN_QI[b] || b, weight); });
        const total = Object.values(scores).reduce((a,b)=>a+b, 0) || 1;
        for (let key in scores) scores[key] = Math.round((scores[key] / total) * 100);
        return scores;
    };

    const getWounsung = (dayGan, zhi) => {
        if (!dayGan || !zhi || zhi === '-') return '-';
        const w12Arr = W12_MAP[dayGan]; if (!w12Arr) return '-';
        const idx = w12Arr.indexOf(zhi); return idx !== -1 ? W12_NAMES[idx] : '-';
    };

    return { analyze: async (req) => {
        const { y, m, d, h, cal, name } = req;
        let hr = 12; if(h === 'yaja') hr = 23; else if(h === 'joja') hr = 0; else if(h !== 'none') hr = parseInt(h);
        let lun = cal === 'solar' ? window.Solar.fromYmdHms(y,m,d,hr,0,0).getLunar() : window.Lunar.fromYmdHms(y,m,d,hr,0,0);
        let sol = lun.getSolar();
        const baziData = lun.getEightChar();
        const bazi = { 
            stems: [baziData.getYearGan(), baziData.getMonthGan(), baziData.getDayGan(), h!=='none'?baziData.getTimeGan():'-'], 
            branches: [baziData.getYearZhi(), baziData.getMonthZhi(), baziData.getDayZhi(), h!=='none'?baziData.getTimeZhi():'-']
        };
        const ohaengScores = calculateOhaengScores(bazi);
        const yongshinEl = ELEMENTS[bazi.stems[2]] || '木';
        const baziGridData = [
            { pos: '시주', gan: bazi.stems[3], zhi: bazi.branches[3], ganTen: getTenGod(bazi.stems[2], bazi.stems[3]), zhiTen: getTenGod(bazi.stems[2], MAIN_QI[bazi.branches[3]]), w: getWounsung(bazi.stems[2], bazi.branches[3]) },
            { pos: '일주', gan: bazi.stems[2], zhi: bazi.branches[2], ganTen: '일간(나)', zhiTen: getTenGod(bazi.stems[2], MAIN_QI[bazi.branches[2]]), w: getWounsung(bazi.stems[2], bazi.branches[2]) },
            { pos: '월주', gan: bazi.stems[1], zhi: bazi.branches[1], ganTen: getTenGod(bazi.stems[2], bazi.stems[1]), zhiTen: getTenGod(bazi.stems[2], MAIN_QI[bazi.branches[1]]), w: getWounsung(bazi.stems[2], bazi.branches[1]) },
            { pos: '년주', gan: bazi.stems[0], zhi: bazi.branches[0], ganTen: getTenGod(bazi.stems[2], bazi.stems[0]), zhiTen: getTenGod(bazi.stems[2], MAIN_QI[bazi.branches[0]]), w: getWounsung(bazi.stems[2], bazi.branches[0]) }
        ];

        return { statusCode: 200, data: { meta: { name, solarStr: `양력: ${sol.getYear()}년 ${sol.getMonth()}월 ${sol.getDay()}일`, lunarStr: `음력: ${lun.getYear()}년 ${Math.abs(lun.getMonth())}월 ${lun.getDay()}일`, baziGridData, ohaengScores, yongshinEl }, sections: [ { title: "나의 본질", paragraphs: [DB_JIGAN[bazi.stems[2]]] }, { title: "생애 주기", paragraphs: [DB_LIFETIME.e[yongshinEl]] } ], conclusion: "인생의 나침반으로 삼으십시오." } };
    }};
})();

/**
 * =====================================================================
 * 🎨 [FRONTEND LAYER] : UI / 렌더링 / 제어 로직
 * =====================================================================
 */
const SaaSFrontend = (() => {

    const createSafeDOM = (htmlString) => {
        const p = document.createElement('p');
        p.innerHTML = htmlString; return p;
    };

    // 🚀 [쿠파스 업데이트] 대표님이 주신 사주 페이지 전용 검색 결과 링크 3종 반영
    const renderCTA = (yongshinEl) => {
        const wrap = document.createElement('div');
        wrap.className = 'cta-box';

        let targetUrl = 'https://link.coupang.com/a/eu5td7'; // 1. 부족 기운 (기본)
        let label = '✨ 나의 부족한 기운을 채워줄 시크릿 행운템 확인하기';

        if (yongshinEl === '木' || yongshinEl === '火') {
            targetUrl = 'https://link.coupang.com/a/eu5td7'; // 부족한 기운 보완
            label = `🍀 나의 부족한 '${yongshinEl}' 기운을 키워줄 행운템 확인하기`;
        } else if (yongshinEl === '土' || yongshinEl === '金') {
            targetUrl = 'https://link.coupang.com/a/eu5uLR'; // 재물운 상승
            label = `💰 나의 '${yongshinEl}' 기운을 빛내줄 재물운 상승템 확인하기`;
        } else if (yongshinEl === '水') {
            targetUrl = 'https://link.coupang.com/a/eu5vYe'; // 건강/수호
            label = `💧 나의 물(水) 기운을 채워줄 시크릿 수호템 확인하기`;
        }

        wrap.innerHTML = `
            <a href="${targetUrl}" target="_blank" class="btn-coupang">
                ${label}
            </a>
            <p style="margin-top:15px; font-size:0.75rem; color:rgba(255,255,255,0.2);">* 파트너스 활동을 통해 소정의 수수료를 제공받을 수 있습니다.</p>
        `;
        return wrap;
    };

    const requestReport = async () => {
        const req = { 
            name: document.getElementById('user-name').value || "고객",
            y: parseInt(document.getElementById('user-year').value), m: parseInt(document.getElementById('user-month').value), d: parseInt(document.getElementById('user-day').value),
            h: document.getElementById('user-time').value, cal: document.getElementById('user-cal').value
        };

        document.getElementById('loader').style.display = 'flex';
        const response = await OrthodoxEngine.analyze(req);
        const resData = response.data;

        setTimeout(() => {
            document.getElementById('r-title-name').textContent = `${resData.meta.name} 님의 사주 분석 리포트`;
            document.getElementById('r-title-date-solar').textContent = resData.meta.solarStr;
            document.getElementById('r-title-date-lunar').textContent = resData.meta.lunarStr;

            const baziWrap = document.getElementById('r-bazi-grid');
            baziWrap.innerHTML = '';
            resData.meta.baziGridData.forEach(col => {
                baziWrap.innerHTML += `<div class="bazi-col"><div class="bazi-header">${col.pos}</div><div class="bazi-ten">${col.ganTen}</div><div class="bazi-char ${col.ganTen==='일간(나)'?'bazi-day-master':''}">${col.gan}</div><div class="bazi-char">${col.zhi}</div><div class="bazi-ten">${col.zhiTen}</div><div class="bazi-hidden">운성: ${col.w}</div></div>`;
            });

            const chartWrap = document.getElementById('r-element-chart');
            chartWrap.innerHTML = '<h4>오행 밸런스</h4>';
            const colors = {'木':'wood','火':'fire','土':'earth','金':'metal','수':'water'};
            ['木','火','土','金','水'].forEach(el => {
                const score = resData.meta.ohaengScores[el] || 0;
                chartWrap.innerHTML += `<div class="bar-wrap"><div class="bar-label" style="color:var(--color-${colors[el]||'water'})">${el}</div><div class="bar-bg"><div class="bar-fill fill-${colors[el]||'water'}" style="width:${score}%"></div></div><div class="bar-val">${score}%</div></div>`;
            });

            document.getElementById('dynamic-sections').innerHTML = '';
            resData.sections.forEach(sec => {
                const secDiv = document.createElement('div'); secDiv.className = 'r-section';
                secDiv.innerHTML = `<h3>${sec.title}</h3><div class="r-content"></div>`;
                sec.paragraphs.forEach(p => secDiv.querySelector('.r-content').appendChild(createSafeDOM(p)));
                document.getElementById('dynamic-sections').appendChild(secDiv);
            });

            document.getElementById('cta-container').innerHTML = '';
            document.getElementById('cta-container').appendChild(renderCTA(resData.meta.yongshinEl));
            document.getElementById('r-conclusion-box').innerHTML = `<h3>최종 전문가 제언</h3><p>${resData.conclusion}</p>`;

            document.getElementById('loader').style.display = 'none';
            document.getElementById('input-view').style.display = 'none';
            document.getElementById('report-view').style.display = 'block';
            window.scrollTo(0,0);
        }, 3000);
    };

    const shareLink = () => {
        const url = 'https://chomibinine.github.io/destinyroot/saju/';
        const dummy = document.createElement('input'); document.body.appendChild(dummy);
        dummy.value = url; dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy); alert('주소가 복사되었습니다.');
    };

    const goHome = () => { window.location.href = 'https://chomibinine.github.io/destinyroot/'; };

    const init = () => {
        const ys = document.getElementById('user-year'), ms = document.getElementById('user-month'), ds = document.getElementById('user-day');
        if(ys && ms && ds) {
            for(let i=2026; i>=1930; i--) ys.add(new Option(i+'년', i));
            for(let i=1; i<=12; i++) ms.add(new Option(i+'월', i));
            for(let i=1; i<=31; i++) ds.add(new Option(i+'일', i));
            ys.value = 1990; ms.value = 1; ds.value = 1; 
        }
    };

    return { init, requestReport, shareLink, goHome };
})();

window.onload = SaaSFrontend.init;
</script>
