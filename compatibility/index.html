<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 정통 궁합 분석</title>
    
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.6.12/lunar.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-base: #05070a; 
            --bg-report: #0d1118; 
            --border-line: #1f242c; 
            --border-light: #2d333b;
            --gold-primary: #d4af37; 
            --gold-light: #f9e596; 
            --text-main: #d1d5db; 
            --text-muted: #8b949e; 
            --color-danger: #f85149; 
            --color-info: #58a6ff;
            /* 오행 컬러 */
            --color-wood: #4ade80; 
            --color-fire: #fb923c; 
            --color-earth: #fbbf24; 
            --color-metal: #cbd5e1; 
            --color-water: #60a5fa;
            /* 궁합 컬러 */
            --color-me: #d4af37;
            --color-partner: #64748b;
        }
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; word-break: keep-all; -webkit-tap-highlight-color: transparent;}
        body { background: radial-gradient(circle at top, #0b0f17, #05070a); color: var(--text-main); line-height: 1.75; font-size: 16px; overflow-x: hidden; min-height: 100vh;}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        .app-container { max-width: 900px; margin: 0 auto; padding: 50px 20px 120px; position: relative; z-index: 1; }
        
        /* 홈 화면 UI */
        .hero { text-align: center; margin-bottom: 40px; padding: 20px 0;}
        .hero h1 { color: var(--gold-light); font-size: 3rem; font-weight: 900; letter-spacing: -1px; margin: 0; }
        .hero p { color: var(--text-muted); margin-top: 10px; font-size: 1.1rem;}
        
        /* 듀얼 입력 폼 */
        .dual-input-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 35px; }
        .input-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border-line); border-radius: 16px; padding: 35px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-card h2 { font-size: 1.4rem; color: #fff; margin-bottom: 25px; text-align: center; border-bottom: 1px solid var(--border-light); padding-bottom: 15px;}
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 0.95rem; }
        .form-control { width: 100%; padding: 14px 16px; border-radius: 10px; border: 1px solid var(--border-light); background: rgba(0,0,0,0.4); color: #fff; font-size: 1rem; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--gold-primary); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        
        .btn-submit { display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--gold-primary), #b58d22); color: #000; padding: 20px; border-radius: 12px; font-weight: 900; border: none; width: 100%; cursor: pointer; font-size: 1.25rem; transition: 0.2s; box-shadow: 0 5px 20px rgba(212,175,55,0.2); }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(212,175,55,0.4); }

        /* 📄 리포트 영역 */
        .report-wrapper { background: var(--bg-report); border: 1px solid var(--border-line); border-radius: 16px; padding: 50px 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); margin-bottom: 30px; position: relative; overflow:hidden;}
        
        .r-header { text-align: center; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid var(--border-line); }
        .r-header h2 { font-size: 2.2rem; font-weight: 900; color: #fff; letter-spacing: -1px; margin-bottom: 15px;}
        
        /* 듀얼 명식 테이블 */
        .dual-bazi-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px;}
        .bazi-wrap h4 { text-align: center; color: var(--text-main); margin-bottom: 10px; font-weight: 800;}
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: rgba(0,0,0,0.3); padding: 15px 8px; border-radius: 12px; border: 1px solid var(--border-line); }
        .bazi-col { text-align: center; display: flex; flex-direction: column; gap: 4px;}
        .bazi-header { font-size: 0.8rem; color: var(--text-muted); font-weight: 600;}
        .bazi-char { font-size: 1.6rem; font-weight: 900; color: #fff; padding: 8px 0; background: rgba(255,255,255,0.03); border-radius: 8px; border: 1px solid var(--border-light); }
        .bazi-day-master { border-color: var(--gold-primary) !important; background: rgba(212,175,55,0.1) !important; color: var(--gold-light) !important; }

        /* 비교 오행 그래프 */
        .element-chart-container { margin: 40px 0; padding: 35px 30px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border-line); }
        .element-chart-container h4 { color: #fff; font-size: 1.25rem; margin-bottom: 10px; text-align: center; font-weight: 800;}
        .chart-legend { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 25px;}
        .bar-wrap { margin-bottom: 18px; }
        .bar-label { display: flex; justify-content: space-between; font-weight: 700; font-size: 0.95rem; margin-bottom: 6px; color: var(--text-main); }
        .bar-bg { width: 100%; height: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; display: flex; }
        .bar-me { height: 100%; background: var(--color-me); transition: width 1.5s ease-out; }
        .bar-partner { height: 100%; background: var(--color-partner); transition: width 1.5s ease-out; }

        /* 섹션 공통 */
        .r-section { margin-bottom: 55px; }
        .r-section h3 { font-size: 1.4rem; color: #fff; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; font-weight: 800;}
        .r-section h3::before { content: ''; display:inline-block; width:5px; height:20px; background:var(--gold-primary); border-radius:3px;}
        .r-content { font-size: 1.1rem; line-height: 1.9; color: var(--text-main); text-align: justify;} 
        
        /* 분석 근거 박스 (벤치마킹 핵심) */
        .basis-box { background: rgba(88,166,255,0.05); padding: 20px 25px; margin-bottom: 25px; border-radius: 12px; font-size: 0.95rem; color: #a1b0c0; line-height: 1.7; border-left: 4px solid var(--color-info);}
        .basis-box strong { color: var(--color-info); font-weight: 800; margin-right: 5px; }
        .basis-box .magnify { font-size: 1.15rem; vertical-align: middle; margin-right: 5px;}
        
        .r-content strong { color: #fff; font-weight: 800; }
        .highlight { color: var(--gold-light); font-weight: 800; }
        
        .r-conclusion { margin-top: 60px; padding: 35px 30px; background: rgba(212,175,55,0.05); border-radius: 16px; border: 1px solid rgba(212,175,55,0.2); text-align: center; }
        .r-conclusion h3 { font-size: 1.4rem; color: var(--gold-light); margin-bottom: 15px; font-weight: 900;}

        /* 로더 연출 */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,7,10,0.95); z-index: 100000; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(5px);} 
        .spinner { width: 55px; height: 55px; border: 4px solid transparent; border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 0.8s cubic-bezier(0.5, 0, 0.5, 1) infinite; margin-bottom:25px;} 
        .loading-txt { color: var(--gold-light); font-size: 1.25rem; font-weight: 700; letter-spacing: 1px;}
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .modal { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #161b22; color: #fff; padding: 20px 25px; border-radius: 12px; z-index: 100001; text-align: center; width: 90%; max-width: 320px; border: 1px solid var(--border-line); box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
        
        @media (max-width: 768px) { 
            .dual-input-container, .dual-bazi-container { grid-template-columns: 1fr; }
            .report-wrapper { padding: 40px 20px; border-radius:0; border-left:none; border-right:none;} 
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div id="loader-text" class="loading-txt">운명 교차점 스캔 중...</div></div>

<div id="custom-modal" class="modal">
    <h3 id="modal-title" style="margin-bottom:8px; font-size:1.05rem; color:var(--color-danger);">System</h3>
    <p id="modal-msg" style="margin-bottom:15px; font-size:0.95rem; color:var(--text-muted);"></p>
    <button onclick="document.getElementById('custom-modal').style.display='none'" style="background:#fff; color:#000; border:none; padding:8px 20px; border-radius:8px; font-weight:600; cursor:pointer;">확인</button>
</div>

<div class="app-container">
    <div id="input-view">
        <div class="hero">
            <h1>궁합 분석</h1>
            <p>두 사람의 생년월일시를 교차 연산합니다</p>
        </div>
        
        <div class="dual-input-container">
            <div class="input-card">
                <h2>나의 사주 정보</h2>
                <div class="form-group"><label>이름</label><input type="text" id="me-name" class="form-control" placeholder="내 이름"></div>
                <div class="form-group"><label>생년월일</label>
                    <div class="grid-row"><select id="me-year" class="form-control"></select><select id="me-month" class="form-control"></select><select id="me-day" class="form-control"></select></div>
                </div>
                <div class="form-group grid-half">
                    <div><label>성별</label><select id="me-gender" class="form-control"><option value="male">남성</option><option value="female">여성</option></select></div>
                    <div><label>역법</label><select id="me-cal" class="form-control"><option value="solar">양력</option><option value="lunar">음력</option></select></div>
                </div>
                <div class="form-group">
                    <label>태어난 시각</label>
                    <select id="me-time" class="form-control">
                        <option value="none">모름 (3주 6자로 분석)</option>
                        <option value="2">축시 (01:30~)</option><option value="4">인시 (03:30~)</option><option value="12">오시 (11:30~)</option>
                        </select>
                </div>
            </div>

            <div class="input-card">
                <h2>상대방 사주 정보</h2>
                <div class="form-group"><label>이름</label><input type="text" id="partner-name" class="form-control" placeholder="상대방 이름"></div>
                <div class="form-group"><label>생년월일</label>
                    <div class="grid-row"><select id="p-year" class="form-control"></select><select id="p-month" class="form-control"></select><select id="p-day" class="form-control"></select></div>
                </div>
                <div class="form-group grid-half">
                    <div><label>성별</label><select id="p-gender" class="form-control"><option value="female">여성</option><option value="male">남성</option></select></div>
                    <div><label>역법</label><select id="p-cal" class="form-control"><option value="solar">양력</option><option value="lunar">음력</option></select></div>
                </div>
                <div class="form-group">
                    <label>태어난 시각</label>
                    <select id="p-time" class="form-control">
                        <option value="none">모름 (3주 6자로 분석)</option>
                        <option value="2">축시 (01:30~)</option><option value="4">인시 (03:30~)</option><option value="12">오시 (11:30~)</option>
                    </select>
                </div>
            </div>
        </div>
        <button class="btn-submit" onclick="SaaSFrontend.requestReport()">운명 교차점 분석 시작</button>
    </div>

    <div id="report-view" style="display:none;">
        <div class="report-wrapper" id="capture-target">
            <div class="r-header">
                <h2 id="r-title-name">운명 교차점 리포트</h2>
                <p style="color:var(--gold-primary); font-size:1.1rem; font-weight:700;">종합 궁합 지수: <span id="r-score" style="font-size:1.5rem;"></span>점</p>
            </div>

            <div class="dual-bazi-container" id="r-dual-bazi"></div>

            <div class="element-chart-container" id="r-element-chart"></div>
            
            <div id="dynamic-sections"></div>

            <div class="r-conclusion" id="r-conclusion-box"></div>
        </div>
        
        <button class="btn-submit" onclick="location.reload()" style="background:var(--border-light); color:#fff; margin-top:20px;">다시 분석하기</button>
    </div>
</div>

<script>
/**
 * ============================================================================
 * 🔒 [SERVER-SIDE CODE] : 궁합 전문 코어 엔진 (벤치마킹)
 * ============================================================================
 */
const CompatibilityEngine = (() => {
    const ELEMENTS = {
        '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水',
        '寅': '木', '卯': '木', '巳': '火', '午': '火', '辰': '土', '戌': '土', '丑': '土', '未': '土', '申': '金', '酉': '金', '亥': '水', '子': '水'
    };

    const RELATIONS = {
        '木': { gen: '火', ctrl: '土', ctrlBy: '金', genBy: '水' },
        '火': { gen: '土', ctrl: '金', ctrlBy: '水', genBy: '木' },
        '土': { gen: '金', ctrl: '水', ctrlBy: '木', genBy: '火' },
        '金': { gen: '水', ctrl: '木', ctrlBy: '火', genBy: '土' },
        '水': { gen: '木', ctrl: '火', ctrlBy: '土', genBy: '金' }
    };

    // 지지 충/합/원진 판별기
    const ZHI_CHONG = ['子午','丑未','寅申','卯酉','辰戌','巳亥','午子','未丑','申寅','酉卯','戌辰','亥巳'];
    const ZHI_HAP = ['子丑','寅亥','卯戌','辰酉','巳申','午未','丑子','亥寅','戌卯','酉辰','申巳','未午'];
    const ZHI_WONJIN = ['子未','丑午','寅酉','卯申','辰亥','巳戌','未子','午丑','酉寅','申卯','亥辰','戌巳'];

    const getBaziData = (req) => {
        let hr = req.h !== 'none' ? parseInt(req.h) : 12;
        let lun = req.cal === 'solar' ? window.Solar.fromYmdHms(req.y, req.m, req.d, hr, 0, 0).getLunar() : window.Lunar.fromYmdHms(req.y, req.m, req.d, hr, 0, 0);
        const b = lun.getEightChar();
        return {
            name: req.name,
            dayGan: b.getDayGan(), dayZhi: b.getDayZhi(),
            stems: [b.getYearGan(), b.getMonthGan(), b.getDayGan(), req.h!=='none'?b.getTimeGan():'-'],
            branches: [b.getYearZhi(), b.getMonthZhi(), b.getDayZhi(), req.h!=='none'?b.getTimeZhi():'-']
        };
    };

    const calcElements = (bazi) => {
        let scores = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
        [...bazi.stems, ...bazi.branches].forEach(c => { if(ELEMENTS[c]) scores[ELEMENTS[c]] += 10; });
        return scores;
    };

    return { analyze: async (meReq, partnerReq) => {
        const me = getBaziData(meReq);
        const p = getBaziData(partnerReq);
        const meEl = calcElements(me);
        const pEl = calcElements(p);
        
        // 1. 일간 궁합 (나의 본질 vs 상대의 본질)
        const meCore = ELEMENTS[me.dayGan];
        const pCore = ELEMENTS[p.dayGan];
        let coreDesc = "", coreTitle = "";
        let totalScore = 70; // 기본 점수

        if (meCore === pCore) {
            coreTitle = "비견 (어깨를 나란히 하는 친구)";
            coreDesc = `두 사람 모두 <b>${meCore}</b>의 기운을 코어로 삼고 있습니다. 가치관과 행동 패턴이 비슷하여 말이 잘 통하는 베스트 프렌드 같은 연애를 합니다. 하지만 의견 충돌 시 서로 굽히지 않아 평행선을 달릴 수 있습니다.`;
            totalScore += 5;
        } else if (RELATIONS[meCore].gen === pCore) {
            coreTitle = "상생 (내가 기운을 주는 관계)";
            coreDesc = `나의 <b>${meCore}</b> 기운이 상대방의 <b>${pCore}</b> 기운을 조건 없이 생(生)해주는 헌신적인 구조입니다. 내가 상대를 더 많이 챙기고 보듬어주며 큰 보람을 느낍니다.`;
            totalScore += 15;
        } else if (RELATIONS[meCore].genBy === pCore) {
            coreTitle = "상생 (내가 보호받는 관계)";
            coreDesc = `상대방의 <b>${pCore}</b> 기운이 나의 <b>${meCore}</b> 기운을 끊임없이 지원하고 생(生)해줍니다. 상대방의 넓은 품에서 심리적 안정과 큰 사랑을 받게 되는 아주 좋은 궁합입니다.`;
            totalScore += 15;
        } else if (RELATIONS[meCore].ctrl === pCore || RELATIONS[meCore].ctrlBy === pCore) {
            coreTitle = "상극 (강한 끌림과 통제)";
            coreDesc = `<b>${meCore}</b>와 <b>${pCore}</b>는 명리학적으로 서로를 제어하는 상극(相剋) 관계입니다. 자신에게 없는 낯선 매력에 초기에는 강렬하게 이끌리지만, 서로를 통제하려는 성향 탓에 잦은 주도권 싸움이 발생할 수 있습니다.`;
            totalScore -= 5;
        }

        // 2. 일지 궁합 (배우자궁의 결합)
        const dayZhiPair = me.dayZhi + p.dayZhi;
        let zhiDesc = "", zhiTitle = "무난한 배우자궁";
        if (ZHI_HAP.includes(dayZhiPair)) {
            zhiTitle = "지장간의 완벽한 결합 (합)"; zhiDesc = `두 사람의 배우자 자리가 자석처럼 강하게 끌어당기는 합(合)의 관계입니다. 육체적, 정신적 유대감이 몹시 깊고 떨어져 있기 힘든 끈끈한 결속력을 자랑합니다.`; totalScore += 15;
        } else if (ZHI_CHONG.includes(dayZhiPair)) {
            zhiTitle = "강렬한 부딪힘 (충)"; zhiDesc = `배우자 자리가 정면으로 충돌하는 충(沖)의 관계입니다. 스파크가 강하게 튀어 연애 초기 발전 속도는 빠르나, 다툼이 잦고 이별수가 내재되어 있어 서로의 선을 지키는 쿨한 관계가 요구됩니다.`; totalScore -= 10;
        } else if (ZHI_WONJIN.includes(dayZhiPair)) {
            zhiTitle = "이유 없는 서운함 (원진)"; zhiDesc = `배우자 자리에 원진살(怨嗔)이 끼어 있습니다. 뚜렷한 이유 없이 서로가 밉거나 서운함이 축적되기 쉬우니, 감정이 상했을 때는 즉각적으로 솔직하게 대화로 풀어내는 훈련이 절대적입니다.`; totalScore -= 10;
        } else {
            zhiDesc = `두 사람의 배우자 자리는 특별한 부딪힘이나 얽힘 없이 독립적이고 평온한 상태를 유지합니다. 각자의 사생활을 존중하며 잔잔하게 관계를 이어갈 수 있습니다.`;
        }

        let sections = [
            {
                title: "1. 코어 에너지 교차 (일간 궁합)",
                paragraphs: [
                    `<div class="basis-box"><span class="magnify">🔍</span><strong>[분석 근거]</strong> 나의 본질인 일간 <b>${me.dayGan}(${meCore})</b>과 상대의 본질인 <b>${p.dayGan}(${pCore})</b>의 상호작용을 계산했습니다.</div>`,
                    `<b>[결과: ${coreTitle}]</b><br>${coreDesc}`
                ]
            },
            {
                title: "2. 배우자궁 결속력 (일지 궁합)",
                paragraphs: [
                    `<div class="basis-box"><span class="magnify">🔍</span><strong>[분석 근거]</strong> 두 사람의 안방과 속궁합을 의미하는 일지 <b>${me.dayZhi}</b>와 <b>${p.dayZhi}</b>의 형충회합(刑沖會合)을 정밀 판독했습니다.</div>`,
                    `<b>[결과: ${zhiTitle}]</b><br>${zhiDesc}`
                ]
            }
        ];

        return { statusCode: 200, data: { me, partner: p, meEl, pEl, totalScore, sections } };
    }};
})();

/**
 * =====================================================================
 * 🎨 [FRONTEND LAYER] : UI / 렌더링 / 제어 (벤치마킹 반영)
 * =====================================================================
 */
window.MockAPI = { post: async (payload) => { return await CompatibilityEngine.analyze(payload.me, payload.partner); } };

const SaaSFrontend = (() => {
    const showMsg = (msg, isError = false) => {
        const modal = document.getElementById('custom-modal');
        const msgEl = document.getElementById('modal-msg');
        if(msgEl) msgEl.textContent = msg;
        modal.style.display = 'block';
    };

    const createSafeDOM = (htmlString) => {
        const p = document.createElement('p');
        const parts = htmlString.split(/(<div class="basis-box">.*?<\/div>|<b>.*?<\/b>|<br\s*\/?>|\n)/gi);
        parts.forEach(part => {
            if (!part) return;
            const lower = part.toLowerCase();
            if (lower === '\n' || lower === '<br>' || lower === '<br/>') p.appendChild(document.createElement('br'));
            else if (lower.startsWith('<div class="basis-box">')) { 
                const div = document.createElement('div'); div.className = 'basis-box';
                div.innerHTML = part.slice(23, -6).replace(/<br\s*\/?>/gi, '<br>'); p.appendChild(div);
            }
            else if (lower.startsWith('<b>')) { const b = document.createElement('strong'); b.innerHTML = part.slice(3, -4); p.appendChild(b); }
            else p.appendChild(document.createTextNode(part));
        });
        return p;
    };

    const renderBaziHTML = (bazi, title) => {
        return `
            <div class="bazi-wrap">
                <h4>${title}</h4>
                <div class="bazi-grid">
                    <div class="bazi-col"><div class="bazi-header">시주</div><div class="bazi-char">${bazi.stems[3]}</div><div class="bazi-char">${bazi.branches[3]}</div></div>
                    <div class="bazi-col"><div class="bazi-header" style="color:var(--gold-primary);">일주(본질)</div><div class="bazi-char bazi-day-master">${bazi.stems[2]}</div><div class="bazi-char">${bazi.branches[2]}</div></div>
                    <div class="bazi-col"><div class="bazi-header">월주</div><div class="bazi-char">${bazi.stems[1]}</div><div class="bazi-char">${bazi.branches[1]}</div></div>
                    <div class="bazi-col"><div class="bazi-header">년주</div><div class="bazi-char">${bazi.stems[0]}</div><div class="bazi-char">${bazi.branches[0]}</div></div>
                </div>
            </div>
        `;
    };

    const requestReport = () => {
        const payload = {
            me: { name: document.getElementById('me-name').value || '나', y: parseInt(document.getElementById('me-year').value), m: parseInt(document.getElementById('me-month').value), d: parseInt(document.getElementById('me-day').value), h: document.getElementById('me-time').value, cal: document.getElementById('me-cal').value },
            partner: { name: document.getElementById('partner-name').value || '상대', y: parseInt(document.getElementById('p-year').value), m: parseInt(document.getElementById('p-month').value), d: parseInt(document.getElementById('p-day').value), h: document.getElementById('p-time').value, cal: document.getElementById('p-cal').value }
        };

        document.getElementById('loader').style.display = 'flex';
        const loaderText = document.querySelector('.loading-txt');
        const msgs = ["일간 교차 연산 중...", "배우자궁 형충회합 스캔...", "오행 밸런스 매칭 중..."];
        let mIdx = 0; setInterval(() => { mIdx = (mIdx+1)%msgs.length; loaderText.textContent = msgs[mIdx]; }, 800);

        setTimeout(async () => {
            const res = await window.MockAPI.post(payload);
            const data = res.data;
            
            document.getElementById('r-title-name').textContent = `${data.me.name} 님과 ${data.partner.name} 님의 궁합`;
            document.getElementById('r-score').textContent = data.totalScore;
            
            document.getElementById('r-dual-bazi').innerHTML = renderBaziHTML(data.me, `나 (${data.me.name})`) + renderBaziHTML(data.partner, `상대방 (${data.partner.name})`);
            
            let chartHTML = `<div class="chart-legend"><span style="color:var(--color-me)">■ 나의 기운</span> / <span style="color:var(--color-partner)">■ 상대 기운</span></div>`;
            ['木','火','土','金','水'].forEach(el => {
                let m = data.meEl[el] || 0, p = data.pEl[el] || 0;
                let total = (m+p) || 1;
                chartHTML += `<div class="bar-wrap"><div class="bar-label"><span>${el}</span></div><div class="bar-bg"><div class="bar-me" style="width:${(m/total)*100}%"></div><div class="bar-partner" style="width:${(p/total)*100}%"></div></div></div>`;
            });
            document.getElementById('r-element-chart').innerHTML = '<h4>오행 융합 지표</h4>' + chartHTML;

            const wrap = document.getElementById('dynamic-sections'); wrap.innerHTML = '';
            data.sections.forEach(sec => {
                const secDiv = document.createElement('div'); secDiv.className = 'r-section';
                const title = document.createElement('h3'); title.textContent = sec.title; secDiv.appendChild(title);
                const content = document.createElement('div'); content.className = 'r-content';
                sec.paragraphs.forEach(p => content.appendChild(createSafeDOM(p)));
                secDiv.appendChild(content); wrap.appendChild(secDiv);
            });

            document.getElementById('r-conclusion-box').innerHTML = `<h3>운명뿌리 종합 제언</h3><p>궁합은 정해진 결론이 아닙니다. 서로 다름을 시각적으로 인지하고, 부족한 오행을 상대방에게서 발견하며 채워나가는 '이해의 과정'입니다. 두 분의 관계를 더욱 아름답게 가꾸어 나가시길 바랍니다.</p>`;

            document.getElementById('loader').style.display = 'none';
            document.getElementById('input-view').style.display = 'none';
            document.getElementById('report-view').style.display = 'block';
            window.scrollTo(0,0);
        }, 3000);
    };

    const init = () => {
        ['me-', 'p-'].forEach(prefix => {
            const ys = document.getElementById(prefix+'year'), ms = document.getElementById(prefix+'month'), ds = document.getElementById(prefix+'day');
            if(ys && ms && ds) {
                for(let i=2026; i>=1940; i--) ys.add(new Option(i+'년', i));
                for(let i=1; i<=12; i++) ms.add(new Option(i+'월', i));
                for(let i=1; i<=31; i++) ds.add(new Option(i+'일', i));
                ys.value = 1990; ms.value = 1; ds.value = 1; 
            }
        });
    };

    return { init, requestReport };
})();

window.onload = SaaSFrontend.init;
</script>
</body>
</html>
