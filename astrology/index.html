<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 점성술 천궁도 분석</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-base: #030509; --gold-primary: #d4af37; --gold-light: #f9e596; --text-muted: #9aa4b2; --border-glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
        body { background: var(--bg-base); color: #fff; line-height: 1.6; min-height: 100vh; position: relative; overflow-x: hidden; }
        body::before { content: ''; position: absolute; width: 350px; height: 350px; background: rgba(162, 155, 254, 0.12); filter: blur(120px); top: 5%; left: -100px; z-index: 0; }
        body::after { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(212, 175, 55, 0.06); filter: blur(100px); bottom: 10%; right: -50px; z-index: 0; }
        .app-container { max-width: 700px; margin: 0 auto; padding: 50px 20px 100px; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1.5px; margin: 0; background: linear-gradient(180deg, #fff 0%, #a1a1a1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 24px; padding: 40px 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 0.9rem; }
        .form-control { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; font-size: 1rem; outline: none; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 18px; border-radius: 30px; font-weight: 800; font-size: 1.1rem; cursor: pointer; border: none; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--gold-primary); color: #000; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3); }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,5,9,0.98); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .orbit { width: 60px; height: 60px; border: 2px solid var(--gold-primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #report-view { display: none; }
        .big3-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 35px; }
        .big3-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 16px; padding: 20px 10px; text-align: center; }
        .r-section { margin-bottom: 40px; text-align: left; }
        .r-section h3 { font-size: 1.35rem; margin-bottom: 15px; border-left: 4px solid var(--gold-primary); padding-left: 12px; font-weight: 800; }
        .basis-box { background: rgba(88,166,255,0.05); padding: 18px; border-radius: 12px; font-size: 0.85rem; color: #a1b0c0; margin-bottom: 15px; border-left: 3px solid #58a6ff; }
        .cta-box { margin-top: 40px; padding: 30px 20px; border-radius: 20px; background: rgba(212,175,55,0.08); border: 1px solid var(--gold-primary); text-align: center; }
        @media (max-width: 600px) { .big3-grid { grid-template-columns: 1fr; } .big3-card { display: flex; align-items: center; justify-content: space-around; padding: 15px; } }
    </style>
</head>
<body>
<div id="loader"><div class="orbit"></div><div style="color:var(--gold-light); font-weight:700;">실시간 행성 궤도 산출 중...</div></div>
<div class="app-container">
    <div id="input-view">
        <div class="header"><h1>점성술 천궁도</h1><p>물리적 행성 위치를 추적하는 정밀 분석 시스템</p></div>
        <div class="glass-card">
            <div class="form-group"><label>이름</label><input type="text" id="u-name" class="form-control" placeholder="운명뿌리"></div>
            <div class="form-group"><label>태어난 날짜 (양력)</label>
                <div class="grid-row"><select id="u-year" class="form-control"></select><select id="u-month" class="form-control"></select><select id="u-day" class="form-control"></select></div>
            </div>
            <div class="form-group grid-half">
                <div><label>태어난 시간 (24H)</label><select id="u-time" class="form-control">
                    <script>for(let i=0; i<24; i++) document.write(`<option value="${i}">${i.toString().padStart(2,'0')}:00</option>`);</script>
                </select></div>
                <div><label>태어난 지역</label><select id="u-location" class="form-control">
                    <option value="SEOUL">서울/경기 (37.5°N)</option><option value="BUSAN">경남/부산 (35.1°N)</option><option value="DAEJEON">충청/대전 (36.3°N)</option><option value="GWANGJU">전라/광주 (35.1°N)</option><option value="JEJU">제주 (33.4°N)</option><option value="OVERSEAS">해외 (GMT 0° 기준)</option>
                </select></div>
            </div>
            <button class="btn btn-primary" onclick="Core.run()">리얼 천궁도 데이터 추출</button>
        </div>
    </div>
    <div id="report-view" class="glass-card">
        <div id="r-header" style="text-align:center; margin-bottom:30px;">
            <h2 id="r-name" style="font-weight:900;">리포트</h2>
            <p id="r-info" style="color:var(--gold-light); font-size:0.9rem; margin-top:5px;"></p>
        </div>
        <div class="big3-grid" id="r-big3"></div>
        <div id="dynamic-results"></div>
        <div id="cta-area"></div>
        <button class="btn btn-primary" onclick="location.href='../'" style="margin-top:30px; background:rgba(255,255,255,0.05); color:#fff;">🏠 홈으로</button>
    </div>
</div>

<script>
const Core = (() => {
    const ZODIAC = [
        { name: "양자리", icon: "♈", el: "Fire", sun: "강력한 추진력과 두려움 없는 개척자 정신을 가졌습니다.", moon: "감정 표현이 몹시 솔직하고 직선적입니다.", ris: "활기차고 에너지가 넘치며 당당한 첫인상을 남깁니다." },
        { name: "황소자리", icon: "♉", el: "Earth", sun: "흔들림 없는 안정감과 끈기의 아이콘입니다.", moon: "심리적 안정을 최우선으로 여기며 오감이 만족스러울 때 평화를 느낍니다.", ris: "신중하고 차분하며 고급스러운 아우라를 풍깁니다." },
        { name: "쌍둥이자리", icon: "♊", el: "Air", sun: "호기심 천국이자 정보의 마법사입니다.", moon: "감정조차도 이성적으로 분석하고 소통해야 직성이 풀립니다.", ris: "경쾌함과 지적인 호기심이 첫인상으로 드러납니다." },
        { name: "게자리", icon: "♋", el: "Water", sun: "강력한 모성애와 보호 본능을 지녔습니다.", moon: "내면의 감수성이 풍부하며 가족과 안정적인 둥지를 중시합니다.", ris: "다정하고 부드러우며 보호해주고 싶은 인상을 줍니다." },
        { name: "사자자리", icon: "♌", el: "Fire", sun: "태양의 지배를 받는 화려한 주인공입니다.", moon: "타인의 인정과 칭찬을 갈구하며 자존심이 매우 강합니다.", ris: "가만히 있어도 묘한 권위와 아우라가 뿜어져 나옵니다." },
        { name: "처녀자리", icon: "♍", el: "Earth", sun: "완벽을 추구하는 예리한 분석가입니다.", moon: "일상이 체계적으로 돌아갈 때 내면의 평화를 얻습니다.", ris: "단정하고 깔끔한 외모와 예의 바른 태도가 특징입니다." },
        { name: "천칭자리", icon: "♎", el: "Air", sun: "균형과 조화를 사랑하는 평화주의자입니다.", moon: "타인과 교류할 때 안정을 얻으며 공정함을 중시합니다.", ris: "매력적인 미소와 세련된 패션 감각을 지녔습니다." },
        { name: "전갈자리", icon: "♏", el: "Water", sun: "강렬한 집념과 꿰뚫어 보는 통찰력의 소유자입니다.", moon: "감정의 깊이가 깊고 강렬하며 흑백이 분명합니다.", ris: "비밀스럽고 강렬한 눈빛으로 상대를 압도합니다." },
        { name: "사수자리", icon: "♐", el: "Fire", sun: "한계를 모르는 자유로운 모험가입니다.", moon: "구속받는 것을 싫어하며 낙천적인 에너지를 가졌습니다.", ris: "호탕한 미소와 스포티하고 활기찬 인상을 줍니다." },
        { name: "염소자리", icon: "♑", el: "Earth", sun: "정상을 향해 포기를 모르는 야심가입니다.", moon: "책임감과 의무감을 내면의 최우선 순위로 둡니다.", ris: "애어른처럼 성숙하고 진지한 프로의 아우라가 있습니다." },
        { name: "물병자리", icon: "♒", el: "Air", sun: "미래를 앞서가는 혁신가이자 마이웨이입니다.", moon: "상황을 한 발짝 떨어져서 객관적으로 분석하려 합니다.", ris: "독특하고 톡톡 튀는 개성이 겉모습에서 드러납니다." },
        { name: "물고기자리", icon: "♓", el: "Water", sun: "무한한 상상력과 동정심을 가진 예술가입니다.", moon: "예민하고 영적인 내면을 지녀 예술적 감각이 뛰어납니다.", ris: "눈빛이 몽환적이고 부드러우며 신비로운 분위기를 풍깁니다." }
    ];

    const LOC = { 
        SEOUL: { lat: 37.5, lon: 127.0 }, BUSAN: { lat: 35.1, lon: 129.0 }, 
        DAEJEON: { lat: 36.3, lon: 127.3 }, GWANGJU: { lat: 35.1, lon: 126.8 }, 
        JEJU: { lat: 33.4, lon: 126.5 }, OVERSEAS: { lat: 0, lon: 0 } 
    };

    const run = () => {
        document.getElementById('loader').style.display = 'flex';
        const y = parseInt(document.getElementById('u-year').value), m = parseInt(document.getElementById('u-month').value), d = parseInt(document.getElementById('u-day').value), h = parseInt(document.getElementById('u-time').value);
        const locKey = document.getElementById('u-location').value;
        const coords = LOC[locKey];

        setTimeout(() => {
            const sunIdx = getSunIdx(m, d);
            const moonIdx = getMoonIdx(y, m, d, h);
            const risIdx = getAscIdx(y, m, d, h, coords.lat, coords.lon);
            render(sunIdx, moonIdx, risIdx, locKey);
            document.getElementById('loader').style.display = 'none';
        }, 3000);
    };

    const getSunIdx = (m, d) => {
        const dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22]; // 양자리~물고기자리 시작일
        return (d >= dates[m - 1]) ? (m + 9) % 12 : (m + 8) % 12;
    };

    const getMoonIdx = (y, m, d, h) => {
        const date = new Date(Date.UTC(y, m - 1, d, h - 9, 0, 0));
        const jd = (date.getTime() / 86400000) + 2440587.5;
        const T = jd - 2451545.0;
        let L = (218.316 + 13.176396 * T) % 360; if (L < 0) L += 360;
        let M = (134.963 + 13.064993 * T) % 360; if (M < 0) M += 360;
        let lambda = (L + 6.289 * Math.sin(M * Math.PI / 180)) % 360; if (lambda < 0) lambda += 360;
        return Math.floor(lambda / 30);
    };

    // 🌟 리얼 상승궁(Ascendant) 산출 공식
    const getAscIdx = (y, m, d, h, lat, lon) => {
        const date = new Date(Date.UTC(y, m - 1, d, h - 9, 0, 0));
        const jd = (date.getTime() / 86400000) + 2440587.5;
        const D = jd - 2451545.0;
        // GMST (그리니치 평균 항성시) 계산
        let gmst = (18.697374558 + 24.06570982441908 * D) % 24; if (gmst < 0) gmst += 24;
        // LST (지방 항성시) 계산
        let lst = (gmst + lon / 15) * 15; // 도 단위
        const eps = 23.439 * Math.PI / 180; // 황도 경사
        const phi = lat * Math.PI / 180; // 위도
        const RAMC = lst * Math.PI / 180;
        // 상승점 공식
        let asc = Math.atan2(Math.cos(RAMC), -Math.sin(RAMC) * Math.cos(eps) - Math.tan(phi) * Math.sin(eps));
        let ascDeg = (asc * 180 / Math.PI + 360 + 90) % 360;
        return Math.floor(ascDeg / 30);
    };

    const render = (s, m, r, loc) => {
        const name = document.getElementById('u-name').value || '게스트';
        document.getElementById('r-name').innerText = `${name} 님의 정밀 천궁도`;
        document.getElementById('r-info').innerText = `Location: ${loc} (Lat: ${LOC[loc].lat}°)`;
        document.getElementById('r-big3').innerHTML = `
            <div class="big3-card"><p style="font-size:0.7rem; color:var(--text-muted);">SUN</p><p style="font-size:2rem;">${ZODIAC[s].icon}</p><p style="font-weight:700;">${ZODIAC[s].name}</p></div>
            <div class="big3-card"><p style="font-size:0.7rem; color:var(--text-muted);">MOON</p><p style="font-size:2rem;">${ZODIAC[m].icon}</p><p style="font-weight:700;">${ZODIAC[m].name}</p></div>
            <div class="big3-card"><p style="font-size:0.7rem; color:var(--text-muted);">RISING</p><p style="font-size:2rem;">${ZODIAC[r].icon}</p><p style="font-weight:700;">${ZODIAC[r].name}</p></div>
        `;
        document.getElementById('dynamic-results').innerHTML = `
            <div class="r-section"><div class="basis-box">🔎 <strong>[태양 위치 추적]</strong> 당신의 자아를 결정하는 핵심 에너지를 포착했습니다.</div><h3>☀️ 태양궁: ${ZODIAC[s].name}</h3><p>${ZODIAC[s].sun}</p></div>
            <div class="r-section"><div class="basis-box">🔎 <strong>[달 궤도 역학]</strong> 무의식과 감정의 파동을 물리적으로 계산했습니다.</div><h3>🌙 달궁: ${ZODIAC[m].name}</h3><p>${ZODIAC[m].moon}</p></div>
            <div class="r-section"><div class="basis-box">🔎 <strong>[지평선 좌표 연산]</strong> 탄생 순간 동쪽 하늘의 별자리를 산출했습니다.</div><h3>🌅 상승궁: ${ZODIAC[r].name}</h3><p>${ZODIAC[r].ris}</p></div>
        `;
        const link = (ZODIAC[s].el === 'Earth' || ZODIAC[s].el === 'Fire') ? 'https://link.coupang.com/a/eu5uLR' : 'https://link.coupang.com/a/eu5td7';
        document.getElementById('cta-area').innerHTML = `
            <div class="cta-box">
                <p style="font-weight:800; margin-bottom:15px;">✨ 우주적 에너지 보완 행운템</p>
                <a href="${link}" target="_blank" class="btn btn-primary" style="padding:12px 25px; font-size:1rem;">추천 아이템 확인하기 ></a>
            </div>
        `;
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        window.scrollTo(0,0);
    };

    return { run, init: () => {
        const ys = document.getElementById('u-year'), ms = document.getElementById('u-month'), ds = document.getElementById('u-day');
        for(let i=new Date().getFullYear(); i>=1940; i--) ys.add(new Option(i+'년', i));
        for(let i=1; i<=12; i++) ms.add(new Option(i+'월', i));
        for(let i=1; i<=31; i++) ds.add(new Option(i+'일', i));
        ys.value = 1995;
    }};
})();
Core.init();
</script>
</body>
</html>
