<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 점성술 천궁도 분석</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-base: #030509; --gold-primary: #d4af37; --gold-light: #f9e596; --text-muted: #9aa4b2; --border-glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
        body { background: var(--bg-base); color: #fff; line-height: 1.6; min-height: 100vh; position: relative; overflow-x: hidden; }
        body::before { content: ''; position: absolute; width: 350px; height: 350px; background: rgba(162, 155, 254, 0.12); filter: blur(120px); top: 5%; left: -100px; z-index: 0; }
        body::after { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(212, 175, 55, 0.06); filter: blur(100px); bottom: 10%; right: -50px; z-index: 0; }
        .app-container { max-width: 750px; margin: 0 auto; padding: 50px 20px 100px; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1.5px; margin: 0; background: linear-gradient(180deg, #fff 0%, #a1a1a1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 24px; padding: 40px 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 0.95rem; }
        .form-control { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; font-size: 1.05rem; outline: none; }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 18px; border-radius: 30px; font-weight: 800; font-size: 1.15rem; cursor: pointer; border: none; width: 100%; transition: 0.2s; }
        .btn-primary { background: var(--gold-primary); color: #000; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3); }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,5,9,0.98); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .orbit { width: 60px; height: 60px; border: 2px solid var(--gold-primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #report-view { display: none; }
        
        .log-box { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(88, 166, 255, 0.3); border-radius: 16px; padding: 25px; margin-bottom: 40px; font-size: 0.95rem; color: #a1b0c0; line-height: 1.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .log-box h4 { color: var(--color-info); margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px dashed rgba(88, 166, 255, 0.3); padding-bottom: 10px; font-weight: 800; }
        .log-item { margin-bottom: 15px; }
        .log-item:last-child { margin-bottom: 0; }
        .log-title { color: #fff; font-weight: 700; display: block; margin-bottom: 4px; }
        .log-formula { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 5px; font-family: monospace; overflow-x: auto;}

        .big3-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 45px; }
        .big3-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 16px; padding: 25px 15px; text-align: center; }
        .r-section { margin-bottom: 50px; text-align: left; }
        .r-section h3 { font-size: 1.5rem; margin-bottom: 20px; border-left: 4px solid var(--gold-primary); padding-left: 15px; font-weight: 900; color: #fff; }
        
        .theory-box { background: rgba(212,175,55,0.05); padding: 20px; border-radius: 12px; font-size: 0.95rem; color: var(--gold-light); margin-bottom: 20px; border-left: 3px solid var(--gold-primary); line-height: 1.7; font-weight: 300;}
        .theory-box strong { font-weight: 800; color: #fff; }
        .result-content { font-size: 1.1rem; line-height: 1.9; color: #d1d5db; text-align: justify; padding: 0 10px;}
        
        /* 🤫 С텔스 마케팅 CSS - 튀지 않게 글과 자연스럽게 어우러짐 */
        .stealth-advice { margin-top: 50px; padding: 25px; border-radius: 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .stealth-advice h4 { color: var(--gold-primary); font-size: 1.15rem; margin-bottom: 12px; font-weight: 800; }
        .stealth-advice p { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 15px; }
        .link-stealth { display: inline-flex; align-items: center; color: var(--gold-light); font-size: 1rem; font-weight: 600; text-decoration: none; border-bottom: 1px solid rgba(249, 229, 150, 0.4); padding-bottom: 2px; transition: 0.2s;}
        .link-stealth:hover { color: #fff; border-color: #fff; }
        
        @media (max-width: 600px) { .grid-half { grid-template-columns: 1fr; } .big3-grid { grid-template-columns: 1fr; gap: 12px; } .big3-card { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; text-align: left; } }
    </style>
</head>
<body>
<div id="loader"><div class="orbit"></div><div style="color:var(--gold-light); font-weight:700; font-size:1.2rem;">천체 역학 궤도 산출 중...</div></div>
<div class="app-container">
    <div id="input-view">
        <div class="header"><h1>점성술 천궁도</h1><p>스위스 천문력(Ephemeris) 기반 정밀 운명 스캔</p></div>
        <div class="glass-card">
            <div class="form-group"><label>이름</label><input type="text" id="u-name" class="form-control" placeholder="홍길동"></div>
            <div class="form-group"><label>태어난 날짜 (양력)</label>
                <div class="grid-row"><select id="u-year" class="form-control"></select><select id="u-month" class="form-control"></select><select id="u-day" class="form-control"></select></div>
            </div>
            <div class="form-group grid-half">
                <div><label>현지 태어난 시간 (24H)</label><select id="u-time" class="form-control">
                    <script>for(let i=0; i<24; i++) document.write(`<option value="${i}">${i.toString().padStart(2,'0')}:00</option>`);</script>
                </select></div>
                <div><label>태어난 지역</label>
                <select id="u-location" class="form-control"></select></div>
            </div>
            <button class="btn btn-primary" onclick="Core.run()">리얼 천궁도 추출 시작</button>
        </div>
    </div>
    
    <div id="report-view" class="glass-card">
        <div id="r-header" style="text-align:center; margin-bottom:35px;">
            <h2 id="r-name" style="font-weight:900; font-size: 2rem;">리포트</h2>
            <p id="r-info" style="color:var(--gold-light); font-size:1rem; margin-top:8px; font-weight: 300;"></p>
        </div>
        
        <div class="log-box" id="r-log"></div>

        <div class="big3-grid" id="r-big3"></div>
        <div id="dynamic-results"></div>
        <div id="cta-area"></div>
        <button class="btn btn-primary" onclick="location.href='../'" style="margin-top:40px; background:rgba(255,255,255,0.05); color:#fff; border: 1px solid rgba(255,255,255,0.1); box-shadow: none;">🏠 메인 홈으로 돌아가기</button>
    </div>
</div>

<script>
const Core = (() => {
    const ZODIAC = [
        { name: "양자리", icon: "♈", el: "Fire", deg: "0°~30°", sun: "강력한 추진력과 두려움 없는 개척자 정신을 가졌습니다.", moon: "감정 표현이 몹시 솔직하고 직선적입니다.", ris: "활기차고 에너지가 넘치며 당당한 첫인상을 남깁니다." },
        { name: "황소자리", icon: "♉", el: "Earth", deg: "30°~60°", sun: "흔들림 없는 안정감과 끈기의 아이콘입니다.", moon: "심리적 안정을 최우선으로 여기며 오감이 만족스러울 때 평화를 느낍니다.", ris: "신중하고 차분하며 고급스러운 아우라를 풍깁니다." },
        { name: "쌍둥이자리", icon: "♊", el: "Air", deg: "60°~90°", sun: "호기심 천국이자 정보의 마법사입니다.", moon: "감정조차도 이성적으로 분석하고 소통해야 직성이 풀립니다.", ris: "경쾌함과 지적인 호기심이 첫인상으로 드러납니다." },
        { name: "게자리", icon: "♋", el: "Water", deg: "90°~120°", sun: "강력한 모성애와 보호 본능을 지녔습니다.", moon: "내면의 감수성이 풍부하며 가족과 안정적인 둥지를 중시합니다.", ris: "다정하고 부드러우며 보호해주고 싶은 인상을 줍니다." },
        { name: "사자자리", icon: "♌", el: "Fire", deg: "120°~150°", sun: "태양의 지배를 받는 화려한 주인공입니다.", moon: "타인의 인정과 칭찬을 갈구하며 자존심이 매우 강합니다.", ris: "가만히 있어도 묘한 권위와 아우라가 뿜어져 나옵니다." },
        { name: "처녀자리", icon: "♍", el: "Earth", deg: "150°~180°", sun: "완벽을 추구하는 예리한 분석가입니다.", moon: "일상이 체계적으로 돌아갈 때 내면의 평화를 얻습니다.", ris: "단정하고 깔끔한 외모와 예의 바른 태도가 특징입니다." },
        { name: "천칭자리", icon: "♎", el: "Air", deg: "180°~210°", sun: "균형과 조화를 사랑하는 평화주의자입니다.", moon: "타인과 교류할 때 안정을 얻으며 공정함을 중시합니다.", ris: "매력적인 미소와 세련된 패션 감각을 지녔습니다." },
        { name: "전갈자리", icon: "♏", el: "Water", deg: "210°~240°", sun: "강렬한 집념과 꿰뚫어 보는 통찰력의 소유자입니다.", moon: "감정의 깊이가 깊고 강렬하며 흑백이 분명합니다.", ris: "비밀스럽고 강렬한 눈빛으로 상대를 압도합니다." },
        { name: "사수자리", icon: "♐", el: "Fire", deg: "240°~270°", sun: "한계를 모르는 자유로운 모험가입니다.", moon: "구속받는 것을 싫어하며 낙천적인 에너지를 가졌습니다.", ris: "호탕한 미소와 스포티하고 활기찬 인상을 줍니다." },
        { name: "염소자리", icon: "♑", el: "Earth", deg: "270°~300°", sun: "정상을 향해 포기를 모르는 야심가입니다.", moon: "책임감과 의무감을 내면의 최우선 순위로 둡니다.", ris: "애어른처럼 성숙하고 진지한 프로의 아우라가 있습니다." },
        { name: "물병자리", icon: "♒", el: "Air", deg: "300°~330°", sun: "미래를 앞서가는 혁신가이자 마이웨이입니다.", moon: "상황을 한 발짝 떨어져서 객관적으로 분석하려 합니다.", ris: "독특하고 톡톡 튀는 개성이 겉모습에서 드러납니다." },
        { name: "물고기자리", icon: "♓", el: "Water", deg: "330°~360°", sun: "무한한 상상력과 동정심을 가진 예술가입니다.", moon: "예민하고 영적인 내면을 지녀 예술적 감각이 뛰어납니다.", ris: "눈빛이 몽환적이고 부드러우며 신비로운 분위기를 풍깁니다." }
    ];

    // 🌍 더 풍성해진 지역 데이터
    const LOC = { 
        SEOUL: { lat: 37.56, lon: 126.97, tz: 9, label: "한국 - 서울/경기/인천" },
        GANGWON: { lat: 37.82, lon: 128.15, tz: 9, label: "한국 - 강원도" },
        CHUNGCHEONG: { lat: 36.35, lon: 127.38, tz: 9, label: "한국 - 충청/대전/세종" },
        JEOLLA: { lat: 35.15, lon: 126.85, tz: 9, label: "한국 - 전라/광주" },
        GYEONGSANG_N: { lat: 35.87, lon: 128.60, tz: 9, label: "한국 - 경북/대구" },
        GYEONGSANG_S: { lat: 35.17, lon: 129.07, tz: 9, label: "한국 - 경남/부산/울산" },
        JEJU: { lat: 33.49, lon: 126.53, tz: 9, label: "한국 - 제주특별자치도" },
        TOKYO: { lat: 35.67, lon: 139.65, tz: 9, label: "아시아 - 일본 (도쿄)" },
        BEIJING: { lat: 39.90, lon: 116.40, tz: 8, label: "아시아 - 중국 (베이징)" },
        BANGKOK: { lat: 13.75, lon: 100.50, tz: 7, label: "아시아 - 동남아시아 (방콕)" },
        SYDNEY: { lat: -33.86, lon: 151.20, tz: 10, label: "오세아니아 - 호주 (시드니)" },
        DUBAI: { lat: 25.20, lon: 55.27, tz: 4, label: "중동 - UAE (두바이)" },
        LONDON: { lat: 51.50, lon: -0.12, tz: 0, label: "유럽 - 영국 (런던)" },
        PARIS: { lat: 48.85, lon: 2.35, tz: 1, label: "유럽 - 프랑스 (파리)" },
        NEWYORK: { lat: 40.71, lon: -74.00, tz: -5, label: "북미 - 미국 동부 (뉴욕)" },
        LA: { lat: 34.05, lon: -118.24, tz: -8, label: "북미 - 미국 서부 (LA)" },
        SAOPAULO: { lat: -23.55, lon: -46.63, tz: -3, label: "남미 - 브라질 (상파울루)" },
        UTC: { lat: 0, lon: 0, tz: 0, label: "기타 지역 (협정세계시 UTC)" }
    };

    const run = () => {
        document.getElementById('loader').style.display = 'flex';
        const y = parseInt(document.getElementById('u-year').value), m = parseInt(document.getElementById('u-month').value), d = parseInt(document.getElementById('u-day').value), h = parseInt(document.getElementById('u-time').value);
        const locKey = document.getElementById('u-location').value;
        const coords = LOC[locKey];

        setTimeout(() => {
            const dates = [20, 19, 21, 20, 21, 21, 23, 23, 23, 23, 22, 22]; 
            const sunIdx = (d >= dates[m - 1]) ? (m + 9) % 12 : (m + 8) % 12;

            const date = new Date(Date.UTC(y, m - 1, d, h - coords.tz, 0, 0));
            const jd = (date.getTime() / 86400000) + 2440587.5;
            const T = jd - 2451545.0; 
            
            let L = (218.316 + 13.176396 * T) % 360; if (L < 0) L += 360;
            let M = (134.963 + 13.064993 * T) % 360; if (M < 0) M += 360;
            let lambda = (L + 6.289 * Math.sin(M * Math.PI / 180)) % 360; if (lambda < 0) lambda += 360;
            const moonIdx = Math.floor(lambda / 30);

            let gmst = (18.697374558 + 24.06570982441908 * T) % 24; if (gmst < 0) gmst += 24;
            let lst = (gmst + coords.lon / 15) % 24; if (lst < 0) lst += 24;
            const eps = 23.439 * Math.PI / 180;
            const phi = coords.lat * Math.PI / 180;
            const RAMC = lst * 15 * Math.PI / 180;
            let asc = Math.atan2(Math.cos(RAMC), -Math.sin(RAMC) * Math.cos(eps) - Math.tan(phi) * Math.sin(eps));
            let ascDeg = (asc * 180 / Math.PI + 360 + 90) % 360;
            const risIdx = Math.floor(ascDeg / 30);

            const logData = { jd: jd.toFixed(2), t: T.toFixed(4), tz: coords.tz, lambda: lambda.toFixed(2), lst: lst.toFixed(2), ascDeg: ascDeg.toFixed(2) };
            render(sunIdx, moonIdx, risIdx, locKey, logData);
            document.getElementById('loader').style.display = 'none';
        }, 3000);
    };

    const render = (s, m, r, loc, log) => {
        const name = document.getElementById('u-name').value || '게스트';
        document.getElementById('r-name').innerText = `${name} 님의 정밀 천궁도 리포트`;
        document.getElementById('r-info').innerText = `Location: ${LOC[loc].label} (위도: ${LOC[loc].lat}°, 경도: ${LOC[loc].lon}°)`;
        
        document.getElementById('r-log').innerHTML = `
            <h4>Astro-Mechanics Computation Log</h4>
            <div class="log-item">
                <span class="log-title">1. 천문학적 기준일(Julian Date) 변환</span>
                입력하신 생년월일과 현지 시간을 협정 세계시(UTC)로 변환한 후, 점성학 계산의 기준점인 J2000.0(2000년 1월 1일 정오)으로부터 경과된 일수(\\(T\\))를 산출했습니다.
                <div class="log-formula">\\( T = JD - 2451545.0 = ${log.t} \\text{ days} \\)</div>
            </div>
            <div class="log-item">
                <span class="log-title">2. 달의 궤도 이심률(Eccentricity) 보정</span>
                달의 평균 황경(\\(L\\))과 근점각(\\(M\\))을 구한 뒤, 찌그러진 타원 궤도의 오차를 삼각함수로 보정하여 태어난 순간 달의 실제 위치인 진황경(\\(\\lambda\\))을 도출했습니다.
                <div class="log-formula">\\( \\lambda = (L + 6.289 \\times \\sin M) \\pmod{360} = ${log.lambda}^\\circ \\)</div>
            </div>
            <div class="log-item">
                <span class="log-title">3. 상승점(Ascendant) 지평 좌표 변환</span>
                선택하신 지역의 경도(${LOC[loc].lon}°)를 반영해 지방 항성시(LST: ${log.lst}H)를 구하고, 위도(${LOC[loc].lat}°)와 지구의 황도 경사각(\\(\\epsilon \\approx 23.4^\\circ\\))을 적용해 동쪽 지평선이 황도와 교차하는 각도를 계산했습니다.
                <div class="log-formula">\\( \\text{Asc} = \\arctan \\left( \\frac{\\cos(\\text{RAMC})}{-\\sin(\\text{RAMC}) \\cos \\epsilon - \\tan \\phi \\sin \\epsilon} \\right) = ${log.ascDeg}^\\circ \\)</div>
            </div>
        `;

        document.getElementById('r-big3').innerHTML = `
            <div class="big3-card"><p style="font-size:0.75rem; color:var(--text-muted); font-weight:800; letter-spacing:1px;">태양궁 (SUN)</p><p style="font-size:2.2rem; margin:10px 0; color:var(--gold-primary); filter: drop-shadow(0 0 8px rgba(212,175,55,0.4));">${ZODIAC[s].icon}</p><p style="font-weight:900; font-size:1.1rem;">${ZODIAC[s].name}</p></div>
            <div class="big3-card"><p style="font-size:0.75rem; color:var(--text-muted); font-weight:800; letter-spacing:1px;">달궁 (MOON)</p><p style="font-size:2.2rem; margin:10px 0; color:var(--gold-primary); filter: drop-shadow(0 0 8px rgba(212,175,55,0.4));">${ZODIAC[m].icon}</p><p style="font-weight:900; font-size:1.1rem;">${ZODIAC[m].name}</p></div>

                <div class="result-content">당신이 태어난 시기, 태양은 황도 <strong>${ZODIAC[s].deg}</strong> 구간인 ${ZODIAC[s].name}를 지나고 있었습니다.<br><br>${ZODIAC[s].sun}</div>

            <div class="r-section">
                <h3>🌙 달궁 (Moon Sign) : ${ZODIAC[m].name}</h3>

                <div class="result-content">탄생 순간 달의 진황경(True Longitude) 위치는 <strong>${ZODIAC[m].deg}</strong> 구간인 ${ZODIAC[m].name}였습니다.<br><br>${ZODIAC[m].moon}</div>
            </div>
            <div class="r-section">
                <h3>🌅 상승궁 (Rising Sign) : ${ZODIAC[r].name}</h3>
                <div class="theory-box"><strong>[상승궁의 의미]</strong> 지구가 자전함에 따라 <strong>태어난 정확한 순간, 동쪽 지평선(Ascendant)에 떠오르고 있던 별자리</strong>입니다. 태어난 지역의 위도와 경도, 분 단위의 시간에 따라 결과가 완전히 달라집니다. 타인이 나를 처음 보았을 때 느끼는 <strong>'첫인상'이자, 세상에 나아갈 때 쓰는 '사회적 페르소나(가면)'</strong>를 상징합니다.</div>
                <div class="result-content">해당 지역의 지평 좌표계 연산 결과, 동쪽 지평선은 <strong>${ZODIAC[r].deg}</strong> 구간인 ${ZODIAC[r].name}를 가리키고 있었습니다.<br><br>${ZODIAC[r].ris}</div>
            </div>
        `;

        const link = (ZODIAC[s].el === 'Earth' || ZODIAC[s].el === 'Fire') ? 'https://link.coupang.com/a/eu5uLR' : 'https://link.coupang.com/a/eu5td7';
        
        // 🤫 스텔스 마케팅 로직 적용 (노골적이지 않게, 정보를 주는 척하며 스며들기)
        document.getElementById('cta-area').innerHTML = `
            <div class="stealth-advice">
                <h4>💡 별자리 에너지를 채우는 일상 속 작은 변화</h4>
                <p>점성학에서는 타고난 기운의 불균형을 주변의 색상이나 물건으로 보완할 수 있다고 봅니다. 거창한 부적이 아니라, 일상에서 쉽게 접할 수 있는 소품만으로도 나만의 에너지를 정돈할 수 있습니다.</p>
                <a href="${link}" target="_blank" class="link-stealth">내 별자리에 맞는 시크릿 소품 조용히 찾아보기 ↗</a>
                <p style="margin-top: 15px; font-size: 0.7rem; color: rgba(255,255,255,0.15);">* 파트너스 활동을 통해 소정의 수수료를 제공받을 수 있습니다.</p>
            </div>
        `;
        
        if(window.MathJax) MathJax.typesetPromise();

        document.getElementById('input-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        window.scrollTo(0,0);
    };

    return { run, init: () => {
        const ys = document.getElementById('u-year'), ms = document.getElementById('u-month'), ds = document.getElementById('u-day');
        for(let i=new Date().getFullYear(); i>=1940; i--) ys.add(new Option(i+'년', i));
        for(let i=1; i<=12; i++) ms.add(new Option(i+'월', i));
        for(let i=1; i<=31; i++) ds.add(new Option(i+'일', i));
        ys.value = 1995;
        const locSelect = document.getElementById('u-location');
        for (const [key, value] of Object.entries(LOC)) locSelect.add(new Option(value.label, key));
    }};
})();
