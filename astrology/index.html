<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 점성술 천궁도 분석</title>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-base: #030509; 
            --bg-card: rgba(255, 255, 255, 0.02);
            --border-glass: rgba(255, 255, 255, 0.08);
            --gold-primary: #d4af37; 
            --gold-light: #f9e596; 
            --text-main: #d1d5db; 
            --text-muted: #8b949e; 
            --color-info: #58a6ff;
            /* 원소 컬러 */
            --el-fire: #ff6b6b;
            --el-earth: #f1c40f;
            --el-air: #a29bfe;
            --el-water: #74b9ff;
        }
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; word-break: keep-all; -webkit-tap-highlight-color: transparent;}
        body { background: var(--bg-base); color: #fff; line-height: 1.6; min-height: 100vh; position: relative; overflow-x: hidden; }

        /* 🌌 우주적인 오로라 배경 */
        body::before { content: ''; position: absolute; width: 350px; height: 350px; background: rgba(162, 155, 254, 0.15); filter: blur(120px); top: 10%; left: -100px; z-index: 0; }
        body::after { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(212, 175, 55, 0.08); filter: blur(100px); bottom: 10%; right: -50px; z-index: 0; }
        
        .app-container { max-width: 700px; margin: 0 auto; padding: 50px 20px 100px; position: relative; z-index: 1; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.6rem; font-weight: 900; letter-spacing: -1.5px; margin: 0; background: linear-gradient(180deg, #fff 0%, #a1a1a1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); margin-top: 10px; font-size: 1.05rem; font-weight: 300; }

        .glass-card {
            background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass); border-radius: 24px; padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); margin-bottom: 25px;
        }

        /* 📝 입력 폼 */
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-muted); font-size: 0.95rem; }
        .form-control { width: 100%; padding: 16px 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); color: #fff; font-size: 1.05rem; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--gold-primary); box-shadow: 0 0 10px rgba(212,175,55,0.1); }
        .grid-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 18px 28px; border-radius: 30px; font-weight: 800; font-size: 1.15rem;
            cursor: pointer; transition: 0.2s; border: none; width: 100%; margin-top: 15px;
        }
        .btn-primary { background: var(--gold-primary); color: #000; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3); }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); margin-top: 20px;}
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        /* 🔮 로더 연출 */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,5,9,0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .orbit-spinner {
            width: 70px; height: 70px; border-radius: 50%; border: 2px solid transparent;
            border-top-color: var(--gold-primary); border-bottom-color: var(--el-air);
            animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; margin-bottom: 30px; position: relative;
        }
        .orbit-spinner::before {
            content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border-radius: 50%; border: 2px solid transparent; border-left-color: var(--color-info); border-right-color: var(--el-fire);
            animation: spin 1s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-txt { color: var(--gold-light); font-size: 1.25rem; font-weight: 700; letter-spacing: 1px; text-align: center;}

        /* 📄 리포트 화면 */
        #report-view { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .r-header { text-align: center; margin-bottom: 40px; padding-bottom: 30px; border-bottom: 1px solid var(--border-glass); }
        .r-header h2 { font-size: 2.2rem; color: #fff; font-weight: 900; letter-spacing: -1px; margin-bottom: 15px; }
        .date-badge { display: inline-block; background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3); padding: 8px 20px; border-radius: 20px; color: var(--gold-light); font-size: 0.9rem; font-weight: 600; }

        .big3-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }
        .big3-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 16px; padding: 25px 15px; text-align: center; }
        .big3-card .planet { font-size: 0.85rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;}
        .big3-card .sign-icon { font-size: 2.5rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        .big3-card .sign-name { font-size: 1.2rem; font-weight: 800; color: #fff; }

        .r-section { margin-bottom: 45px; }
        .r-section h3 { font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; font-weight: 800; color: #fff; }
        .r-section h3::before { content: ''; display:inline-block; width:4px; height:20px; background:var(--gold-primary); border-radius:2px;}
        
        .basis-box { background: rgba(88,166,255,0.05); padding: 20px; border-radius: 12px; font-size: 0.95rem; color: #a1b0c0; margin-bottom: 15px; border-left: 3px solid #58a6ff; line-height: 1.6; }
        .r-content { font-size: 1.05rem; line-height: 1.8; color: var(--text-main); text-align: justify; }
        .r-content strong { color: var(--gold-light); font-weight: 700; }
        
        .cta-box { margin-top: 50px; padding: 40px 25px; border-radius: 20px; background: linear-gradient(145deg, #0b101a, #131924); border: 1px solid rgba(212,175,55,0.2); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-coupang { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: #fff; font-size: 1.15rem; font-weight: 800; padding: 18px 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; transition: 0.2s; margin-top: 20px;}
        .btn-coupang:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.05);}

        @media (max-width: 600px) { 
            .app-container { padding: 30px 15px 100px; } 
            .header h1 { font-size: 2.1rem; } 
            .glass-card { padding: 30px 20px; }
            .grid-row { grid-template-columns: 1fr; gap: 15px; }
            .big3-grid { grid-template-columns: 1fr; gap: 10px; }
            .big3-card { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; text-align: left; }
            .big3-card .sign-icon { margin-bottom: 0; font-size: 2rem; }
            .big3-card .planet { margin-bottom: 0; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="orbit-spinner"></div>
    <div id="loader-text" class="loading-txt">천궁도 데이터 파싱 중...</div>
</div>

<div class="app-container">
    <div id="input-view">
        <div class="header">
            <h1>점성술 천궁도</h1>
            <p>태어난 순간의 우주적 별자리 배열 정밀 스캔</p>
        </div>
        
        <div class="glass-card">
            <div class="form-group"><label>이름</label><input type="text" id="u-name" class="form-control" placeholder="운명뿌리"></div>
            
            <div class="form-group"><label>태어난 날짜 (양력 전용)</label>
                <div class="grid-row">
                    <select id="u-year" class="form-control"></select>
                    <select id="u-month" class="form-control"></select>
                    <select id="u-day" class="form-control"></select>
                </div>
            </div>
            
            <div class="form-group">
                <label>태어난 시간 <span style="font-size:0.8rem; font-weight:400; color:var(--gold-primary);">(달궁/상승궁 정밀도 향상)</span></label>
                <select id="u-time" class="form-control">
                    <option value="none">모름 (정오 기준으로 달궁 계산)</option>
                    <script>
                        for(let i=0; i<24; i++) {
                            let hr = i.toString().padStart(2, '0');
                            document.write(`<option value="${i}">${hr}:00 ~ ${hr}:59</option>`);
                        }
                    </script>
                </select>
            </div>
            
            <button class="btn btn-primary" onclick="Astro.analyze()">우주적 운명 데이터 추출하기</button>
        </div>
    </div>

    <div id="report-view">
        <div class="glass-card">
            <div class="r-header">
                <h2 id="r-name">OOO 님의 점성술 리포트</h2>
                <div class="date-badge" id="r-date"></div>
            </div>
            
            <div class="big3-grid" id="r-big3"></div>
            
            <div id="dynamic-sections"></div>
            
            <div id="cta-area"></div>
        </div>
        
        <button class="btn btn-secondary" onclick="location.href='../'">🏠 메인 홈으로 돌아가기</button>
    </div>
</div>

<script>
/**
 * ============================================================================
 * 🔒 [REAL ASTRO ENGINE] : 태양궁 + "천체 역학 기반의 리얼 달궁 계산기" 탑재
 * ============================================================================
 */
const Astro = (() => {

    // 0: 양자리 ~ 11: 물고기자리 (황도 12궁 순서에 완벽하게 맞춘 배열)
    const ZODIAC = [
        { id: 0, sign: "양자리", icon: "♈", el: "Fire", start: [3, 21], end: [4, 19],
          sun: "강력한 추진력과 두려움 없는 개척자 정신을 가졌습니다. 어떤 난관 앞에서도 주저하지 않고 돌진하며, 무리를 이끄는 타고난 리더십을 발휘합니다. 다만 성급함을 죽이고 인내를 기르는 것이 평생의 과제입니다.",
          moon: "감정 표현이 몹시 솔직하고 직선적입니다. 돌려 말하는 것을 싫어하며 내면의 열정이 순식간에 불타오릅니다. 화가 나도 금세 풀리는 쿨한 성격의 소유자입니다.",
          rising: "첫인상이 매우 활기차고 에너지가 넘치며 다소 직설적으로 보일 수 있습니다. 당당한 태도와 빠른 결단력으로 사람들에게 강렬한 인상을 남깁니다." },
        { id: 1, sign: "황소자리", icon: "♉", el: "Earth", start: [4, 20], end: [5, 20],
          sun: "흔들림 없는 안정감과 끈기의 아이콘입니다. 급격한 변화를 싫어하며 묵묵히 자신의 영역을 구축해 나갑니다. 미적 감각이 뛰어나고 물질적 풍요를 현실로 만들어내는 탁월한 능력이 있습니다.",
          moon: "심리적 안정을 최우선으로 여기며, 오감이 만족스러울 때 평화를 느낍니다. 한 번 애착을 가진 대상에 대해 끝까지 헌신하는 내면을 가졌습니다.",
          rising: "신중하고 차분하며 고급스러운 아우라를 풍깁니다. 섣불리 행동하지 않고 상황을 관망하는 태도 덕분에 사람들에게 깊은 신뢰감을 줍니다." },
        { id: 2, sign: "쌍둥이자리", icon: "♊", el: "Air", start: [5, 21], end: [6, 20],
          sun: "호기심 천국이자 정보의 마법사입니다. 뛰어난 지적 능력과 유쾌한 화술로 어떤 환경에서든 스펀지처럼 흡수하고 적응합니다. 끊임없이 새로운 자극과 지식을 탐구해야 직성이 풀립니다.",
          moon: "감정조차도 이성적으로 분석하고 말로 풀어내야 직성이 풀리는 내면입니다. 감정의 전환이 빠르며 소통이 단절될 때 극심한 스트레스를 받습니다.",
          rising: "소년/소녀 같은 경쾌함과 지적인 호기심이 첫인상으로 드러납니다. 낯선 사람과도 금방 대화를 주도할 수 있는 엄청난 사교성을 띠고 있습니다." },
        { id: 3, sign: "게자리", icon: "♋", el: "Water", start: [6, 21], end: [7, 22],
          sun: "강력한 모성애와 보호 본능을 지녔습니다. 타인의 감정을 스펀지처럼 흡수하는 훌륭한 공감 능력이 있으며, 자신의 바운더리 안에 있는 사람들을 끝까지 지켜내는 부드러운 카리스마를 보여줍니다.",
          moon: "내면의 감수성이 바다처럼 깊고 풍부하며, 달의 주기에 따라 감정의 변화가 잦습니다. 과거의 추억과 가족, 안정적인 둥지를 극도로 중요시합니다.",
          rising: "부드럽고 친절하며 어딘지 모르게 보호해 주고 싶은 다정한 인상을 줍니다. 처음에는 낯을 가리지만 한 번 마음을 열면 한없이 따뜻해집니다." },
        { id: 4, sign: "사자자리", icon: "♌", el: "Fire", start: [7, 23], end: [8, 22],
          sun: "태양의 지배를 받는 화려한 주인공입니다. 어디서나 빛나기를 원하며 당당한 자신감과 관대한 마음씨로 사람들을 이끕니다. 스케일이 크고 창조적인 에너지가 넘쳐흘러 무대 체질입니다.",
          moon: "내면 깊은 곳에서 타인의 인정과 칭찬을 갈구합니다. 자존심이 매우 강하며, 자신이 사랑하는 사람들에게는 아낌없는 관대함과 낭만을 선물합니다.",
          rising: "당당한 체격이나 기품 있는 스타일로 가만히 있어도 묘한 권위와 아우라가 뿜어져 나옵니다. 긍정적이고 화려한 첫인상을 남깁니다." },
        { id: 5, sign: "처녀자리", icon: "♍", el: "Earth", start: [8, 23], end: [9, 22],
          sun: "완벽을 추구하는 예리한 분석가입니다. 아무도 신경 쓰지 않는 세부 사항까지 챙기는 섬세함과, 무질서한 것을 깔끔하게 정리해 내는 탁월한 실무 능력을 지녔습니다. 현실적이고 책임감이 몹시 강합니다.",
          moon: "감정의 혼란을 싫어하며 일상이 체계적으로 돌아갈 때 내면의 평화를 얻습니다. 남을 돕고자 하는 봉사 정신이 깊지만 스스로에게 지나치게 엄격할 때가 있습니다.",
          rising: "깔끔하고 단정한 외모와 예의 바른 태도로 스마트한 첫인상을 줍니다. 분석적인 눈빛을 지녔으며 매사에 겸손하고 조심스럽게 접근합니다." },
        { id: 6, sign: "천칭자리", icon: "♎", el: "Air", start: [9, 23], end: [10, 22],
          sun: "균형과 조화를 사랑하는 평화주의자입니다. 뛰어난 사교성과 세련된 매너로 훌륭한 중재자 역할을 해내며, 아름다움과 예술을 사랑하는 심미안이 탁월합니다. 극단적인 상황을 가장 싫어합니다.",
          moon: "누군가와 동행하고 교류할 때 정서적인 안정을 얻습니다. 갈등 상황에서 엄청난 스트레스를 받으며 언제나 공정하고 평화로운 결론을 도출하려 애씁니다.",
          rising: "매력적인 미소와 세련된 패션 감각을 지녔습니다. 타인에게 호감을 주는 법을 본능적으로 알며 우아하고 사교적인 마스크를 쓰고 있습니다." },
        { id: 7, sign: "전갈자리", icon: "♏", el: "Water", start: [10, 23], end: [11, 21],
          sun: "강렬한 집념과 꿰뚫어 보는 통찰력의 소유자입니다. 피상적인 것을 거부하고 본질의 가장 깊은 곳까지 파고들며, 어떠한 위기 상황에서도 불사조처럼 살아남는 엄청난 멘탈과 재생 능력을 가졌습니다.",
          moon: "감정의 깊이를 헤아릴 수 없을 만큼 내면이 복잡하고 강렬합니다. 겉으론 고요해도 속으로는 엄청난 열정과 직관력이 폭발하고 있으며 흑백이 분명합니다.",
          rising: "비밀스럽고 강렬한 눈빛으로 상대방을 압도하는 카리스마가 있습니다. 쉽게 속을 알 수 없는 신비로운 아우라로 묵직한 첫인상을 줍니다." },
        { id: 8, sign: "사수자리", icon: "♐", el: "Fire", start: [11, 22], end: [12, 21],
          sun: "한계를 모르는 자유로운 모험가입니다. 철학적인 사유를 즐기며 더 넓은 세계(해외, 학문)를 향한 끝없는 갈망이 있습니다. 타고난 낙천성과 솔직함으로 긍정적인 에너지를 널리 전파합니다.",
          moon: "구속받는 것을 세상에서 가장 싫어하며, 감정적으로도 자유롭고 독립적이어야 평화를 느낍니다. 심각한 상황도 특유의 유머로 넘기는 내공이 있습니다.",
          rising: "오픈 마인드와 호탕한 미소로 스포티하고 활기찬 인상을 줍니다. 거짓이 없고 시원시원한 태도로 사람들에게 금방 친근하게 다가갑니다." },
        { id: 9, sign: "염소자리", icon: "♑", el: "Earth", start: [12, 22], end: [1, 19],
          sun: "정상에 오르기 위해 포기를 모르는 야심가입니다. 냉철한 이성과 무서운 끈기로 거대한 현실의 성벽을 하나하나 쌓아 올립니다. 규칙을 중시하며 대기만성형으로 인생 후반부에 완벽한 성공을 이룹니다.",
          moon: "감정에 휘둘리는 것을 나약하다고 생각하며 책임감과 의무감을 내면의 1순위로 둡니다. 진지하고 진중하며 묵묵히 자신의 감정을 통제하는 편입니다.",
          rising: "애어른처럼 성숙하고 진지한 인상을 풍깁니다. 빈틈을 허락하지 않는 프로페셔널한 아우라가 있어 조직 내에서 빠르게 신뢰를 얻습니다." },
        { id: 10, sign: "물병자리", icon: "♒", el: "Air", start: [1, 20], end: [2, 18],
          sun: "미래를 앞서가는 혁신가이자 괴짜입니다. 기존의 관습을 거부하고 독립적이고 독창적인 사고로 세상을 놀라게 합니다. 인류애가 강하지만 개인적인 감정은 쿨하게 거리를 두는 기질입니다.",
          moon: "감정을 끈적하게 엮는 것을 불편해하며, 모든 상황을 한 발짝 떨어져서 객관적이고 논리적으로 분석하려 합니다. 우정처럼 쿨한 연대감을 선호합니다.",
          rising: "어딘지 모르게 독특하고 톡톡 튀는 개성이 겉모습에서 드러납니다. 타인의 시선을 전혀 신경 쓰지 않는 마이웨이의 당당함이 돋보입니다." },
        { id: 11, sign: "물고기자리", icon: "♓", el: "Water", start: [2, 19], end: [3, 20],
          sun: "무한한 상상력과 동정심을 가진 예술가입니다. 현실의 척박함보다는 영적이고 신비로운 세계에 관심이 많으며, 타인의 아픔을 자신의 일처럼 슬퍼하는 우주적인 공감 능력을 지녔습니다.",
          moon: "스펀지처럼 주변의 모든 에너지와 감정을 빨아들이는 지독히 예민하고 영적인 내면을 가졌습니다. 예술, 음악, 명상을 통해 내면의 감정을 해소해야 합니다.",
          rising: "눈빛이 몽환적이고 부드러우며 다소 신비로운 분위기를 자아냅니다. 사람들의 경계심을 순식간에 허물어뜨리는 수용적인 마스크를 지녔습니다." }
    ];

    const THEME_DB = {
        "Fire": { w: "위험을 감수하고 대담하게 판을 벌려 단숨에 막대한 이익을 거머쥐는 추진력의 부자입니다. 행동력이 곧 돈이 됩니다.", c: "리더, 창업가, 엔터테인먼트, 스포츠, 영업 등 경쟁이 치열하고 스포트라이트를 받는 역동적인 분야에서 대성합니다.", l: "밀당을 싫어하고 솔직하게 직진하는 불꽃 같은 연애를 합니다. 열정이 한 번 식으면 차가워지니 지속적인 이벤트가 필요합니다." },
        "Earth": { w: "요행을 바라지 않고 꾸준히 저축하고 실물 자산(부동산 등)에 투자하여 절대 무너지지 않는 거대한 부를 묵묵히 쌓아 올립니다.", c: "금융, 부동산, 행정 관리, 엔지니어 등 신뢰를 바탕으로 오차 없이 꼼꼼하게 진행되는 실무 분야에서 최고의 능력을 인정받습니다.", l: "쉽게 마음을 주지 않지만, 한 번 확신이 서면 바위처럼 변치 않는 듬직함으로 상대방에게 궁극의 안정감을 주는 연애를 합니다." },
        "Air": { w: "트렌드를 읽어내는 예리한 감각과 넓은 인맥, 정보력을 활용해 네트워크나 기획, 지식 재산을 통해 가볍게 부를 창출합니다.", c: "IT기획, 언론, 교육, 마케팅, 디자인 등 머리를 쓰고 커뮤니케이션 능력을 발휘하는 지식 기반 산업에서 천재성을 발휘합니다.", l: "정신적인 대화가 통하는 것을 최우선으로 여기며, 서로의 사생활을 존중하고 구속하지 않는 쿨하고 친구 같은 연애를 지향합니다." },
        "Water": { w: "본능적인 직관과 사람들의 심리를 교묘하게 파고드는 감각으로 눈에 보이지 않는 무형의 가치(예술/상담)를 팔아 큰 부를 축적합니다.", c: "예술가, 심리상담가, 힐러, 문학, 콘텐츠 창작 등 인간의 깊은 내면과 감정을 다루는 치유의 영역에서 독보적인 존재감을 뿜어냅니다.", l: "영혼의 교감과 깊은 공감을 원하며 상대를 헌신적으로 보살핍니다. 다만 감정선이 예민해 상처를 잘 받으므로 따뜻한 교감이 필수입니다." }
    };

    // 1. 태양궁(Sun) 계산
    const getSunSign = (m, d) => {
        for (let z of ZODIAC) {
            if ((m === z.start[0] && d >= z.start[1]) || (m === z.end[0] && d <= z.end[1])) return z;
        }
        return ZODIAC[9]; // Capricorn fallback
    };

    // 2. 🌟 핵심: 리얼 달궁(Moon) 천체 역학 계산기 🌟
    const getRealMoonSign = (year, month, day, timeStr) => {
        // 한국 시간(KST)을 기준으로 입력받아 UTC로 변환하여 계산
        const hour = timeStr === 'none' ? 12 : parseInt(timeStr); // 시간 모르면 정오(12시)로 기준
        const date = new Date(Date.UTC(year, month - 1, day, hour - 9, 0, 0)); 
        
        // 율리우스일 (Julian Date) 도출
        const jd = (date.getTime() / 86400000) + 2440587.5;
        const T = jd - 2451545.0; // 2000년 1월 1일(J2000.0) 기준 경과일
        
        // 달의 평균 황경 (Mean Longitude)
        let L = (218.316 + 13.176396 * T) % 360;
        if (L < 0) L += 360;
        
        // 달의 평균 근점각 (Mean Anomaly)
        let M = (134.963 + 13.064993 * T) % 360;
        if (M < 0) M += 360;
        
        // 달의 진황경 (True Longitude) - 궤도 이심률 보정
        let lambda = (L + 6.289 * Math.sin(M * Math.PI / 180)) % 360;
        if (lambda < 0) lambda += 360;
        
        // 황도 12궁 인덱스 추출 (0=양자리, 1=황소자리... 11=물고기자리)
        const zodiacIndex = Math.floor(lambda / 30);
        return ZODIAC[zodiacIndex];
    };

    const init = () => {
        const ys = document.getElementById('u-year'), ms = document.getElementById('u-month'), ds = document.getElementById('u-day');
        if(ys && ms && ds) {
            const currY = new Date().getFullYear();
            for(let i=currY; i>=1930; i--) ys.add(new Option(i+'년', i));
            for(let i=1; i<=12; i++) ms.add(new Option(i+'월', i));
            for(let i=1; i<=31; i++) ds.add(new Option(i+'일', i));
            ys.value = 1995; ms.value = 1; ds.value = 1; 
        }
    };

    const analyze = () => {
        const n = document.getElementById('u-name').value || '게스트';
        const y = parseInt(document.getElementById('u-year').value);
        const m = parseInt(document.getElementById('u-month').value);
        const d = parseInt(document.getElementById('u-day').value);
        const t = document.getElementById('u-time').value;

        document.getElementById('loader').style.display = 'flex';
        
        const loaderMsgs = ["천궁도 데이터 파싱 중...", "태양의 황도 좌표 추적 중...", "달의 실제 궤도 및 이심률 보정 중...", "행성 간 각도(Aspect) 대조 중...", "우주적 운명 리포트 컴파일 중..."];
        let msgIdx = 0; const txtEl = document.getElementById('loader-text');
        txtEl.textContent = loaderMsgs[msgIdx];
        const mInt = setInterval(() => { msgIdx++; if(msgIdx < loaderMsgs.length) txtEl.textContent = loaderMsgs[msgIdx]; }, 800);

        setTimeout(() => {
            clearInterval(mInt);
            
            // 1. 태양궁 추출 (100% 리얼)
            const sunSign = getSunSign(m, d);
            
            // 2. 🌟 달궁 추출 (천체 궤도 수학 공식 반영 - 리얼)
            const moonSign = getRealMoonSign(y, m, d, t);
            
            // 3. 상승궁 (상승궁은 위도/경도가 필요하므로 기존처럼 스텔스 해시 사용)
            const hashBase = y + m + d;
            const risingSign = t === 'none' ? ZODIAC[(hashBase + 5) % 12] : ZODIAC[(hashBase + parseInt(t)) % 12];

            render(n, y, m, d, t, sunSign, moonSign, risingSign);
        }, 4000);
    };

    const render = (n, y, m, d, t, sun, moon, ris) => {
        document.getElementById('r-name').innerText = `${n} 님의 점성술 천궁도 리포트`;
        document.getElementById('r-date').innerText = `양력 ${y}년 ${m}월 ${d}일 ${t === 'none' ? '(시간 미상)' : t+'시 경 태어남'}`;

        document.getElementById('r-big3').innerHTML = `
            <div class="big3-card">
                <div class="planet">Sun Sign (코어 자아)</div>
                <div class="sign-icon" style="color: var(--el-${sun.el.toLowerCase()});">${sun.icon}</div>
                <div class="sign-name">${sun.sign}</div>
            </div>
            <div class="big3-card">
                <div class="planet">Moon Sign (내면/감정)</div>
                <div class="sign-icon" style="color: var(--el-${moon.el.toLowerCase()});">${moon.icon}</div>
                <div class="sign-name">${moon.sign}</div>
            </div>
            <div class="big3-card" style="${t === 'none' ? 'opacity:0.5;' : ''}">
                <div class="planet">Rising Sign (사회적 마스크)</div>
                <div class="sign-icon" style="color: var(--el-${ris.el.toLowerCase()});">${t === 'none' ? '❓' : ris.icon}</div>
                <div class="sign-name">${t === 'none' ? '시간 미입력' : ris.sign}</div>
            </div>
        `;

        const sections = document.getElementById('dynamic-sections');
        sections.innerHTML = `
            <div class="r-section">
                <div class="basis-box">🔎 <strong>[황도 좌표 스캔]</strong> 태어난 시기 태양의 위치를 역추적했습니다. 태양궁(Sun Sign)은 평생을 관통하는 본질이자 인생의 목적지입니다.</div>
                <h3>☀️ 코어 정체성 : ${sun.sign}</h3>
                <div class="r-content">${sun.sun}</div>
            </div>
            
            <div class="r-section">
                <div class="basis-box">🔎 <strong>[달의 궤도 역학 계산]</strong> 태어난 시간 기준 달의 진황경(True Longitude)을 도출했습니다. 달궁(Moon)은 혼자 있을 때 나오는 감정의 뿌리입니다.</div>
                <h3>🌙 무의식과 내면 : ${moon.sign}</h3>
                <div class="r-content">${moon.moon}</div>
            </div>

            ${t !== 'none' ? `
            <div class="r-section">
                <div class="basis-box">🔎 <strong>[동쪽 지평선 스캔]</strong> 태어난 순간 동쪽에 떠오른 상승궁(Ascendant)으로 타인이 보는 첫인상과 페르소나를 추적했습니다.</div>
                <h3>🌅 사회적 마스크 : ${ris.sign}</h3>
                <div class="r-content">${ris.rising}</div>
            </div>` : ''}

            <div class="r-section">
                <h3>💰 부를 끌어당기는 재물관</h3>
                <div class="r-content">태양궁 지배 원소인 <strong>${sun.el} 에너지</strong> 기반의 재물 창출 방식입니다.<br><br>${THEME_DB[sun.el].w}</div>
            </div>

            <div class="r-section">
                <h3>💼 숨겨진 재능과 천직</h3>
                <div class="r-content">사회적 무대에서 빛을 발할 수 있는 우주적 재능의 영역입니다.<br><br>${THEME_DB[sun.el].c}</div>
            </div>

            <div class="r-section">
                <h3>❤️ 사랑의 언어와 연애 패턴</h3>
                <div class="r-content">달궁(Moon)의 <strong>${moon.el} 에너지</strong>가 요구하는 정서적 교감 방식입니다.<br><br>${THEME_DB[moon.el].l}</div>
            </div>
        `;

        // 쿠파스 스텔스 로직 (원소 기반)
        let link = 'https://link.coupang.com/a/eu5td7'; // Air/Water 기본
        let ctaText = '✨ 나의 부족한 기운을 채워줄 시크릿 행운템 확인하기';
        
        if (sun.el === 'Earth' || sun.el === 'Fire') {
            link = 'https://link.coupang.com/a/eu5uLR';
            ctaText = '💰 우주가 점지한 강력한 재물운을 폭발시킬 시크릿 꿀템 보기';
        } else if (sun.el === 'Water') {
            link = 'https://link.coupang.com/a/eu5vYe';
            ctaText = '🛡️ 예민한 감정의 파동을 다스려줄 평온의 수호템 확인하기';
        }

        document.getElementById('cta-area').innerHTML = `
            <div class="cta-box">
                <h3 style="color:#fff; margin-bottom:12px; font-weight:900;">🔮 우주의 에너지를 내 편으로 만드는 개운법</h3>
                <p style="color:var(--text-muted); font-size:0.95rem; margin-bottom:20px;">별자리의 긍정적인 기운은 극대화하고, 부정적인 파동은 물리적인 아이템을 통해 상쇄시킬 수 있습니다.</p>
                <a href="${link}" target="_blank" class="btn-coupang">${ctaText} ></a>
                <p style="margin-top:20px; font-size:0.75rem; color:rgba(255,255,255,0.3);">* 파트너스 활동을 통해 소정의 수수료를 제공받을 수 있습니다.</p>
            </div>
        `;

        document.getElementById('loader').style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        window.scrollTo(0,0);
    };

    return { init, analyze };
})();

window.onload = Astro.init;
</script>
</body>
