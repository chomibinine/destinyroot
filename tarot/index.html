<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 타로 리딩</title>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-base: #030509; --gold-primary: #d4af37; --gold-light: #f9e596; --text-muted: #9aa4b2; --border-glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
        body { background: var(--bg-base); color: #fff; line-height: 1.7; min-height: 100vh; position: relative; overflow-x: hidden; }
        
        /* 🌌 몽환적인 보라/골드 오로라 배경 */
        body::before { content: ''; position: absolute; width: 350px; height: 350px; background: rgba(138, 43, 226, 0.15); filter: blur(120px); top: 5%; left: -100px; z-index: 0; }
        body::after { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(212, 175, 55, 0.08); filter: blur(100px); bottom: 10%; right: -50px; z-index: 0; }
        
        .app-container { max-width: 750px; margin: 0 auto; padding: 50px 20px 120px; position: relative; z-index: 1; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1.5px; margin: 0; background: linear-gradient(180deg, #fff 0%, #a1a1a1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); margin-top: 10px; font-size: 1rem; font-weight: 300; }
        
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 24px; padding: 40px 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); margin-bottom: 25px; transition: all 0.3s ease;}
        
        /* 🃏 타로 카드 덱 UI */
        .tarot-instruction { text-align: center; margin-bottom: 25px; font-size: 1.1rem; color: var(--gold-light); font-weight: 600; line-height: 1.6;}
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; perspective: 1000px;}
        .tarot-card { 
            aspect-ratio: 1 / 1.6; background: linear-gradient(135deg, #1a1a2e, #0f0f1a); 
            border: 2px solid rgba(212,175,55,0.4); border-radius: 10px; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, border-color 0.3s;
            background-image: repeating-linear-gradient(45deg, rgba(212,175,55,0.05) 0px, rgba(212,175,55,0.05) 2px, transparent 2px, transparent 8px);
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .tarot-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(212,175,55,0.3); border-color: var(--gold-primary); }
        .tarot-card.selected { transform: translateY(-15px) rotateY(180deg); pointer-events: none; border-color: var(--gold-light); background: rgba(212,175,55,0.1); }
        .tarot-card.selected::after { content: "선택됨"; position: absolute; transform: rotateY(180deg); color: var(--gold-light); font-weight: 800; font-size: 0.9rem;}
        
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 18px; border-radius: 30px; font-weight: 800; font-size: 1.15rem; cursor: pointer; border: none; width: 100%; transition: 0.2s; margin-top: 10px;}
        .btn-primary { background: var(--gold-primary); color: #000; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); margin-top: 15px;}
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
        
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,5,9,0.98); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .orbit { width: 60px; height: 60px; border: 2px solid var(--gold-primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 📄 리포트 뷰 */
        #report-view { display: none; }
        
        /* 💡 공시성 로그 박스 (신뢰감 극대화) */
        .log-box { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 16px; padding: 25px; margin-bottom: 45px; font-size: 0.95rem; color: #a1b0c0; line-height: 1.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .log-box h4 { color: #b388ff; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px dashed rgba(138, 43, 226, 0.3); padding-bottom: 10px; font-weight: 800; }
        .log-item { margin-bottom: 15px; }
        .log-title { color: #fff; font-weight: 700; display: block; margin-bottom: 4px; }
        .log-formula { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 5px; font-family: monospace; overflow-x: auto; color: var(--gold-light);}

        /* 3카드 스프레드 시각화 */
        .spread-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 45px; }
        .spread-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 16px; padding: 25px 15px; text-align: center; }
        .spread-card .position { font-size: 0.85rem; color: var(--text-muted); font-weight: 800; letter-spacing: 1px; margin-bottom: 15px; }
        .spread-card .c-num { font-size: 1.8rem; font-weight: 900; color: var(--gold-primary); font-family: serif; margin-bottom: 5px; text-shadow: 0 0 10px rgba(212,175,55,0.3);}
        .spread-card .c-name { font-size: 1.1rem; font-weight: 800; color: #fff; }

        .r-section { margin-bottom: 60px; text-align: left; }
        .r-section h3 { font-size: 1.5rem; margin-bottom: 20px; border-left: 4px solid var(--gold-primary); padding-left: 15px; font-weight: 900; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;}
        
        .theory-box { background: rgba(212,175,55,0.05); padding: 25px; border-radius: 12px; font-size: 1rem; color: var(--gold-light); margin-bottom: 25px; border-left: 3px solid var(--gold-primary); line-height: 1.7; font-weight: 300;}
        .theory-box strong { font-weight: 800; color: #fff; }
        
        .result-content { font-size: 1.1rem; line-height: 1.9; color: #d1d5db; text-align: justify; padding: 0 10px;}
        .result-content p { margin-bottom: 20px; }
        .result-content strong { color: var(--gold-light); font-weight: 800; }
        
        /* 🤫 스텔스 마케팅 CSS */
        .stealth-advice { margin-top: 40px; padding: 35px 25px; border-radius: 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .stealth-advice h4 { color: var(--gold-light); font-size: 1.25rem; margin-bottom: 15px; font-weight: 800; }
        .stealth-advice p { font-size: 1.05rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 25px; }
        .link-stealth { display: inline-block; color: var(--gold-primary); font-size: 1.15rem; font-weight: 800; text-decoration: none; border-bottom: 1px solid rgba(212,175,55,0.4); padding-bottom: 3px; transition: 0.2s; word-break: keep-all;}
        .link-stealth:hover { color: #fff; border-color: #fff; }

        @media (max-width: 600px) { 
            .app-container { padding: 20px 15px 100px; } 
            .header h1 { font-size: 2rem; }
            .glass-card { padding: 25px 20px; }
            .card-grid { grid-template-columns: repeat(4, 1fr); gap: 8px;}
            .spread-grid { grid-template-columns: 1fr; gap: 12px; } 
            .spread-card { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; text-align: left; } 
            .spread-card .position { margin-bottom: 0; width: 80px;}
            .r-section h3 { font-size: 1.3rem; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="orbit"></div>
    <div id="loader-text" style="color:var(--gold-light); font-weight:700; font-size:1.2rem;">아카식 레코드 동기화 중...</div>
</div>

<div class="app-container">
    <div id="input-view">
        <div class="header"><h1>타로 리딩</h1><p>무의식의 파동과 공시성(Synchronicity) 기반 스캔</p></div>
        <div class="glass-card">
            <div class="tarot-instruction">
                해결하고 싶은 고민이나 상황을 마음속에 깊이 떠올린 후,<br>직관이 이끄는 운명의 카드 <span style="color:#fff; font-size:1.3rem; margin:0 5px;">3장</span>을 선택해 주세요.
            </div>
            
            <div class="card-grid" id="deck">
                <script>
                    for(let i=0; i<12; i++) {
                        document.write(`<div class="tarot-card" onclick="Tarot.drawCard(this)"></div>`);
                    }
                </script>
            </div>

            <div style="text-align: center; color: var(--text-muted); font-size: 0.9rem;">
                선택한 카드: <span id="draw-count" style="color: #fff; font-weight: 800; font-size: 1.1rem;">0</span> / 3
            </div>
        </div>
    </div>
    
    <div id="report-view" class="glass-card">
        <div id="r-header" style="text-align:center; margin-bottom:35px;">
            <h2 style="font-weight:900; font-size: 2rem;">정통 타로 딥리딩 리포트</h2>
            <p style="color:var(--gold-light); font-size:1rem; margin-top:8px; font-weight: 300;">과거, 현재, 그리고 당신이 마주할 미래</p>
        </div>
        
        <div class="log-box" id="r-log"></div>

        <div class="spread-grid" id="r-spread"></div>
        
        <div id="dynamic-results"></div>
        
        <div id="cta-area"></div>
        
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:50px;">
            <button class="btn btn-secondary" onclick="Tarot.shareLink()" style="margin-top:0;">🔗 내 타로 결과 공유하기</button>
            <button class="btn btn-primary" onclick="location.href='../'">🏠 메인 홈으로 돌아가기</button>
        </div>
    </div>
</div>

<script>
const Tarot = (() => {
    // 🔥 타로 메이저 아르카나 22장 심층 DB
    const MAJOR_ARCANA = [
        { num: "0", name: "The Fool (바보)", type: "Air",
          sym: "절벽 끝에 서 있으면서도 하늘을 올려다보고 있는 청년과, 곁에서 짖고 있는 하얀 강아지. 발밑의 위험을 인지하지 못하는 것이 아니라, 두려움을 초월한 순수한 믿음을 뜻합니다.",
          sit: "당신은 현재 아무것도 확정되지 않은 백지상태, 혹은 완전히 새로운 챕터의 시작점에 서 있습니다. 과거의 짐을 훌훌 털어버리고 홀가분하게 나아가고 싶은 강한 충동을 느끼고 있습니다. 리스크가 존재하지만, 무한한 가능성 역시 열려 있는 상황입니다.",
          adv: "계산하고 따지는 이성의 목소리를 잠시 꺼두세요. 지금은 논리보다 직관과 충동에 몸을 맡길 때입니다. 실패를 두려워하지 않는 '바보 같은 순수함'이 오히려 가장 강력한 무기가 되어 줄 것입니다.",
          out: "완전히 새로운 형태의 자유와 해방을 맞이하게 됩니다. 당신을 옭아매던 답답한 현실에서 벗어나, 예상치 못한 즐거운 모험과 새로운 인연이 기다리고 있는 길로 접어들 것입니다." },
        { num: "I", name: "The Magician (마법사)", type: "Air",
          sym: "테이블 위에 놓인 지팡이, 성배, 검, 동전(4원소). 그리고 하늘과 땅을 가리키는 손짓. 무(無)에서 유(有)를 창조해 내는 무한한 잠재력과 다재다능함을 의미합니다.",
          sit: "당신은 이미 문제 해결에 필요한 모든 자원과 능력을 갖추고 있습니다. 아이디어가 넘치고, 사람들을 설득할 수 있는 화술과 매력이 최고조에 달해 있는 긍정적인 파동의 시기입니다.",
          adv: "머릿속으로 상상만 하던 것을 밖으로 꺼내어 실행에 옮기십시오. 당신의 생각과 의도를 자신감 있게 어필할 때, 막혔던 문들이 마법처럼 열리기 시작할 것입니다. 스스로의 능력을 의심하지 마세요.",
          out: "당신의 기획이나 아이디어가 현실에서 완벽하게 구체화되어 눈에 보이는 성과로 나타납니다. 능력을 널리 인정받고 주도권을 쥐게 되는 압도적인 성공의 결말입니다." },
        { num: "II", name: "High Priestess (여사제)", type: "Water",
          sym: "흑과 백의 기둥(선과 악, 의식과 무의식) 사이에 앉아 율법서를 들고 있는 여인. 겉으로 드러난 현상 이면의 숨겨진 진실과 고도의 직관력을 상징합니다.",
          sit: "겉으로는 평온해 보이지만, 상황의 수면 아래에서 당신만 느끼는 미묘한 직감이나 비밀이 존재합니다. 섣불리 행동하기보다는 상황을 관망하며 속내를 숨기고 있는 정적인 상태입니다.",
          adv: "주변 사람들의 조언이나 겉으로 보이는 데이터에 휘둘리지 마십시오. 당신 내면의 직관(촉)이 정답을 알고 있습니다. 침묵을 지키고 한 발 물러서서 상황의 이면을 예리하게 관찰할 때입니다.",
          out: "숨겨져 있던 진실이 밝혀지며, 억지로 애쓰지 않아도 상황이 당신에게 유리한 쪽으로 자연스럽게 흘러갑니다. 깊은 정신적 깨달음과 내면의 평화를 얻게 될 것입니다." },
        { num: "III", name: "The Empress (여황제)", type: "Earth",
          sym: "풍요로운 자연 속에 편안하게 앉아 있는 여인과 비너스(금성)의 기호. 어머니의 대지처럼 만물을 길러내고 수용하는 무조건적인 사랑과 물질적 풍요로움을 상징합니다.",
          sit: "당신은 현재 감정적으로나 물질적으로 매우 안정적이고 풍요로운 파동 속에 있습니다. 주변 사람들을 포용하고 챙기며, 노력해 온 일들이 아름다운 결실을 맺기 시작하는 따뜻한 시기입니다.",
          adv: "치열하게 경쟁하고 투쟁하기보다는, 여유를 가지고 주변을 따뜻하게 품어 안으십시오. 타인에게 베푸는 작은 배려와 공감이 오히려 더 큰 기회와 행운으로 돌아오는 시기입니다.",
          out: "풍성한 수확의 결말입니다. 프로젝트의 성공, 관계에서의 깊은 애정, 혹은 금전적인 여유 등 당신이 뿌려둔 씨앗들이 무럭무럭 자라나 기대 이상의 달콤한 결실을 안겨줄 것입니다." },
        { num: "IV", name: "The Emperor (황제)", type: "Fire",
          sym: "견고한 돌 의자에 꼿꼿이 앉아 통제권을 쥐고 있는 남성. 감정을 철저히 배제하고 현실적인 질서와 규칙을 세우는 세속적인 권력과 확고한 지배력을 상징합니다.",
          sit: "당신은 현재 큰 책임을 지고 있거나, 상황을 철저하게 통제해야만 하는 압박감 속에 놓여 있습니다. 이성적이고 체계적인 룰을 바탕으로 당신만의 견고한 성벽을 구축하고 있는 단계입니다.",
          adv: "감정에 흔들리지 마십시오. 단호하고 냉철한 리더십이 필요합니다. 모호한 태도를 버리고, 분명한 규칙을 세워 주변 상황과 인간관계를 확실하게 통제하고 리드해야 합니다.",
          out: "흔들리지 않는 확고한 지위와 안정을 쟁취합니다. 당신이 목표로 하던 권위, 승진, 혹은 물질적 기반이 단단한 바위처럼 구축되어 누구도 당신의 자리를 넘볼 수 없게 됩니다." },
        { num: "VI", name: "The Lovers (연인)", type: "Air",
          sym: "에덴동산의 아담과 이브, 그리고 그들을 축복하는 천사. 단순한 남녀의 사랑을 넘어선 가치관의 결합, 완벽한 조화, 그리고 피할 수 없는 '선택'의 상징입니다.",
          sit: "누군가와의 깊은 교감이나 중요한 파트너십(연애, 동업)이 형성되고 있는 파동입니다. 혹은 두 가지의 매력적인 선택지 사이에서 마음이 강하게 이끌리며 고민하고 있는 상태일 수 있습니다.",
          adv: "머리로 계산하여 이익을 좇기보다는, 당신의 가슴이 진정으로 설레고 이끌리는 쪽을 선택하십시오. 혼자서 해결하려 하지 말고 진심이 통하는 누군가와 적극적으로 소통하고 연대하세요.",
          out: "영혼의 주파수가 맞는 완벽한 파트너를 만나거나, 갈등이 해결되고 극적인 화해와 융합을 이루게 됩니다. 선택에 대한 후회 없이, 깊은 유대감과 사랑으로 충만한 결말을 맞이합니다." },
        { num: "VII", name: "The Chariot (전차)", type: "Water",
          sym: "서로 다른 색깔(본능과 이성)의 스핑크스가 끄는 전차를 통제하며 앞으로 돌진하는 전사. 내면의 갈등을 의지력으로 짓누르고 목표를 향해 돌파해 내는 승리와 투쟁을 상징합니다.",

    let selectedCards = [];
    let isProcessing = false;

    // 1. 카드 드로우 로직
    const drawCard = (cardEl) => {
        if(isProcessing || selectedCards.length >= 3 || cardEl.classList.contains('selected')) return;
        
        cardEl.classList.add('selected');
        
        // 남은 카드 중 랜덤 뽑기 (중복 불가)
        let randomIdx;
        do { randomIdx = Math.floor(Math.random() * MAJOR_ARCANA.length); } 
        while (selectedCards.some(c => c.idx === randomIdx));
        
        selectedCards.push({ el: cardEl, idx: randomIdx, data: MAJOR_ARCANA[randomIdx] });
        
        document.getElementById('draw-count').innerText = selectedCards.length;
        
        if(selectedCards.length === 3) {
            isProcessing = true;
            setTimeout(analyze, 800);
        }
    };

        document.getElementById('loader').style.display = 'flex';
        const txtEl = document.getElementById('loader-text');
        const msgs = ["아카식 레코드(Akashic Records) 접속 중...", "융(Jung)의 공시성 동기화 모듈 가동...", "과거-현재-미래 파동 좌표 추출 중...", "운명의 상징 심층 디코딩 중..."];

        const mInt = setInterval(() => { msgIdx++; if(msgIdx < msgs.length) txtEl.textContent = msgs[msgIdx]; }, 800);

        setTimeout(() => {
            clearInterval(mInt);
            renderReport();
        }, 3500);
    };

        const c1 = selectedCards[0].data; // 과거/현재

        const ms = now.getMilliseconds();
        const hash = Math.floor(Math.random() * 999999).toString(16).toUpperCase().padStart(6, '0');
        
        document.getElementById('r-log').innerHTML = `
            <h4>Synchronicity Engine Log</h4>
            <div class="log-item">
                <span class="log-title">1. 공시성(Synchronicity) 기반 파동 캡처</span>

            </div>
            <div class="log-item">
                <span class="log-title">2. 아카식 좌표 및 원소 매칭</span>

            </div>

        `;

        // 심층 해설
        document.getElementById('dynamic-results').innerHTML = `
            <div class="r-section">
                <h3>1. 현재 상황과 무의식의 파동</h3>
                <div class="theory-box"><strong>[상징의 디코딩: ${c1.name}]</strong><br>${c1.sym}</div>

    // 🔗 공유하기 로직
    const shareLink = async () => {
        const url = 'https://chomibinine.github.io/destinyroot/tarot/';
        const shareData = { title: '운명뿌리 - 타로 리딩', text: '의식과 무의식을 꿰뚫는 정통 타로 리딩으로 당신의 숨겨진 미래를 확인해보세요.', url: url };
        
        if (navigator.share) {
            try { await navigator.share(shareData); } catch (err) { console.error(err); }
        } else {
            const dummy = document.createElement('input'); document.body.appendChild(dummy);
            dummy.value = url; dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy);
            alert('사이트 주소가 복사되었습니다. 카카오톡 등에 붙여넣기 하세요.');
        }
    };

    return { drawCard, shareLink };
})();
</script>
