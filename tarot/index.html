<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 타로 리딩</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-base: #030509; --gold-primary: #d4af37; --gold-light: #f9e596; --text-muted: #9aa4b2; --border-glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
        
        html, body { max-width: 100vw; overflow-x: hidden; background: var(--bg-base); color: #fff; line-height: 1.7; min-height: 100vh; position: relative; width: 100%; margin: 0; padding: 0; overscroll-behavior-x: none;}
        
        .bg-aurora { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-aurora::before { content: ''; position: absolute; width: 350px; height: 350px; background: rgba(138, 43, 226, 0.15); filter: blur(120px); top: 5%; left: -100px; }
        .bg-aurora::after { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(212, 175, 55, 0.08); filter: blur(100px); bottom: 10%; right: -50px; }
        
        .app-container { max-width: 750px; margin: 0 auto; padding: 50px 20px 120px; position: relative; z-index: 1; width: 100%; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1.5px; margin: 0; background: linear-gradient(180deg, #fff 0%, #a1a1a1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); margin-top: 10px; font-size: 1rem; font-weight: 300; }
        
        .glass-card { width: 100%; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 24px; padding: 40px 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); margin-bottom: 25px; transition: all 0.3s ease; box-sizing: border-box;}
        
        .tarot-instruction { text-align: center; margin-bottom: 30px; font-size: 1.1rem; color: var(--gold-light); font-weight: 600; line-height: 1.6;}
        .card-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 30px; width: 100%; perspective: 1000px;}
        
        .tarot-card { 
            aspect-ratio: 1 / 1.6; background-color: transparent; cursor: pointer; perspective: 1000px; 
        }
        .tarot-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .tarot-card:hover .tarot-card-inner { transform: translateY(-8px); box-shadow: 0 10px 20px rgba(212,175,55,0.2); }
        .tarot-card.selected { pointer-events: none; }
        .tarot-card.selected .tarot-card-inner { transform: translateY(-10px) rotateY(180deg); box-shadow: 0 15px 30px rgba(212,175,55,0.5); }
        
        .tarot-card-front, .tarot-card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 8px; border: 2px solid rgba(212,175,55,0.4); box-sizing: border-box;}
        .tarot-card-front { background: linear-gradient(135deg, #1a1a2e, #0f0f1a); background-image: repeating-linear-gradient(45deg, rgba(212,175,55,0.05) 0px, rgba(212,175,55,0.05) 2px, transparent 2px, transparent 8px); }
        .tarot-card-back { background-color: #000; background-size: cover; background-position: center; transform: rotateY(180deg); border-color: var(--gold-light); }
        
        #card-reveal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3,5,9,0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; perspective: 1200px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);}
        .reveal-card { width: 240px; height: 384px; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: rotateY(0deg); }
        .reveal-card.flipped { transform: rotateY(180deg) scale(1.15); }
        .reveal-front, .reveal-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; border: 2px solid rgba(212,175,55,0.4); box-shadow: 0 15px 40px rgba(0,0,0,0.8); box-sizing: border-box;}
        .reveal-front { background: linear-gradient(135deg, #1a1a2e, #0f0f1a); background-image: repeating-linear-gradient(45deg, rgba(212,175,55,0.05) 0px, rgba(212,175,55,0.05) 2px, transparent 2px, transparent 8px); }
        .reveal-back { background-size: 100% 100%; background-position: center; background-color: #000; transform: rotateY(180deg); border-color: var(--gold-primary); }
        .reveal-title { margin-top: 50px; font-size: 1.6rem; color: #fff; font-weight: 900; opacity: 0; transition: opacity 0.5s ease 0.4s; text-align: center; text-shadow: 0 0 15px rgba(212,175,55,0.5); padding: 0 20px;}
        .reveal-card.flipped ~ .reveal-title { opacity: 1; }

        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 18px; border-radius: 30px; font-weight: 800; font-size: 1.15rem; cursor: pointer; border: none; width: 100%; transition: 0.2s; margin-top: 10px; box-sizing: border-box;}
        .btn-primary { background: var(--gold-primary); color: #000; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); margin-top: 15px;}
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
        
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3,5,9,0.98); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .orbit { width: 60px; height: 60px; border: 2px solid var(--gold-primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #report-view { display: none; width: 100%; }
        
        .log-box { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 16px; padding: 25px; margin-bottom: 50px; font-size: 0.95rem; color: #a1b0c0; line-height: 1.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); width: 100%; box-sizing: border-box;}
        .log-box h4 { color: #b388ff; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px dashed rgba(138, 43, 226, 0.3); padding-bottom: 10px; font-weight: 800; }
        .log-item { margin-bottom: 15px; }
        .log-title { color: #fff; font-weight: 700; display: block; margin-bottom: 4px; }
        .log-formula { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 5px; font-family: monospace; overflow-x: auto; color: var(--gold-light); width: 100%; box-sizing: border-box; word-break: break-all;}

        .spread-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 50px; width: 100%;}
        .spread-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 16px; padding: 30px 20px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;}
        .spread-card .position { font-size: 0.95rem; color: var(--gold-primary); font-weight: 800; letter-spacing: 1px; margin-bottom: 20px; }
        .spread-card .c-img { width: 100%; max-width: 200px; border-radius: 10px; margin-bottom: 20px; border: 2px solid rgba(212,175,55,0.5); box-shadow: 0 10px 25px rgba(0,0,0,0.6); display: block;}
        .spread-card .c-name { font-size: 1.3rem; font-weight: 900; color: #fff; line-height: 1.4;}

        .r-section { margin-bottom: 60px; text-align: left; width: 100%;}
        .r-section h3 { font-size: 1.5rem; margin-bottom: 20px; border-left: 4px solid var(--gold-primary); padding-left: 15px; font-weight: 900; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;}
        
        .theory-box { background: rgba(212,175,55,0.05); padding: 25px; border-radius: 12px; font-size: 1rem; color: var(--gold-light); margin-bottom: 25px; border-left: 3px solid var(--gold-primary); line-height: 1.7; font-weight: 300;}
        .theory-box strong { font-weight: 800; color: #fff; }
        
        .result-content { font-size: 1.1rem; line-height: 1.9; color: #d1d5db; text-align: justify; padding: 0 10px;}
        .result-content p { margin-bottom: 20px; }
        .result-content strong { color: var(--gold-light); font-weight: 800; }
        
        /* 🤫 스텔스 마케팅 CSS */
        .luck-advice { margin-top: 40px; padding: 35px 25px; border-radius: 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; box-sizing: border-box;}
        .luck-advice h4 { color: var(--gold-light); font-size: 1.25rem; margin-bottom: 15px; font-weight: 800; }
        .luck-advice p { font-size: 1.05rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 25px; }
        .link-luck { display: inline-block; color: var(--gold-primary); font-size: 1.15rem; font-weight: 800; text-decoration: none; border-bottom: 1px solid rgba(212,175,55,0.4); padding-bottom: 3px; transition: 0.2s; word-break: keep-all;}
        .link-luck:hover { color: #fff; border-color: #fff; }

        @media (max-width: 600px) { 
            .app-container { padding: 20px 15px 100px; overflow-x: hidden; } 
            .header h1 { font-size: 2rem; }
            .header p { font-size: 0.95rem; }
            .glass-card { padding: 25px 15px; width: 100%; margin-left: 0; margin-right: 0;}
            
            .card-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px;}
            .tarot-instruction { font-size: 0.95rem; margin-bottom: 20px;}
            
            .reveal-card { width: 200px; height: 320px; }
            .reveal-title { font-size: 1.4rem; margin-top: 40px; }

            .spread-grid { grid-template-columns: 1fr; gap: 30px; margin-bottom: 40px;} 
            .spread-card { display: flex; flex-direction: column; align-items: center; padding: 35px 20px; text-align: center; } 
            .spread-card .position { margin-bottom: 20px; color: var(--gold-primary); font-size:1rem;}
            .spread-card .c-img { width: 100%; max-width: 280px; margin-bottom: 20px; }
            
            .r-section { margin-bottom: 40px; }
            .r-section h3 { font-size: 1.3rem; padding-left: 10px; margin-bottom: 15px;}
            .log-box { padding: 15px; font-size: 0.85rem; margin-bottom: 30px;}
            .theory-box { padding: 15px; font-size: 0.9rem; margin-bottom: 15px;}
            .result-content { font-size: 0.95rem; padding: 0;}
            
            .luck-advice { padding: 20px 15px; margin-top: 30px;}
            .luck-advice h4 { font-size: 1.1rem; }
            .luck-advice p { font-size: 0.95rem; }
            .link-luck { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="bg-aurora"></div>

<div id="card-reveal-overlay">
    <div class="reveal-card" id="reveal-card">
        <div class="reveal-front"></div>
        <div class="reveal-back" id="reveal-back"></div>
    </div>
    <div class="reveal-title" id="reveal-title"></div>
</div>

<div id="loader">
    <div class="orbit"></div>
    <div id="loader-text" style="color:var(--gold-light); font-weight:700; font-size:1.2rem;">아카식 레코드 동기화 중...</div>
</div>

<div class="app-container">
    <div id="input-view">
        <div class="header"><h1>타로 리딩</h1><p>무의식의 파동과 공시성(Synchronicity) 기반 스캔</p></div>
        <div class="glass-card">
            <div class="tarot-instruction">
                해결하고 싶은 고민이나 막막한 상황을 마음속에 깊이 떠올린 후,<br>직관이 이끄는 운명의 카드 <span style="color:#fff; font-size:1.4rem; font-weight:900; margin:0 5px;">3장</span>을 선택해 주세요.
            </div>
            
            <div class="card-grid" id="deck">
                <script>
                    for(let i=0; i<22; i++) {
                        document.write(`
                        <div class="tarot-card" onclick="Tarot.drawCard(this)">
                            <div class="tarot-card-inner">
                                <div class="tarot-card-front"></div>
                                <div class="tarot-card-back"></div>
                            </div>
                        </div>`);
                    }
                </script>
            </div>

            <div style="text-align: center; color: var(--text-muted); font-size: 1rem; margin-top: 20px;">
                선택한 카드: <span id="draw-count" style="color: var(--gold-primary); font-weight: 900; font-size: 1.5rem;">0</span> / 3
            </div>
        </div>
    </div>
    
    <div id="report-view" class="glass-card">
        <div id="r-header" style="text-align:center; margin-bottom:30px;">
            <h2 style="font-weight:900; font-size: 1.8rem; letter-spacing: -1px;">정통 타로 딥리딩 리포트</h2>
            <p style="color:var(--gold-light); font-size:0.95rem; margin-top:8px; font-weight: 300;">과거, 현재, 그리고 당신이 마주할 미래</p>
        </div>
        
        <div class="log-box" id="r-log"></div>

        <div class="spread-grid" id="r-spread"></div>
        
        <div id="dynamic-results"></div>
        <div id="cta-area"></div>
        
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:40px;">
            <button class="btn btn-secondary" onclick="Tarot.shareLink()" style="margin-top:0;">🔗 내 타로 결과 공유하기</button>
            <button class="btn btn-primary" onclick="location.href='https://chomibinine.github.io/destinyroot/'">🏠 메인 홈으로 돌아가기</button>
        </div>
    </div>
</div>

<script>
const Tarot = (() => {
    // 🔥 타로 메이저 아르카나 22장
    const MAJOR_ARCANA = [
        { num: "0", name: "The Fool (바보)", img: "https://sacred-texts.com/tarot/pkt/img/ar00.jpg", type: "Air",
          sym: "절벽 끝에 서 있으면서도 하늘을 올려다보고 있는 청년과 하얀 강아지. 두려움을 초월한 순수한 믿음과 무한한 잠재력을 뜻합니다.",
          sit: "<p>당신은 현재 아무것도 확정되지 않은 백지상태, 혹은 완전히 새로운 챕터의 시작점에 서 있습니다. 과거의 무거운 짐을 훌훌 털어버리고 무한한 가능성을 향해 나아가고 싶은 강렬한 충동을 느낍니다.</p><p>이는 타인의 눈에는 몹시 무모하고 계획이 없어 보일 수 있으나, 사실 당신의 영혼이 진정으로 갈망하는 해방의 신호입니다. 기존의 낡은 관습이나 답답한 규칙에 얽매이는 것에 극심한 피로를 느끼고 있으며, 내면에서는 이미 새로운 모험을 향한 카운트다운이 시작된 역동적인 파동입니다.</p>",
          adv: "<p>계산하고 통제하려는 이성의 목소리를 잠시 꺼두십시오. 지금은 치밀한 논리보다 당신의 첫 번째 직관과 본능적 충동에 몸을 맡겨야 할 타이밍입니다.</p><p>실패나 타인의 시선을 두려워하여 주저앉는다면, 다가오는 거대한 기회조차 날려버리게 됩니다. 세상물정 모르는 '바보 같은 순수함'과 뻔뻔한 용기가 지금 이 상황을 돌파할 수 있는 당신의 가장 강력하고 유일한 무기가 되어 줄 것입니다.</p>",
          out: "<p>당신을 옭아매던 모든 낡은 제약과 답답한 현실에서 완전히 해방됩니다. 계획대로 흘러가지 않는 것이 오히려 축복이 되어, 전혀 예상치 못한 긍정적인 방향으로 삶의 궤도가 수정될 것입니다.</p><p>새로운 환경에서 귀인을 만나거나 기분 좋은 모험을 경험하게 되며, 그동안 억눌려 있던 창조적인 에너지가 폭발적으로 발산되는 완벽한 자유의 결말을 맞이합니다.</p>" },
        { num: "I", name: "The Magician (마법사)", img: "https://sacred-texts.com/tarot/pkt/img/ar01.jpg", type: "Air",
          sym: "테이블 위의 4원소(지팡이, 성배, 검, 동전)와 머리 위의 무한대(∞) 기호. 무(無)에서 유(有)를 창조하는 완벽한 잠재력과 다재다능함을 의미합니다.",
          sit: "<p>당신은 현재 당면한 문제를 해결하거나 새로운 프로젝트를 시작하는 데 필요한 모든 자원과 능력을 이미 내면에 완벽하게 갖추고 있습니다. 아이디어가 샘솟고 있으며, 주변 상황을 내 뜻대로 통제할 수 있다는 자신감이 충만한 상태입니다.</p><p>사람들의 이목을 끌고 설득해 내는 화술과 매력이 최고조에 달해 있는 긍정적인 파동입니다. 기회가 주어지기만을 기다리던 수동적인 태도에서 벗어나, 이제 막 무대 위로 올라서려는 압도적인 에너지가 느껴집니다.</p>",
          adv: "<p>머릿속으로 상상하고 계획만 하던 것들을 지체 없이 밖으로 꺼내어 구체적인 실행에 옮기십시오. 당신의 생각과 의도를 숨기지 말고 자신감 있게 어필할 때 마법 같은 변화가 일어납니다.</p><p>스스로의 능력을 과소평가하거나 겸손을 떨 타이밍이 아닙니다. 가지고 있는 모든 기술과 인맥, 자본을 총동원하여 상황을 주도적으로 리드하십시오. 당신이 판을 깔면 사람들은 자연스럽게 매료되어 따라오게 됩니다.</p>",
          out: "<p>당신의 반짝이는 아이디어나 기획이 현실에서 완벽하게 구체화되어 눈에 보이는 훌륭한 성과로 나타납니다. 불가능해 보이던 제안이 성사되거나 막혀있던 협상이 극적으로 체결됩니다.</p><p>속해 있는 조직이나 관계 내에서 당신의 능력을 널리 인정받고 확실한 주도권을 쥐게 되는 압도적이고 눈부신 성공을 거머쥐게 될 것입니다.</p>" },
        { num: "II", name: "High Priestess (여사제)", img: "https://sacred-texts.com/tarot/pkt/img/ar02.jpg", type: "Water",
          sym: "흑백의 기둥 사이에 앉아 율법서를 든 여인. 표면으로 드러나지 않은 숨겨진 진실, 깊은 통찰, 그리고 고도의 직관력을 상징합니다.",
          sit: "<p>상황은 겉보기에는 아무 일 없이 고요하고 평온해 보이지만, 수면 아래에서는 당신만 느낄 수 있는 미묘한 직감이나 아직 밝혀지지 않은 비밀이 존재하고 있습니다.</p><p>타인에게 당신의 진짜 속마음이나 계획을 쉽게 드러내지 않고 있으며, 섣불리 행동하기보다는 한 발짝 물러서서 상황이 흘러가는 패턴을 꿰뚫어 보려는 정적이고 수용적인 상태입니다. 이성적인 데이터보다 본능적인 '촉'이 극도로 발달해 있는 예민한 파동입니다.</p>",
          adv: "<p>주변 사람들의 조언이나 겉으로 보이는 수치, 화려한 말의 성찬에 휘둘리지 마십시오. 당신의 깊은 내면에서 들려오는 직관과 첫 느낌이 정답을 알고 있습니다.</p><p>지금은 먼저 나서서 상황을 통제하려 들거나 결론을 재촉할 때가 아닙니다. 침묵을 지키고 상대방의 반응을 묵묵히 관망하며 상황의 이면을 예리하게 뜯어보는 것이 가장 유리한 전략입니다.</p>",
          out: "<p>불확실했던 안개가 걷히고 숨겨져 있던 진실이 명백하게 밝혀지게 됩니다. 억지로 애쓰고 발버둥 치지 않아도, 상황의 흐름 자체가 당신에게 가장 유리한 쪽으로 자연스럽게 정돈될 것입니다.</p><p>세속적인 성취나 요란한 승리보다는, 정신적으로 한 차원 깊은 깨달음을 얻게 되며 누구도 흔들 수 없는 확고한 내면의 평화를 얻는 결말입니다.</p>" },
        { num: "III", name: "The Empress (여황제)", img: "https://sacred-texts.com/tarot/pkt/img/ar03.jpg", type: "Earth",
          sym: "풍요로운 자연 속에 편안하게 앉은 여인과 금성 기호. 만물을 길러내고 수용하는 무조건적인 사랑과 궁극적인 물질적 풍요를 상징합니다.",
          sit: "<p>당신은 현재 감정적으로나 물질적으로 매우 안정적이고 풍요로운 파동 속에 머물고 있습니다. 그동안 씨앗을 뿌리고 땀 흘려 노력해 온 일들이 마침내 아름다운 결실을 맺기 시작하는 따뜻한 시기입니다.</p><p>내면에 타인을 보살피고 안아주려는 여유와 사랑이 넘쳐나며, 미적인 감각과 창조력이 풍부해져 있는 상태입니다. 척박한 경쟁보다는 아름다움과 조화, 그리고 일상의 소소한 행복을 누릴 자격이 충분한 상황입니다.</p>",
          adv: "<p>날을 세우고 치열하게 투쟁하기보다는, 마음의 여유를 가지고 주변을 따뜻하게 품어 안으십시오. 억지로 결과를 쥐어짜 내려 하지 않아도 때가 되면 자연스럽게 열매가 맺히는 법입니다.</p><p>자신을 혹사시키지 말고, 스스로를 사랑하고 가꾸는 데 투자하십시오. 타인에게 대가 없이 베푸는 작은 배려와 공감이 오히려 더 큰 기회와 엄청난 금전적 행운으로 되돌아오는 시기입니다.</p>",
          out: "<p>가장 풍성하고 달콤한 수확의 결말입니다. 진행하던 프로젝트의 대성공, 인간관계에서의 깊고 편안한 애정, 혹은 기대 이상의 금전적인 수익 등 당신이 투자한 곳에서 무럭무럭 자라난 결실을 온전히 맛보게 됩니다.</p><p>결핍과 불안이 사라지고 당신의 삶 전반에 걸쳐 감각적이고 육체적인 만족, 그리고 의심할 여지 없는 물질적 풍요로움이 가득 차오를 것입니다.</p>" },
        { num: "IV", name: "The Emperor (황제)", img: "https://sacred-texts.com/tarot/pkt/img/ar04.jpg", type: "Fire",
          sym: "견고한 돌 의자에 꼿꼿이 앉아 통제권을 쥔 남성. 감정을 배제하고 현실적인 질서와 룰을 세우는 세속적인 권력과 확고한 지배력을 상징합니다.",
          sit: "<p>당신은 현재 무거운 책임을 어깨에 짊어지고 있거나, 혼란스러운 상황을 철저하게 통제하고 바로잡아야만 하는 압박감 속에 놓여 있습니다.</p><p>사사로운 감정에 휘둘릴 여유가 없으며, 오직 이성적이고 체계적인 논리를 바탕으로 당신만의 견고한 성벽과 시스템을 구축하고 있는 단계입니다. 리더의 자리에서 사람들을 이끌거나, 누군가의 든든한 방어막 역할을 해내고 있는 무겁고도 단단한 파동입니다.</p>",
          adv: "<p>지금은 동정심이나 우유부단함이 당신의 발목을 잡을 수 있습니다. 모호한 태도를 버리고 단호하고 냉철한 리더십을 발휘해야 할 때입니다.</p><p>타인의 의견에 이리저리 흔들리지 말고 당신만의 명확한 기준과 규칙을 세우십시오. 상황과 인간관계를 확실하게 장악하고 리드해야만 붕괴를 막고 조직의 기틀을 견고하게 다질 수 있습니다.</p>",
          out: "<p>어떤 풍파에도 절대 흔들리지 않는 확고한 지위와 안정을 최종적으로 쟁취하게 됩니다. 오랫동안 목표로 하던 승진, 권위의 획득, 혹은 단단한 재물적 기반이 구축됩니다.</p><p>단순한 운이 아니라 당신의 철저한 노력과 통제력으로 일구어낸 결과이기에 더욱 값지며, 누구도 당신이 이룩한 영토와 자리를 쉽게 넘보거나 침범할 수 없게 되는 영광스러운 결말입니다.</p>" },
        { num: "V", name: "The Hierophant (교황)", img: "https://sacred-texts.com/tarot/pkt/img/ar05.jpg", type: "Earth",
          sym: "두 사제에게 축복을 내리는 교황. 대대로 이어져 온 전통, 사회적 규범의 준수, 그리고 지혜를 전수하는 영적인 멘토를 상징합니다.",
          sit: "<p>당신은 현재 소속된 집단이나 학교, 직장 등 사회적인 시스템 안에서 자신의 역할을 찾고 소속감을 느끼길 갈망하고 있습니다.</p><p>혁명적이거나 튀는 행동보다는, 검증되고 안전한 길을 걷고 싶어 하는 보수적인 파동입니다. 혹은 해결하기 힘든 인생의 난제 앞에서, 나보다 경험이 많고 통찰력이 깊은 멘토나 전문가의 지혜로운 조언이 절실하게 필요한 상태일 수 있습니다.</p>",
          adv: "<p>지금은 독단적이고 파격적인 결정을 내리거나 기존의 질서를 거스르며 혼자 튀려 하지 마십시오. 오히려 정해진 매뉴얼과 사회적 통념, 윤리적인 룰을 성실하게 따르는 것이 가장 안전한 지름길입니다.</p><p>당신의 고집을 내려놓고, 그 분야에서 이미 성취를 이룬 선배, 스승, 혹은 전문가를 찾아가 마음을 열고 가르침을 구하십시오. 그들의 경험 속에 당신이 쥐어야 할 정답이 있습니다.</p>",
          out: "<p>방황을 끝내고 당신을 지켜줄 수 있는 안정적이고 든든한 조직에 안착하게 됩니다. 취업이나 승진, 혹은 양가의 축복을 받는 정식 결혼과 같이 사회적으로 공인되고 합법적인 계약이 성사되는 결말입니다.</p><p>훌륭한 조력자의 도움으로 위기를 무사히 넘기며, 혼자서는 깨닫기 힘들었던 깊은 지혜와 정신적 성장을 이루게 될 것입니다.</p>" },
        { num: "VI", name: "The Lovers (연인)", img: "https://sacred-texts.com/tarot/pkt/img/ar06.jpg", type: "Air",
          sym: "에덴동산의 아담과 이브, 그리고 그들을 축복하는 천사. 단순한 육체적 이끌림을 넘어선 완벽한 조화, 가치관의 결합, 그리고 중대한 '선택'의 상징입니다.",
          sit: "<p>당신의 삶에 누군가와의 깊은 정서적 교감이나 매우 중요한 파트너십(연애, 동업)이 형성되고 있는 매력적인 파동입니다.</p><p>혹은 현재 전혀 다른 두 가지의 매력적인 기회나 선택지 사이에서 마음이 강하게 이끌리며 깊은 고민에 빠져있는 상태일 수 있습니다. 머리로 이해하기보다는 가슴이 두근거리고 직관적인 끌림이 상황을 지배하고 있는 매우 로맨틱하고도 아슬아슬한 시기입니다.</p>",
          adv: "<p>이해타산을 따지거나 머리로 손익을 계산하여 억지로 정답을 짜내려 하지 마십시오. 당신의 심장이 진정으로 설레고 영혼이 이끌리는 쪽으로 기꺼이 발걸음을 옮겨야 합니다.</p><p>또한, 혼자서 모든 짐을 짊어지려 하지 마세요. 진심으로 신뢰할 수 있고 주파수가 통하는 누군가에게 속마음을 열고 적극적으로 소통하며 연대할 때 최고의 시너지가 폭발합니다.</p>",
          out: "<p>영혼의 주파수가 완벽하게 일치하는 최고의 파트너를 만나거나, 오랫동안 엉켜있던 갈등이 부드럽게 풀리며 극적인 화해와 융합을 이루게 됩니다.</p><p>고민하던 선택의 기로에서 결국 가장 올바르고 행복한 길을 택하게 되며, 후회 없는 유대감과 사랑으로 충만한, 말 그대로 축복받는 눈부신 결말을 맞이하게 될 것입니다.</p>" },
        { num: "VII", name: "The Chariot (전차)", img: "https://sacred-texts.com/tarot/pkt/img/ar07.jpg", type: "Water",
          sym: "상반된 두 마리의 스핑크스(본능과 이성)가 끄는 전차를 완벽히 통제하며 돌진하는 전사. 내면의 갈등을 고도의 의지력으로 짓누르고 목표를 돌파해 내는 승리를 의미합니다.",
          sit: "<p>당신의 앞길에는 여러 가지 복잡한 감정의 충돌이나 만만치 않은 방해물들이 산재해 있습니다. 하지만 당신은 결코 주저앉지 않고 강한 의지력과 통제력으로 상황의 운전대를 꽉 틀어쥐고 있습니다.</p><p>뒤를 돌아볼 겨를 없이 오직 목표만을 향해 가속 페달을 밟고 있는 역동적인 상태입니다. 내면의 두려움이나 유혹을 억누르며 스스로를 끊임없이 채찍질하고 있는, 치열하고도 피곤한 전진의 에너지가 지배적입니다.</p>",
          adv: "<p>지금은 좌고우면하며 고민할 때가 아닙니다. 오직 당신이 설정한 단 하나의 깃발만 보고 모든 에너지를 쏟아부어 직진하십시오.</p><p>완벽하고 치밀한 계획을 세우느라 시간을 낭비하지 마세요. 거칠더라도 일단 부딪히고 상황을 돌파해 내는 흔들림 없는 뚝심과, 뻔뻔할 정도의 강렬한 추진력이 지금 당신에게 필요한 유일한 성공의 열쇠입니다.</p>",
          out: "<p>어떤 험난한 난관이나 경쟁자의 방해 공작도 모조리 박살 내고, 마침내 쟁취해 내는 속 시원하고 압도적인 승리의 결말입니다.</p><p>치열한 경쟁 상황에서 확고한 우위를 점하게 되며, 당신의 의도와 계획대로 상황을 완벽하게 장악하게 됩니다. 거침없는 성취와 그로 인한 확고한 자신감을 보상으로 얻게 될 것입니다.</p>" },
        { num: "VIII", name: "Strength (힘)", img: "https://sacred-texts.com/tarot/pkt/img/ar08.jpg", type: "Fire",
          sym: "사나운 사자(야성과 본능)의 입을 맨손으로 부드럽게 쓰다듬어 진정시키는 여인. 물리적인 완력이나 억압이 아닌 인내, 포용력, 진정한 내면의 고차원적인 힘을 상징합니다.",
          sit: "<p>당신은 현재 극심한 외부의 압박을 견디고 있거나, 스스로의 내부에서 끓어오르는 부정적인 감정(분노, 두려움, 충동)을 이성으로 간신히 억누르며 치열한 내적 전쟁을 치르고 있습니다.</p><p>상황을 당장 갈어엎어 버리고 싶은 충동이 들지만, 그렇게 해서는 안 된다는 것을 본능적으로 알고 있기에 묵묵히 인내의 시간을 보내고 있는, 대단히 성숙하고도 고통스러운 멘탈 수련의 과정입니다.</p>",
          adv: "<p>거친 분노나 강압적인 힘으로 상대방(또는 상황)을 무릎 꿇리려 하지 마십시오. 칼보다 부드러운 바람이 옷을 벗기는 법입니다.</p><p>외유내강의 자세가 필요합니다. 상처받은 마음을 어루만지듯, 부드러운 카리스마와 끝을 알 수 없는 깊은 인내심, 그리고 상대방의 약점마저 감싸 안는 거대한 포용력을 발휘할 때 비로소 진정한 승기를 잡을 수 있습니다.</p>",
          out: "<p>피를 흘리지 않고도 적을 내 편으로 만드는 최고의 결말입니다. 길고 고통스러웠던 인내의 시간 끝에, 당신은 가장 평화롭고 완벽한 형태로 상황을 완전히 통제하게 됩니다.</p><p>당신의 뜻을 반대하거나 적대적이던 사람들조차 당신의 깊은 인품과 부드러운 카리스마에 감화되어, 당신에게 마음을 열고 절대적인 지지와 존경을 보내게 될 것입니다.</p>" },
        { num: "IX", name: "The Hermit (은둔자)", img: "https://sacred-texts.com/tarot/pkt/img/ar09.jpg", type: "Earth",
          sym: "세상의 시끄러운 소음을 등지고 차가운 설산에서 등불 하나에 의지해 묵묵히 걷는 노인. 외부의 간섭을 차단한 깊은 자기 성찰과 고독한 진리 탐구를 상징합니다.",
          sit: "<p>당신은 끊임없이 쏟아지는 현실의 번잡함과 얕은 인간관계에서 심한 피로를 느끼며, 한 걸음 벗어나 혼자만의 시간을 간절히 원하고 있는 상태입니다.</p><p>외부의 자극적인 쾌락이나 물질적인 성취보다는, 내 영혼이 진짜로 원하는 것이 무엇인지 깊은 내면의 목소리에 귀를 기울이고 있는 정체기입니다. 남들이 보기에는 외롭고 고립되어 보일지 모르나, 당신 스스로 선택한 꼭 필요한 자발적 고독의 시간입니다.</p>",
          adv: "<p>타인의 조언이나 세상의 기준 속에서 정답을 찾으려 헤매지 마십시오. 타인과의 불필요한 약속을 줄이고 스스로의 어두운 심연 속으로 과감히 들어가야 합니다.</p><p>철저한 고독을 두려워하지 말고 오히려 즐기십시오. 스마트폰을 끄고 조용히 명상하거나 책을 읽으며 깊이 사색할 때, 당신의 영혼을 밝혀줄 진짜 해결책이 등불처럼 번뜩여 오를 것입니다.</p>",
          out: "<p>오랜 고립과 고민의 터널 끝에서, 마침내 남들은 죽었다 깨어나도 보지 못하는 깊은 삶의 지혜와 영적인 깨달음을 얻게 됩니다.</p><p>세상의 얄팍한 속임수나 유행에 더 이상 흔들리지 않는 다이아몬드처럼 단단한 내면을 갖추게 되며, 당신이 깨달은 그 진리가 훗날 길을 잃은 타인들을 올바른 곳으로 이끌어주는 눈부신 이정표가 될 것입니다.</p>" },
        { num: "X", name: "Wheel of Fortune (운명의 수레바퀴)", img: "https://sacred-texts.com/tarot/pkt/img/ar10.jpg", type: "Fire",
          sym: "끊임없이 회전하는 바퀴와 그 주변을 감싸고 있는 네 마리의 신수. 인간의 얄팍한 의지를 초월하여 일어나는 우주적 순환, 필연적인 변화와 타이밍, 그리고 피할 수 없는 인연의 상징입니다.",
          sit: "<p>당신의 통제와 의지를 완전히 벗어난 곳에서 거대한 운명의 사이클이 크게 맞물려 돌아가기 시작했습니다. 그동안 원인을 알 수 없이 꽉 막혀있던 상황의 톱니바퀴가 돌아가기 시작한 파동입니다.</p><p>어쩌다 일어난 우연이라 생각했던 일들이, 사실은 당신이 반드시 겪어야만 하는 '운명적인 타이밍' 속에서 일어나는 필연의 궤도에 이미 진입해 있는 상태입니다. 거부할 수 없는 변화의 바람이 불어오고 있습니다.</p>",
          adv: "<p>갑자기 들이닥친 변화의 흐름을 두려워하거나 예전의 익숙함으로 돌아가려 헛된 저항을 하지 마십시오. 다가오는 기회나 예기치 못한 상황 전개에 몸을 맡기고 유연하게 파도에 올라타야 합니다.</p><p>지금 당신 앞을 스쳐 가는 우연한 인연이나 사소한 제안은, 당신의 삶을 완전히 뒤바꿔놓을 다음 챕터의 열쇠입니다. 마음을 활짝 열고 운명이 이끄는 대로 흐름을 수용하세요.</p>",
          out: "<p>지독하게 정체되어 있던 운의 흐름이 긍정적인 방향으로 폭발적으로 전환됩니다. 당신의 노력과 상관없이 하늘이 돕는 듯한 뜻밖의 엄청난 행운과 귀인이 찾아옵니다.</p><p>바닥을 쳤던 궤도가 상승세로 돌아서며, 삶의 무대 자체가 완전히 새로운 차원으로 퀀텀 점프(업그레이드)하는 가슴 벅차고 기적 같은 결말을 맞이하게 될 것입니다.</p>" },
        { num: "XI", name: "Justice (정의)", img: "https://sacred-texts.com/tarot/pkt/img/ar11.jpg", type: "Air",
          sym: "저울(한 치의 오차도 없는 공평함)과 양날의 검(단호하고 냉혹한 판결)을 쥐고 있는 인물. 감정에 1%도 치우치지 않는 이성과 냉혹한 인과응보, 완벽한 균형점을 상징합니다.",
          sit: "<p>당신은 현재 어떤 중대한 사안을 두고 옳고 그름을 낱낱이 따져야 하거나, 끓어오르는 감정과 차가운 이성 사이에서 완벽한 밸런스를 잡으려 고군분투하고 있습니다.</p><p>중요한 계약서에 도장을 찍기 직전이거나, 법적인 분쟁, 혹은 연인이나 동료와의 관계에서 손익을 명확히 계산하며 가장 공정한 결론을 내리기 위해 칼을 빼 들기 직전의 팽팽한 파동입니다.</p>",
          adv: "<p>과거의 정이나 사사로운 동정심, 얄팍한 타협의 유혹에 절대 휩쓸리지 마십시오. 당신과 전혀 상관없는 제3자의 가장 차가운 시선으로 상황을 극도로 객관화해야 합니다.</p><p>주관적인 감정을 완벽히 배제하고, 오직 눈앞에 드러난 '팩트와 원칙'만 놓고 냉정하게 저울질하는 것만이 훗날의 탈을 막을 수 있는 유일하고도 가장 강력한 해답입니다.</p>",
          out: "<p>질척거리고 모호했던 엉킨 실타래가 날카로운 검에 잘리듯 명확하고 깔끔하게 정리됩니다. 세상의 법칙은 뿌린 대로 거두는 법입니다.</p><p>당신이 정당한 땀을 흘리고 떳떳했다면 그에 상응하는 완벽한 보상과 승리를 거머쥘 것이며, 만약 누군가가 속임수나 편법을 썼다면 가차 없는 패배와 대가를 치르게 되는 가장 공정하고 확실한 결론을 맞이합니다.</p>" },
        { num: "XII", name: "The Hanged Man (매달린 사람)", img: "https://sacred-texts.com/tarot/pkt/img/ar12.jpg", type: "Water",
          sym: "T자형 나무에 거꾸로 매달려 있으면서도 고통받지 않고 후광이 비치는 평온한 표정을 짓는 남자. 꼼짝할 수 없는 육체적 정체 속에서 영적 깨달음을 얻는 고귀한 희생과 시각의 전환입니다.",
          sit: "<p>아무리 노력해도 일이 조금도 진척되지 않고, 마치 사방이 꽉 막힌 벽에 갇힌 것처럼 꼼짝할 수 없는 지독한 정체기입니다.</p><p>하지만 이 무력감은 당신이 실패했거나 능력이 부족해서 벌어지는 형벌이 아닙니다. 당신의 영혼이 한 단계 성장하기 위해, 우주가 당신을 강제로 멈춰 세우고 깊은 생각에 잠기도록 강제 휴식을 부여한 필연적인 시간입니다.</p>",
          adv: "<p>매달린 채로 발버둥 쳐봐야 체력만 고갈되고 상황은 더 꼬일 뿐입니다. 상황을 내 뜻대로 통제하려는 오만한 저항을 당장 멈추고 운명에 완벽하게 항복하십시오.</p><p>시야를 180도 완전히 뒤집어서 지금의 답답한 상황을 낯선 각도로 바라봐야 합니다. 당장의 손해나 기꺼운 희생을 묵묵히 감수할 때 비로소 빠져나갈 돌파구가 기적처럼 보일 것입니다.</p>",
          out: "<p>숨 막히고 고통스러웠던 오랜 정체의 시간이 마침내 끝나고, 당신의 영혼은 이전과는 비교할 수 없을 만큼 거대하고 눈부신 깨달음을 얻게 됩니다.</p><p>완전히 새로운 차원의 시야와 철학을 장착하게 되며, 남들은 도저히 흉내 낼 수 없는 깊은 지혜를 무기 삼아 불리했던 상황을 단번에 당신의 승리로 역전시켜 버릴 것입니다.</p>" },
        { num: "XIII", name: "Death (죽음)", img: "https://sacred-texts.com/tarot/pkt/img/ar13.jpg", type: "Water",
          sym: "모든 것을 쓸어버리는 해골 기사와 그 앞에 무너진 자들. 육체적 끝이 아니라, 낡은 껍질을 산산조각 내고 완전히 새로운 생명으로 태어나기 위한 '거대한 파괴와 재생'입니다.",
          sit: "<p>당신을 오랫동안 끈질기게 괴롭혔던 구조적 문제나, 억지로 붙잡고 있던 미련 가득한 관계가 바닥을 치고 마침내 완전히 종결되어 가고 있는 극단적인 파동입니다.</p><p>익숙했던 무언가가 떨어져 나가는 변화의 진통으로 인해 일시적인 상실감과 두려움이 동반될 수 있으나, 이는 당신의 영혼이 썩어버리기 전에 병든 부위를 도려내는 외과 수술과도 같은 과정입니다.</p>",
          adv: "<p>끝나가는 인연, 실패가 명백한 프로젝트, 돌이킬 수 없는 상황에 대한 집착을 1%도 남김없이 완벽하게 놓아버리십시오.</p><p>시들어진 과거의 잎사귀를 단칼에 도려내야만 새로운 에너지가 싹틀 자리가 생겨납니다. 두려워하지 말고 운명의 사신에게 낡은 당신을 기꺼이 내어주며 비워냄의 미학을 실천해야 살 수 있습니다.</p>",
          out: "<p>지긋지긋하고 끔찍했던 상황이 극적으로 완전히 종료되며, 과거의 나약하고 어리석었던 당신은 완벽하게 소멸합니다.</p><p>대신 검은 재를 뚫고 찬란하게 날아오르는 불사조처럼, 상상조차 하지 못했던 전혀 새로운 차원의 기회와 눈부신 생명력을 얻게 됩니다. 말 그대로 껍질을 깨고 나오는 기적적인 재생과 부활을 맞이하게 될 것입니다.</p>" },
        { num: "XIV", name: "Temperance (절제)", img: "https://sacred-texts.com/tarot/pkt/img/ar14.jpg", type: "Fire",
          sym: "발을 땅과 물에 반씩 걸친 천사가 두 개의 잔에 든 물을 쏟지 않고 절묘하게 섞고 있습니다. 치우침 없이 상반된 에너지를 융합하는 황금비율과 연금술을 의미합니다.",
          sit: "<p>당신은 현재 넘치는 과한 욕심과 감정을 다스리며, 이상과 팍팍한 현실 사이에서 가장 현명한 타협점을 찾아가고 있는 안정된 파동 속에 있습니다.</p><p>겉보기에 스펙터클한 드라마나 아드레날린이 솟구치는 극적인 사건은 없지만, 내면의 불순물이 가라앉고 맑은 물이 흐르듯 모든 상황이 매우 순조롭고 유연하게 흘러가고 있는 치유의 시기입니다.</p>",
          adv: "<p>조급하게 결론을 내거나 욕심을 부려 템포를 끌어올리지 마십시오. 당신과 전혀 다른 성향의 사람이나 이질적인 의견이 부딪힐 때 배척하지 말고 유연하게 수용해야 합니다.</p><p>물과 포도주가 섞이듯, 상반된 감정이나 두 가지 엉킨 상황을 부드럽고 끈기 있게 섞어내는 중용의 연금술이 지금 당신이 발휘해야 할 가장 위대한 능력입니다.</p>",
          out: "<p>어느 한쪽으로 무너지거나 치우치지 않고 모든 상황이 가장 완벽하고 아름다운 밸런스를 되찾게 됩니다. 극단적인 대립이나 피곤한 갈등이 눈 녹듯 사라집니다.</p><p>마음의 깊은 평화를 얻게 되며, 큰 잡음이나 타인의 원망 없이 당신이 설정한 최종 목적지에 무사히, 그리고 가장 우아한 모습으로 안착하게 될 것입니다.</p>" },
        { num: "XV", name: "The Devil (악마)", img: "https://sacred-texts.com/tarot/pkt/img/ar15.jpg", type: "Earth",
          sym: "느슨한 사슬에 묶인 채 쾌락에 빠진 남녀와 그들을 내려다보는 악마. 나쁜 줄 알면서도 스스로 벗어나지 못하는 세속적 유혹, 물질적 집착, 중독적 관계를 상징합니다.",
          sit: "<p>당신은 현재 스스로에게 해가 된다는 것을 머리로는 뼈저리게 알면서도 끊어내지 못하는 치명적인 관계나 상황에 깊숙이 발을 들이밀고 있습니다.</p><p>비정상적인 구속, 일방적인 희생, 혹은 돈과 육체적 쾌락에 얽매여 맑은 이성이 마비된 어두운 파동입니다. 거부할 수 없는 유혹에 눈이 멀어 늪에 빠져가는 것조차 즐기고 있을지도 모릅니다.</p>",
          adv: "<p>자세히 보십시오. 목에 감긴 사슬은 자물쇠가 풀려 있어 당신이 마음만 먹으면 언제든 걷어차고 도망칠 수 있습니다.</p><p>스스로를 파괴하고 옭아매는 무서운 집착과 부정적인 욕망의 실체를 핑계 대지 말고 직시하십시오. 두려움을 이겨내고 살점을 도려내는 뼈아픈 각오로 단숨에 사슬을 끊어버리고 빛으로 뛰쳐나와야 합니다.</p>",
          out: "<p>나약한 의지로 유혹을 끝내 이기지 못한다면 밑바닥 없는 파멸의 늪에 완전히 잠식당하게 될 것입니다. 하지만, 그 지독한 본능의 힘을 역이용한다면 결과는 180도 달라집니다.</p><p>어두운 욕망을 이성으로 완벽하게 제어하여 일에 쏟아붓는다면, 도덕성을 초월하는 엄청난 카리스마와 폭발적인 물질적 재물(성공)을 긁어모으는 역설적인 승리를 쟁취할 수 있습니다.</p>" },
        { num: "XVI", name: "The Tower (탑)", img: "https://sacred-texts.com/tarot/pkt/img/ar16.jpg", type: "Fire",
          sym: "하늘에서 내리친 번개에 맞아 왕관이 떨어지고 무너져 내리는 바벨탑. 인간의 오만함에 대한 경고이자, 예상치 못한 외부의 충격과 낡은 기반의 필연적인 붕괴를 상징합니다.",
          sit: "<p>당신이 절대 무너지지 않을 것이라 믿어 의심치 않았던 안전한 현실, 인간관계, 혹은 낡은 가치관이 예기치 못한 외부의 거대한 사건으로 인해 송두리째 뒤흔들리고 있습니다.</p><p>예측할 수 없는 충격적인 파동이 당신의 삶을 강타하며, 꽁꽁 숨겨져 있던 불편한 진실이나 오랫동안 곪아있던 문제들이 수면 위로 산산조각 나며 터져 나오고 있는 아비규환의 상태입니다.</p>",
          adv: "<p>불기둥이 솟구치며 이미 무너지기 시작한 탑을 두 팔로 억지로 버텨내려 헛된 힘을 쓰지 마십시오. 모래 위에 세워진 썩은 토대는 부서져 내리는 것이 자연의 순리입니다.</p><p>고통스럽겠지만 파괴의 소용돌이를 기꺼이 받아들이십시오. 지금의 붕괴는 당신을 파멸시키려는 것이 아니라, 잔해 속에서 진정으로 단단하고 위대한 성벽을 다시 쌓아 올릴 기회를 주기 위한 우주의 자비입니다.</p>",
          out: "<p>거짓으로 점철되어 있던 불안한 안정감은 흔적도 없이 완벽하게 붕괴하여 재가 됩니다. 피할 수 없는 아픔을 겪지만, 그 파멸의 가장 어두운 끝자락에서 기적이 일어납니다.</p><p>당신은 비로소 눈을 가리던 거짓의 장막을 시원하게 벗어던지고, 그 어떤 비바람에도 흔들리지 않는 진실되고 단단한 새로운 삶의 토대를 가장 견고하게 다시 세우게 될 것입니다.</p>" },
        { num: "XVII", name: "The Star (별)", img: "https://sacred-texts.com/tarot/pkt/img/ar17.jpg", type: "Air",
          sym: "밤하늘의 찬란한 큰 별 아래 생명수를 붓고 있는 벌거벗은 여인. 모든 것을 잃은 고난과 파괴(탑) 뒤에 비로소 찾아오는 순수한 희망, 영감, 그리고 우주적인 치유의 에너지를 상징합니다.",
          sit: "<p>당신은 끝이 보이지 않던 길고 어두운 고통의 터널을 마침내 빠져나와, 하늘에서 반짝이는 한 줄기 명백한 빛과 희망을 방금 막 발견한 상태입니다.</p><p>거짓과 두려움의 허물이 모두 벗겨져 영혼이 갓난아이처럼 맑아졌으며, 잊고 살았던 순수한 영감이 뇌리를 스치고 긍정적인 미래에 대한 확신으로 마음속 깊은 상처가 아름답게 정화되고 있는 치유의 파동입니다.</p>",
          adv: "<p>현실적인 계산이나 타인의 시선 때문에 당신의 순수한 열정과 아름다운 꿈을 촌스럽다 여기며 마음속에 숨기려 하지 마십시오.</p><p>마치 우주에 주문을 걸듯, 당신의 확고한 소망을 입 밖으로 내뱉고 긍정적인 에너지를 주변에 투사하십시오. 한 점 의심 없는 당신의 그 맹목적인 믿음이 머지않아 기적 같은 현실을 끌어당기는 강력한 자석이 될 것입니다.</p>",
          out: "<p>영혼을 갉아먹던 상처가 눈 녹듯 완벽하게 치유되고, 오랫동안 가슴속에 품고만 있던 이상적이고 아름다운 소원이 마침내 현실의 캔버스에 그려지게 됩니다.</p><p>특히 당신의 창조성이 극대화되어 예술, 아이디어 기획, 디자인 등 직관과 영감이 필요한 분야에서 타의 추종을 불허하는 반짝이는 훌륭한 성취와 명성을 얻게 될 것입니다.</p>" },
        { num: "XVIII", name: "The Moon (달)", img: "https://sacred-texts.com/tarot/pkt/img/ar18.jpg", type: "Water",
          sym: "희미한 어둠 속에서 달을 향해 짖는 개와 늑대, 그리고 물 밑에서 기어 나오는 가재. 한 치 앞을 알 수 없는 불확실성, 무의식의 깊은 불안, 그리고 눈에 보이지 않는 은밀한 진실을 상징합니다.",
          sit: "<p>당신은 현재 확실한 팩트가 아무것도 주어지지 않아 짙은 안개 낀 숲속을 헤매는 듯한 극심한 혼란스러움과, 정체를 알 수 없는 원인 모를 두려움에 깊이 사로잡혀 있습니다.</p><p>주변 사람의 속마음을 믿을 수 없으며, 누군가의 기만이나 숨겨진 함정이 도사리고 있을지 모른다는 불길한 예감이 끊임없이 당신의 이성을 마비시키고 감정을 갉아먹고 있는 어두운 파동입니다.</p>",
          adv: "<p>시야가 완벽하게 확보되지 않은 칠흑 같은 어둠 속에서는 섣불리 발걸음을 옮기는 행동 자체가 가장 치명적인 독이 됩니다.</p><p>당신의 상상력이 과장되게 만들어낸 환상과 피해망상에 스스로 속아 넘어가지 마십시오. 두려움에 떨며 엉뚱한 결정을 내리기보다는, 안개가 완전히 걷히고 아침 해가 떠오를 때까지 그 자리에 숨죽여 기다리며 차분히 사태를 관망하십시오.</p>",
          out: "<p>당신을 옥죄던 거짓된 환상과 모호한 기만의 그림자가 시간이 지남에 따라 아침 햇살에 증발하듯 말끔히 걷히고 진실이 백일하에 드러나게 됩니다.</p><p>미치도록 불안했던 혼란의 시기를 무사히 견뎌낸 당신은, 인간의 얄팍한 속임수를 꿰뚫어 볼 수 있는 무의식의 깊고 강력한 지혜를 얻어 다음 단계의 삶으로 안전하게 진입하게 될 것입니다.</p>" },
        { num: "XIX", name: "The Sun (태양)", img: "https://sacred-texts.com/tarot/pkt/img/ar19.jpg", type: "Fire",
          sym: "만개한 해바라기 밭에서 백마를 타고 두 팔 벌려 환호하는 발가벗은 어린아이. 단 1%의 그늘과 의심도 존재하지 않는 가장 순수한 긍정의 힘, 완벽한 치유와 뻗어나가는 생명력입니다.",
          sit: "<p>우주가 내릴 수 있는 가장 강력하고 압도적인 긍정의 에너지가 마치 황금빛 스포트라이트처럼 당신의 온몸을 휘감고 있습니다.</p><p>가슴을 짓누르던 모든 불안과 먹구름 같은 그림자가 완벽하게 걷혀나갔으며, 도저히 풀리지 않던 얽힌 상황의 실마리가 명백하게 풀리면서 주체할 수 없는 활력과 태양 같은 자신감이 가슴속부터 가득 차오르는 인생 최고조의 파동입니다.</p>",
          adv: "<p>이제 남은 미련과 불필요한 의심의 스위치를 완전히 꺼버리고 쏟아지는 빛을 향해 당당하게 두 팔을 벌리고 걸어 나가십시오.</p><p>복잡하게 머리를 굴리거나 타인의 눈치를 볼 필요가 전혀 없습니다. 벌거벗은 어린아이처럼 티 없이 순수하고 뻔뻔할 정도로 솔직한 마음으로 당신의 열정과 에너지를 밖으로 폭발시킬 때 모든 문제가 거짓말처럼 녹아내립니다.</p>",
          out: "<p>당신을 시기하던 자들마저 박수를 치며 축복할 수밖에 없는 완벽하고 눈부신 기적 같은 성공을 거머쥐게 됩니다.</p><p>떨어졌던 건강의 완벽한 회복, 운명적인 연애의 결실, 그리고 쏟아지는 재물까지. 당신이 바라던 삶의 모든 영역에서 단 하나의 그늘이나 후회도 남지 않는, 타로카드 최고의 찬란한 해피엔딩을 맞이하게 될 것입니다.</p>" },
        { num: "XX", name: "Judgement (심판)", img: "https://sacred-texts.com/tarot/pkt/img/ar20.jpg", type: "Fire",
          sym: "대천사 가브리엘의 거대한 나팔 소리에 차가운 무덤 뚜껑을 열고 일제히 깨어나는 자들. 과거의 기나긴 업보(카르마)에 대한 하늘의 최종적인 판결, 영광스러운 부활과 각성을 의미합니다.",
          sit: "<p>오랜 시간 동안 묵묵히 결과를 기다려 왔거나, 피와 땀을 쏟아부으며 바쳐온 일에 대한 절대자의 최종적인 결과 발표가 임박해 있는 숨 막히는 긴장감의 상태입니다.</p><p>지금껏 당신이 살아오며 타인에게 베풀었던 선의나 이기적인 행동 등 과거의 모든 업보(Karma)가 낱낱이 평가받게 되는, 삶의 궤도를 완전히 뒤바꿀 중대한 운명의 전환점 한가운데 서 있습니다.</p>",
          adv: "<p>마침내 당신이 뿌려둔 과거의 씨앗을 낱낱이 거두어들일 심판의 시간이 다가왔습니다. 그 결과를 두려워하거나 외면하려 숨지 마십시오.</p><p>하늘에서 울려 퍼지는 부활의 나팔 소리를 똑바로 마주하고, 낡고 썩어빠진 과거의 껍질을 과감하게 벗어던진 채 새로운 차원으로 이끄는 부름에 기꺼이, 그리고 당당하게 응답해야만 합니다.</p>",
          out: "<p>만약 당신의 과거가 진실하고 정당한 노력으로 채워져 있었다면, 영혼이 구원받는 듯한 극적이고 압도적인 보상과 축복을 받게 됩니다.</p><p>헤어졌던 인연과의 기적 같은 재회, 포기했던 시험의 합격, 완전히 파산한 줄 알았던 기획의 기사회생 등 이미 죽어 재가 되어버린 줄 알았던 절망적인 상황이 기적처럼 화려하게 되살아나는 경이로운 결말입니다.</p>" },
        { num: "XXI", name: "The World (세계)", img: "https://sacred-texts.com/tarot/pkt/img/ar21.jpg", type: "Earth",
          sym: "성공을 뜻하는 월계수 화환 안에서 자유롭게 춤추는 인물과 네 모서리를 지키는 수호성. 기나긴 여정의 한 챕터가 이룩한 완벽한 완성, 궁극적인 해방, 그리고 위대한 피날레를 상징합니다.",
          sit: "<p>바보(0번)에서 시작되어 험난한 풍파를 뚫고 달려온 당신의 기나긴 인생 여정이 마침내 가장 영광스러운 종착역에 다다랐습니다.</p><p>이리저리 흩어지고 쪼개져 있던 삶의 수많은 퍼즐 조각들이 오차 없이 하나로 완벽하게 꿰맞춰지며, 심리적으로나 현실적으로 더 이상 바랄 것이 없는 완전한 충만함과 우주적 성취감을 뼛속 깊이 느끼고 있는 평화로운 파동입니다.</p>",
          adv: "<p>더 나은 것을 채워 넣기 위해 초조해하거나 다음 단계로 서둘러 건너가려 하지 마십시오. 지금까지 당신이 피땀 흘려 쌓아 올린 찬란한 성취를 그저 온몸으로 즐기고 스스로에게 무한한 찬사를 보내십시오.</p><p>이제 독 안은 가득 찼으니 만족의 지혜를 깨닫고 미련 없이 다음 우주를 향해 나아갈 가벼운 배낭을 준비할 때입니다.</p>",
          out: "<p>단 한 점의 아쉬움조차 남지 않는, 당신이 평생토록 갈망하던 가장 이상적이고 완벽한 형태의 목표를 100% 달성하게 됩니다.</p><p>이는 단순한 하나의 성공이 아니라 삶의 큰 테두리가 완성되는 거대한 피날레입니다. 이 압도적인 완성을 단단한 발판 삼아, 당신은 기존의 세계를 깨고 더 큰 차원의 우주를 향해 다시 자유로운 날갯짓을 시작하게 될 것입니다.</p>" }
    ];

    let selectedCards = [];
    let isProcessing = false;

    const drawCard = (cardEl) => {
        if(isProcessing || selectedCards.length >= 3 || cardEl.classList.contains('selected')) return;
        
        isProcessing = true; 
        cardEl.classList.add('selected'); 
        
        let randomIdx;
        do { randomIdx = Math.floor(Math.random() * MAJOR_ARCANA.length); } 
        while (selectedCards.some(c => c.idx === randomIdx));
        
        const cardData = MAJOR_ARCANA[randomIdx];
        selectedCards.push({ idx: randomIdx, data: cardData });
        
        const overlay = document.getElementById('card-reveal-overlay');
        const revealCard = document.getElementById('reveal-card');
        const revealBack = document.getElementById('reveal-back');
        const revealTitle = document.getElementById('reveal-title');

        revealBack.style.backgroundImage = `url(${cardData.img})`;
        revealTitle.innerHTML = `<span style="color:var(--gold-primary); font-family:serif; margin-right:8px;">${cardData.num}.</span> ${cardData.name}`;

        overlay.style.display = 'flex';
        
        setTimeout(() => { revealCard.classList.add('flipped'); }, 100);

        setTimeout(() => {
            revealCard.classList.remove('flipped');
            overlay.style.display = 'none';
            document.getElementById('draw-count').innerText = selectedCards.length;
            isProcessing = false;

            if(selectedCards.length === 3) {
                isProcessing = true;
                setTimeout(analyze, 400); 
            }
        }, 2200); 
    };

    const analyze = () => {
        document.getElementById('loader').style.display = 'flex';
        const txtEl = document.getElementById('loader-text');
        const msgs = ["아카식 레코드(Akashic Records) 접속 중...", "칼 융(Jung)의 공시성 동기화 모듈 가동...", "과거-현재-미래 파동 좌표 추출 중...", "라이더 웨이트 오리지널 상징 디코딩 중..."];
        let msgIdx = 0; txtEl.textContent = msgs[msgIdx];
        const mInt = setInterval(() => { msgIdx++; if(msgIdx < msgs.length) txtEl.textContent = msgs[msgIdx]; }, 800);

        setTimeout(() => { clearInterval(mInt); renderReport(); }, 3500);
    };

    const renderReport = () => {
        const c1 = selectedCards[0].data;
        const c2 = selectedCards[1].data;
        const c3 = selectedCards[2].data;

        const now = new Date();
        const hash = Math.floor(Math.random() * 999999).toString(16).toUpperCase().padStart(6, '0');
        
        document.getElementById('r-log').innerHTML = `
            <h4>Synchronicity Engine Log</h4>
            <div class="log-item">
                <span class="log-title">1. 공시성(Synchronicity) 파동 캡처</span>
                당신이 카드를 선택한 정확한 순간의 미세 시간값(Time-seed: <span class="log-formula">${now.getTime()} ms</span>)과 무의식적 개입을 수치화하여 퀀텀 엔트로피를 추출했습니다.
            </div>
            <div class="log-item">
                <span class="log-title">2. 아카식 좌표 매칭 완료</span>
                추출된 파동 해시(<span class="log-formula">#${hash}</span>)를 바탕으로 78장의 타로 아키타입 중 당신의 주파수와 가장 완벽하게 일치하는 3장의 메이저 아르카나 카드를 확정했습니다. (신뢰도 99.9%)
            </div>
        `;

        document.getElementById('r-spread').innerHTML = `
            <div class="spread-card">
                <div class="position">CARD 1. 현재의 내면</div>
                <img src="${c1.img}" class="c-img" alt="${c1.name}">
                <div class="c-name"><span style="color:var(--gold-primary); font-family:serif; margin-right:5px;">${c1.num}.</span><br>${c1.name}</div>
            </div>
            <div class="spread-card">
                <div class="position">CARD 2. 운명의 조언</div>
                <img src="${c2.img}" class="c-img" alt="${c2.name}">
                <div class="c-name"><span style="color:var(--gold-primary); font-family:serif; margin-right:5px;">${c2.num}.</span><br>${c2.name}</div>
            </div>
            <div class="spread-card">
                <div class="position">CARD 3. 궁극의 미래</div>
                <img src="${c3.img}" class="c-img" alt="${c3.name}">
                <div class="c-name"><span style="color:var(--gold-primary); font-family:serif; margin-right:5px;">${c3.num}.</span><br>${c3.name}</div>
            </div>
        `;

        document.getElementById('dynamic-results').innerHTML = `
            <div class="r-section">
                <h3>1. 현재 상황과 무의식의 파동</h3>
                <div class="theory-box"><strong>[오리지널 상징 디코딩: ${c1.name}]</strong><br>${c1.sym}</div>
                <div class="result-content">${c1.sit}</div>
            </div>
            
            <div class="r-section">
                <h3>2. 막힌 운을 뚫어줄 핵심 조언</h3>
                <div class="theory-box"><strong>[오리지널 상징 디코딩: ${c2.name}]</strong><br>${c2.sym}</div>
                <div class="result-content">${c2.adv}</div>
            </div>

            <div class="r-section">
                <h3>3. 당신이 마주할 최종적인 미래</h3>
                <div class="theory-box"><strong>[오리지널 상징 디코딩: ${c3.name}]</strong><br>${c3.sym}</div>
                <div class="result-content">${c3.out}</div>
            </div>
        `;

        // 🤫 대표님이 요청하신 완벽한 맞춤형 스텔스 링크 로직 
        let link = 'https://link.coupang.com/a/evfQxG'; // 공기(Air) 속성: 도어벨
        let adviceTitle = '정체된 운의 흐름을 깨워줄 맑은 파동의 도어벨 풍경 ↗';
        let adviceText = '타로가 보여준 긍정적인 변화의 바람을 집안으로 들이기 위해서는 공기의 흐름을 만들어주는 것이 중요합니다. 현관이나 창가에 맑은 소리를 내는 풍경이나 도어벨을 달아, 정체된 에너지를 흩뿌리고 새로운 행운의 주파수를 맞이해 보세요.';
        
        if (c3.type === 'Fire' || c3.type === 'Earth') {
            link = 'https://link.coupang.com/a/evfOYV'; // 불/흙 속성: 금전수 화분
            adviceTitle = '재물운의 뿌리를 튼튼하게 내려줄 시크릿 금전수 화분 ↗';
            adviceText = '타로가 제시한 강력한 성공과 재물 파동을 현실로 굳히기 위해서는 생명력 있는 흙의 기운이 필요합니다. 금전운을 상징하는 싱그러운 식물을 곁에 두어, 당신의 야망이 흔들림 없이 깊게 뿌리내리도록 공간의 밸런스를 잡아보세요.';
        } else if (c3.type === 'Water') {
            link = 'https://link.coupang.com/a/evfSDt'; // 물 속성: 핑크솔트 조명
            adviceTitle = '예민해진 감정을 정화해 줄 따뜻한 히말라야 핑크솔트 조명 ↗';
            adviceText = '타로가 짚어낸 예민해진 무의식과 감정의 소용돌이를 다스리기 위해서는 따뜻한 정화의 에너지가 필수적입니다. 잠들기 전 은은한 빛을 내는 천연 소금 조명을 켜두어, 외부의 탁한 기운을 흡수하고 당신만의 안전한 영혼의 은신처를 완성해 보세요.';
        }

        document.getElementById('cta-area').innerHTML = `
            <div class="luck-advice">
                <h4>💡 타로의 파동을 현실로 굳히는 스텔스 개운법</h4>
                <p>${adviceText}</p>
                <a href="${link}" target="_blank" class="link-luck">${adviceTitle}</a>
                <p style="margin-top: 15px; font-size: 0.75rem; color: rgba(255,255,255,0.2);">* 파트너스 활동을 통해 소정의 수수료를 제공받을 수 있습니다.</p>
            </div>
        `;

        document.getElementById('loader').style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        window.scrollTo(0,0);
    };

    const shareLink = async () => {
        const url = 'https://chomibinine.github.io/destinyroot/tarot/';
        const shareData = { title: '운명뿌리 - 타로 리딩', text: '의식과 무의식을 꿰뚫는 정통 타로 리딩으로 당신의 숨겨진 미래를 확인해보세요.', url: url };
        
        if (navigator.share) {
            try { await navigator.share(shareData); } catch (err) { console.error(err); }
        } else {
            const dummy = document.createElement('input'); document.body.appendChild(dummy);
            dummy.value = url; dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy);
            alert('사이트 주소가 복사되었습니다. 지인들에게 널리 퍼트려주세요.');
        }
    };

    return { drawCard, shareLink };
})();
</script>
</body>
</html>
