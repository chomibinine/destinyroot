<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 타로 리딩</title>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-base: #030509; --gold-primary: #d4af37; --gold-light: #f9e596; --text-muted: #9aa4b2; --border-glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
        body { background: var(--bg-base); color: #fff; line-height: 1.7; min-height: 100vh; position: relative; overflow-x: hidden; }
        
        /* 🌌 몽환적인 보라/골드 오로라 배경 */
        body::before { content: ''; position: absolute; width: 350px; height: 350px; background: rgba(138, 43, 226, 0.15); filter: blur(120px); top: 5%; left: -100px; z-index: 0; }
        body::after { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(212, 175, 55, 0.08); filter: blur(100px); bottom: 10%; right: -50px; z-index: 0; }
        
        .app-container { max-width: 750px; margin: 0 auto; padding: 50px 20px 120px; position: relative; z-index: 1; }
        
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1.5px; margin: 0; background: linear-gradient(180deg, #fff 0%, #a1a1a1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-muted); margin-top: 10px; font-size: 1rem; font-weight: 300; }
        
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: 24px; padding: 40px 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); margin-bottom: 25px; transition: all 0.3s ease;}
        
        /* 🃏 타로 카드 덱 UI (22장 대응) */
        .tarot-instruction { text-align: center; margin-bottom: 30px; font-size: 1.1rem; color: var(--gold-light); font-weight: 600; line-height: 1.6;}
        .card-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 30px; perspective: 1000px;}
        .tarot-card { 
            aspect-ratio: 1 / 1.6; background: linear-gradient(135deg, #1a1a2e, #0f0f1a); 
            border: 2px solid rgba(212,175,55,0.4); border-radius: 8px; cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, border-color 0.3s;
            background-image: repeating-linear-gradient(45deg, rgba(212,175,55,0.05) 0px, rgba(212,175,55,0.05) 2px, transparent 2px, transparent 8px);
            display: flex; justify-content: center; align-items: center; position: relative;
        }
        .tarot-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(212,175,55,0.3); border-color: var(--gold-primary); }
        .tarot-card.selected { transform: translateY(-15px) rotateY(180deg); pointer-events: none; border-color: var(--gold-light); background: rgba(212,175,55,0.1); }
        .tarot-card.selected::after { content: "✓"; position: absolute; transform: rotateY(180deg); color: var(--gold-light); font-weight: 800; font-size: 1.5rem;}
        
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 18px; border-radius: 30px; font-weight: 800; font-size: 1.15rem; cursor: pointer; border: none; width: 100%; transition: 0.2s; margin-top: 10px;}
        .btn-primary { background: var(--gold-primary); color: #000; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); margin-top: 15px;}
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
        
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,5,9,0.98); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .orbit { width: 60px; height: 60px; border: 2px solid var(--gold-primary); border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 📄 리포트 뷰 */
        #report-view { display: none; }
        
        /* 💡 공시성 로그 박스 */
        .log-box { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(138, 43, 226, 0.3); border-radius: 16px; padding: 25px; margin-bottom: 50px; font-size: 0.95rem; color: #a1b0c0; line-height: 1.8; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .log-box h4 { color: #b388ff; margin-bottom: 15px; font-size: 1.1rem; border-bottom: 1px dashed rgba(138, 43, 226, 0.3); padding-bottom: 10px; font-weight: 800; }
        .log-item { margin-bottom: 15px; }
        .log-title { color: #fff; font-weight: 700; display: block; margin-bottom: 4px; }
        .log-formula { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 5px; font-family: monospace; overflow-x: auto; color: var(--gold-light);}

        /* 3카드 스프레드 시각화 (이미지 추가) */
        .spread-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 50px; }
        .spread-card { background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass); border-radius: 16px; padding: 20px 15px; text-align: center; }
        .spread-card .position { font-size: 0.85rem; color: var(--text-muted); font-weight: 800; letter-spacing: 1px; margin-bottom: 15px; }
        .spread-card .c-img { width: 100%; border-radius: 8px; margin-bottom: 15px; border: 2px solid rgba(212,175,55,0.5); box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .spread-card .c-name { font-size: 1.1rem; font-weight: 800; color: #fff; line-height: 1.4;}

        .r-section { margin-bottom: 60px; text-align: left; }
        .r-section h3 { font-size: 1.5rem; margin-bottom: 20px; border-left: 4px solid var(--gold-primary); padding-left: 15px; font-weight: 900; color: #fff; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px;}
        
        .theory-box { background: rgba(212,175,55,0.05); padding: 25px; border-radius: 12px; font-size: 1rem; color: var(--gold-light); margin-bottom: 25px; border-left: 3px solid var(--gold-primary); line-height: 1.7; font-weight: 300;}
        .theory-box strong { font-weight: 800; color: #fff; }
        
        .result-content { font-size: 1.1rem; line-height: 1.9; color: #d1d5db; text-align: justify; padding: 0 10px;}
        .result-content p { margin-bottom: 20px; }
        .result-content strong { color: var(--gold-light); font-weight: 800; }
        
        /* 🤫 스텔스 마케팅 CSS */
        .stealth-advice { margin-top: 40px; padding: 35px 25px; border-radius: 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .stealth-advice h4 { color: var(--gold-light); font-size: 1.25rem; margin-bottom: 15px; font-weight: 800; }
        .stealth-advice p { font-size: 1.05rem; color: var(--text-muted); line-height: 1.7; margin-bottom: 25px; }
        .link-stealth { display: inline-block; color: var(--gold-primary); font-size: 1.15rem; font-weight: 800; text-decoration: none; border-bottom: 1px solid rgba(212,175,55,0.4); padding-bottom: 3px; transition: 0.2s; word-break: keep-all;}
        .link-stealth:hover { color: #fff; border-color: #fff; }

        @media (max-width: 600px) { 
            .app-container { padding: 20px 15px 100px; } 
            .header h1 { font-size: 2rem; }
            .glass-card { padding: 30px 20px; }
            .card-grid { grid-template-columns: repeat(5, 1fr); gap: 8px;}
            .spread-grid { grid-template-columns: 1fr; gap: 20px; } 
            .spread-card { display: flex; align-items: center; justify-content: flex-start; padding: 15px; gap: 20px; text-align: left; } 
            .spread-card .position { margin-bottom: 5px; color: var(--gold-primary); font-size:0.8rem;}
            .spread-card .c-img { width: 80px; margin-bottom: 0; }
            .r-section h3 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="orbit"></div>
    <div id="loader-text" style="color:var(--gold-light); font-weight:700; font-size:1.2rem;">아카식 레코드 동기화 중...</div>
</div>

<div class="app-container">
    <div id="input-view">
        <div class="header"><h1>타로 리딩</h1><p>무의식의 파동과 공시성(Synchronicity) 기반 스캔</p></div>
        <div class="glass-card">
            <div class="tarot-instruction">
                해결하고 싶은 고민이나 막막한 상황을 마음속에 깊이 떠올린 후,<br>직관이 이끄는 운명의 카드 <span style="color:#fff; font-size:1.4rem; font-weight:900; margin:0 5px;">3장</span>을 선택해 주세요.
            </div>
            
            <div class="card-grid" id="deck">
                <script>
                    for(let i=0; i<22; i++) {
                        document.write(`<div class="tarot-card" onclick="Tarot.drawCard(this)"></div>`);
                    }
                </script>
            </div>

            <div style="text-align: center; color: var(--text-muted); font-size: 1rem; margin-top: 20px;">
                선택한 카드: <span id="draw-count" style="color: var(--gold-primary); font-weight: 900; font-size: 1.5rem;">0</span> / 3
            </div>
        </div>
    </div>
    
    <div id="report-view" class="glass-card">
        <div id="r-header" style="text-align:center; margin-bottom:35px;">
            <h2 style="font-weight:900; font-size: 2rem;">정통 타로 딥리딩 리포트</h2>
            <p style="color:var(--gold-light); font-size:1rem; margin-top:8px; font-weight: 300;">과거, 현재, 그리고 당신이 마주할 미래</p>
        </div>
        
        <div class="log-box" id="r-log"></div>

        <div class="spread-grid" id="r-spread"></div>
        
        <div id="dynamic-results"></div>
        <div id="cta-area"></div>
        
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:50px;">
            <button class="btn btn-secondary" onclick="Tarot.shareLink()" style="margin-top:0;">🔗 내 타로 결과 공유하기</button>
            <button class="btn btn-primary" onclick="location.href='../'">🏠 메인 홈으로 돌아가기</button>
        </div>
    </div>
</div>

<script>
const Tarot = (() => {
    // 🔥 메이저 아르카나 22장 (오리지널 일러스트 링크 + 딥 리딩 해설)
    const MAJOR_ARCANA = [
        { num: "0", name: "The Fool (바보)", img: "https://sacred-texts.com/tarot/pkt/img/ar00.jpg", type: "Air",
          sym: "절벽 끝에 서 있으면서도 하늘을 올려다보고 있는 청년과 하얀 강아지. 두려움을 초월한 순수한 믿음을 뜻합니다.",
          sit: "아무것도 확정되지 않은 백지상태, 혹은 완전히 새로운 챕터의 시작점입니다. 과거의 짐을 털어버리고 무한한 가능성을 향해 나아가고 싶은 충동을 느낍니다.",
          adv: "이성의 목소리를 잠시 끄고 직관에 몸을 맡기세요. 실패를 두려워하지 않는 '바보 같은 순수함'이 가장 강력한 무기가 됩니다.",
          out: "당신을 옭아매던 현실에서 해방되어, 예상치 못한 모험과 새로운 인연이 기다리는 길로 접어듭니다." },
        { num: "I", name: "The Magician (마법사)", img: "https://sacred-texts.com/tarot/pkt/img/ar01.jpg", type: "Air",
          sym: "테이블 위의 4원소(지팡이, 성배, 검, 동전)와 무한대 기호. 무(無)에서 유(有)를 창조하는 잠재력과 다재다능함입니다.",
          sit: "문제 해결에 필요한 모든 자원과 능력을 갖추고 있습니다. 아이디어가 넘치고 화술과 매력이 최고조에 달한 파동입니다.",
          adv: "상상만 하던 것을 실행에 옮기십시오. 당신의 기획을 자신감 있게 어필할 때 마법처럼 문이 열립니다.",
          out: "아이디어가 눈에 보이는 성과로 구체화됩니다. 능력을 널리 인정받고 주도권을 쥐는 압도적인 성공입니다." },
        { num: "II", name: "High Priestess (여사제)", img: "https://sacred-texts.com/tarot/pkt/img/ar02.jpg", type: "Water",
          sym: "흑백의 기둥 사이에 앉아 율법서를 든 여인. 표면 이면의 진실과 고도의 직관력을 상징합니다.",
          sit: "겉으로는 평온하지만 수면 아래 미묘한 직감이나 비밀이 존재합니다. 섣부른 행동보다 관망하며 속내를 숨긴 상태입니다.",
          adv: "주변의 조언보다 당신의 '촉(직관)'을 믿으세요. 침묵을 지키고 한 발 물러서서 상황을 예리하게 관찰할 때입니다.",
          out: "숨겨진 진실이 밝혀지며 상황이 자연스럽게 당신에게 유리해집니다. 깊은 정신적 평화를 얻습니다." },
        { num: "III", name: "The Empress (여황제)", img: "https://sacred-texts.com/tarot/pkt/img/ar03.jpg", type: "Earth",
          sym: "풍요로운 자연 속에 앉은 여인과 금성 기호. 만물을 길러내는 무조건적인 사랑과 물질적 풍요를 상징합니다.",
          sit: "감정적, 물질적으로 안정적이고 풍요로운 파동입니다. 노력해 온 일들이 결실을 맺기 시작하는 따뜻한 시기입니다.",
          adv: "경쟁하기보다는 여유를 가지고 주변을 품어 안으십시오. 타인에 대한 배려와 공감이 더 큰 행운으로 돌아옵니다.",
          out: "풍성한 수확을 거둡니다. 일의 성공, 깊은 애정, 금전적 여유 등 기대 이상의 달콤한 결실을 안게 됩니다." },
        { num: "IV", name: "The Emperor (황제)", img: "https://sacred-texts.com/tarot/pkt/img/ar04.jpg", type: "Fire",
          sym: "견고한 돌 의자에 앉아 통제권을 쥔 남성. 감정을 배제하고 질서를 세우는 권력과 확고한 지배력을 상징합니다.",
          sit: "큰 책임을 지거나 상황을 철저히 통제해야 하는 압박감 속에 있습니다. 체계적인 룰을 바탕으로 성벽을 구축하는 단계입니다.",
          adv: "감정에 흔들리지 마십시오. 단호하고 냉철한 리더십으로 모호함을 버리고 확실하게 상황을 통제해야 합니다.",
          out: "흔들리지 않는 확고한 지위를 쟁취합니다. 목표하던 권위나 물질적 기반이 단단하게 구축되어 누구도 넘볼 수 없게 됩니다." },
        { num: "V", name: "The Hierophant (교황)", img: "https://sacred-texts.com/tarot/pkt/img/ar05.jpg", type: "Earth",
          sym: "두 사제에게 축복을 내리는 교황. 전통, 사회적 규범, 그리고 지혜를 전수하는 영적인 멘토를 상징합니다.",
          sit: "소속된 집단이나 사회적 규칙 안에서 안정감을 찾고 있거나, 경험 많은 멘토의 조언이 절실히 필요한 파동입니다.",
          adv: "혼자 튀려 하지 말고 검증된 전통과 시스템의 룰을 따르십시오. 신뢰할 수 있는 멘토나 전문가의 조언을 수용해야 합니다.",
          out: "안정적인 조직에 안착하거나 합법적이고 공인된 계약(결혼, 취업)이 성사됩니다. 올바른 가르침을 통해 크게 성장합니다." },
        { num: "VI", name: "The Lovers (연인)", img: "https://sacred-texts.com/tarot/pkt/img/ar06.jpg", type: "Air",
          sym: "에덴동산의 아담과 이브, 그들을 축복하는 천사. 완벽한 조화, 가치관의 결합, 그리고 중대한 '선택'의 상징입니다.",
          sit: "누군가와의 깊은 교감이나 중요한 파트너십이 형성되고 있거나, 매력적인 두 선택지 사이에서 갈등하는 파동입니다.",
          adv: "이익을 계산하기보다 가슴이 진정으로 설레고 이끌리는 쪽을 선택하십시오. 진심이 통하는 이와 적극적으로 연대하세요.",
          out: "주파수가 맞는 완벽한 파트너를 만나거나 극적인 화해를 이룹니다. 선택에 후회 없이 유대감으로 충만한 결말입니다." },
        { num: "VII", name: "The Chariot (전차)", img: "https://sacred-texts.com/tarot/pkt/img/ar07.jpg", type: "Water",
          sym: "상반된 두 스핑크스가 끄는 전차를 통제하며 돌진하는 전사. 내면의 갈등을 의지로 짓누르고 목표를 돌파하는 투쟁입니다.",
          sit: "복잡한 장애물이 산재해 있지만, 강한 의지력으로 상황을 장악하고 밀어붙이는 전진의 에너지가 지배합니다.",
          adv: "주변을 신경 쓰지 말고 목표만 보고 직진하십시오. 치밀한 계획보다 상황을 돌파하는 흔들림 없는 추진력이 필요합니다.",
          out: "어떤 난관도 부수고 마침내 승리를 거머쥡니다. 경쟁에서 우위를 점하며 의도대로 상황을 완벽히 쟁취합니다." },
        { num: "VIII", name: "Strength (힘)", img: "https://sacred-texts.com/tarot/pkt/img/ar08.jpg", type: "Fire",
          sym: "사자(야성)의 입을 맨손으로 부드럽게 쓰다듬는 여인. 완력이나 억압이 아닌 인내, 포용력, 진정한 내면의 힘을 상징합니다.",

                <img src="${c1.img}" class="c-img" alt="${c1.name}">
            </div>
            <div class="spread-card">
                <div style="flex:1;">
                    <div class="position">CARD 2. 운명의 조언</div>
                    <div class="c-name"><span style="color:var(--gold-primary); font-family:serif;">${c2.num}.</span><br>${c2.name}</div>
                </div>
                <img src="${c2.img}" class="c-img" alt="${c2.name}">
            </div>
            <div class="spread-card">
                <div style="flex:1;">
                    <div class="position">CARD 3. 궁극의 미래</div>
                    <div class="c-name"><span style="color:var(--gold-primary); font-family:serif;">${c3.num}.</span><br>${c3.name}</div>
                </div>
                <img src="${c3.img}" class="c-img" alt="${c3.name}">
            </div>
        `;

        // 심층 해설
        document.getElementById('dynamic-results').innerHTML = `
            <div class="r-section">
                <h3>1. 현재 상황과 무의식의 파동</h3>
                <div class="theory-box"><strong>[오리지널 상징 디코딩: ${c1.name}]</strong><br>${c1.sym}</div>
                <div class="result-content"><p>${c1.sit}</p></div>
            </div>
            
            <div class="r-section">
                <h3>2. 막힌 운을 뚫어줄 핵심 조언</h3>
                <div class="theory-box"><strong>[오리지널 상징 디코딩: ${c2.name}]</strong><br>${c2.sym}</div>
                <div class="result-content"><p>${c2.adv}</p></div>
            </div>

            <div class="r-section">
                <h3>3. 당신이 마주할 최종적인 미래</h3>
                <div class="theory-box"><strong>[오리지널 상징 디코딩: ${c3.name}]</strong><br>${c3.sym}</div>
                <div class="result-content"><p>${c3.out}</p></div>
            </div>
        `;

        let link = 'https://link.coupang.com/a/eu5td7'; 
        let adviceTitle = '✨ 흩어진 긍정 에너지를 모아주는 시크릿 아이템';
        
        if (c3.type === 'Fire' || c3.type === 'Earth') {
            link = 'https://link.coupang.com/a/eu5uLR';
            adviceTitle = '💰 거대한 재물 파동을 현실로 끌어당기는 시크릿 아이템';
        } else if (c3.type === 'Water') {
            link = 'https://link.coupang.com/a/eu5vYe';
            adviceTitle = '🛡️ 예민해진 내면의 파동을 평온하게 보호해 줄 시크릿 아이템';
        }

        document.getElementById('cta-area').innerHTML = `
            <div class="stealth-advice">
                <h4>💡 타로의 파동을 현실로 굳히는 스텔스 개운법</h4>
                <p>타로가 보여준 미래의 흐름을 가장 유리한 쪽으로 확정 짓거나, 잠재된 부정적 에너지를 차단하기 위해서는 당신의 무의식과 주파수가 맞는 소품을 곁에 두는 것이 심리학적으로 매우 큰 도움이 됩니다.</p>
                <a href="${link}" target="_blank" class="link-stealth">${adviceTitle} ↗</a>
                <p style="margin-top: 15px; font-size: 0.75rem; color: rgba(255,255,255,0.2);">* 파트너스 활동을 통해 소정의 수수료를 제공받을 수 있습니다.</p>
            </div>
        `;

        document.getElementById('loader').style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        window.scrollTo(0,0);
    };

    const shareLink = async () => {
        const url = 'https://chomibinine.github.io/destinyroot/tarot/';
        const shareData = { title: '운명뿌리 - 타로 리딩', text: '의식과 무의식을 꿰뚫는 정통 타로 리딩으로 당신의 숨겨진 미래를 확인해보세요.', url: url };
        
        if (navigator.share) {
            try { await navigator.share(shareData); } catch (err) { console.error(err); }
        } else {
            const dummy = document.createElement('input'); document.body.appendChild(dummy);
            dummy.value = url; dummy.select(); document.execCommand('copy'); document.body.removeChild(dummy);
            alert('사이트 주소가 복사되었습니다. 지인들에게 널리 퍼트려주세요.');
        }
    };

    return { drawCard, shareLink };
})();
</script>
</body>
</html>
