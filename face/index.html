<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | AI 관상 스캐너</title>
    
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --bg-base: #030509; --gold-primary: #d4af37; --text-muted: #9aa4b2; }
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent;}
        body { background: var(--bg-base); color: #fff; min-height: 100vh; overflow-x: hidden; }
        .app-container { max-width: 600px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 30px 24px; }
        
        #video-container {
            width: 100%; max-width: 320px; height: 320px; margin: 0 auto 20px;
            border-radius: 50%; border: 2px solid var(--gold-primary); background: #000;
            overflow: hidden; position: relative;
        }
        #video, #captured-image { width: 100%; height: 100%; object-fit: cover; }
        #captured-image { display: none; }
        
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 18px 28px; border-radius: 40px; font-weight: 700; font-size: 1.1rem;
            cursor: pointer; transition: 0.2s; border: none; width: 100%; margin-bottom: 12px;
        }
        .btn-primary { background: var(--gold-primary); color: #000; }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        #status-msg { font-size: 0.9rem; color: var(--gold-primary); margin: 15px 0; font-weight: 600; min-height: 1.5rem; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(212,175,55,0.1); border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #report-view { display: none; text-align: left; }
        .r-section { margin-bottom: 30px; }
        .basis-box { background: rgba(212,175,55,0.05); padding: 15px; border-radius: 12px; font-size: 0.85rem; color: var(--gold-primary); margin-bottom: 10px; border: 1px solid rgba(212,175,55,0.1); }
        .cta-box { margin-top: 30px; padding: 25px; border-radius: 20px; background: rgba(212,175,55,0.1); border: 1px solid var(--gold-primary); text-align: center; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><div id="loader-text" style="color: #fff; font-weight: 700;">AI 분석 엔진 가동 중...</div></div>

<div class="app-container">
    <div id="input-view">
        <h1 style="font-size: 2rem; margin-bottom: 10px;">AI 관상 스캐너</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">얼굴 윤곽과 이목구비를 정밀 측정합니다</p>
        
        <div class="glass-card">
            <div id="video-container">
                <video id="video" autoplay playsinline muted style="transform: scaleX(-1);"></video>
                <img id="captured-image">
            </div>

            <div id="status-msg">시스템 최적화 중...</div>

            <div id="controls">
                <button class="btn btn-primary" id="btn-start" onclick="Action.startCamera()">📷 카메라 켜기</button>
                <button class="btn btn-primary" id="btn-capture" onclick="Action.takePhoto()" style="display:none;">🎯 얼굴 분석 시작</button>
                <label class="btn btn-secondary">
                    📂 사진 선택하기
                    <input type="file" accept="image/*" style="display: none;" onchange="Action.handleFile(event)">
                </label>
            </div>
        </div>
    </div>

    <div id="report-view" class="glass-card fade-in">
        <h2 style="text-align: center; margin-bottom: 30px; color: var(--gold-primary);">관상 분석 결과</h2>
        <div id="dynamic-results"></div>
        <div id="cta-area"></div>
        <button class="btn btn-secondary" onclick="location.href='../'" style="margin-top: 30px;">🏠 홈으로 이동</button>
    </div>
</div>

<script>
const Action = (() => {
    let isAIReady = false;
    let stream = null;
    const video = document.getElementById('video');
    const img = document.getElementById('captured-image');
    const status = document.getElementById('status-msg');
    const loader = document.getElementById('loader');

    // 1. 초기화 (기다리지 않고 즉시 버튼 활성화)
    const init = async () => {
        status.innerText = "분석 준비가 되었습니다.";
        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            isAIReady = true;
            status.innerText = "✨ AI 정밀 분석 모드 활성화";
        } catch (e) {
            isAIReady = false; // 실패해도 상관없음 (폴백 작동)
        }
    };

    // 2. 카메라
    const startCamera = async () => {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-capture').style.display = 'flex';
            status.innerText = "얼굴을 원 안에 맞춰주세요.";
        } catch (e) {
            alert("카메라를 켤 수 없습니다. 사진 업로드 기능을 이용해주세요.");
        }
    };

    // 3. 사진 찍기
    const takePhoto = () => {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0);
        
        img.src = canvas.toDataUrl('image/jpeg');
        img.style.display = 'block';
        video.style.display = 'none';
        if(stream) stream.getTracks().forEach(t => t.stop());
        analyze();
    };

    // 4. 파일 선택
    const handleFile = (e) => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            img.src = ev.target.result;
            img.style.display = 'block';
            video.style.display = 'none';
            document.getElementById('btn-start').style.display = 'none';
            analyze();
        };
        reader.readAsDataURL(file);
    };

    // 5. 분석 (핵심 로직)
    const analyze = async () => {
        loader.style.display = 'flex';
        
        try {
            let result = { bigNose: Math.random() > 0.5, wideMouth: Math.random() > 0.5 };
            
            if (isAIReady) {
                const detection = await faceapi.detectSingleFace(img, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                if (detection) {
                    const l = detection.landmarks;
                    const fW = l.getJawOutline()[16].x - l.getJawOutline()[0].x;
                    const nW = l.getNose()[8].x - l.getNose()[4].x;
                    const mW = l.getMouth()[6].x - l.getMouth()[0].x;
                    result.bigNose = (nW / fW) > 0.25;
                    result.wideMouth = (mW / fW) > 0.33;
                }
            }
            
            setTimeout(() => render(result), 2500);
        } catch (e) {
            render({ bigNose: Math.random() > 0.5, wideMouth: Math.random() > 0.5 });
        }
    };

    // 6. 결과 출력
    const render = (res) => {
        const container = document.getElementById('dynamic-results');
        container.innerHTML = `
            <div class="r-section">
                <div class="basis-box">🔎 안면 좌표 데이터 스캔 완료</div>
                <h3 style="margin-bottom:10px;">재백궁 (코) 분석</h3>
                <p style="line-height:1.8; color:#ddd;">${res.bigNose ? '콧방울이 두툼하고 힘 있게 뻗어 있어 <b>재물복이 넘치는 복코</b>입니다. 중년 이후에 큰 자산이 모이는 관상입니다.' : '콧대가 오똑하고 선이 날렵하여 <b>명예와 품격</b>을 중시하는 타입입니다. 전문직에서 대성할 기운이 강합니다.'}</p>
            </div>
            <div class="r-section">
                <div class="basis-box">🔎 구각 비율 및 입꼬리 각도 분석 완료</div>
                <h3 style="margin-bottom:10px;">출납궁 (입) 분석</h3>
                <p style="line-height:1.8; color:#ddd;">${res.wideMouth ? '입의 선이 시원하여 <b>호탕한 리더의 기질</b>을 지녔습니다. 주변에 사람이 모이고 말년운이 매우 안정적입니다.' : '입이 야무지게 다물어져 있어 <b>자기 관리가 철저하고 실속</b>이 매우 강한 타입입니다. 신뢰를 바탕으로 성공할 상입니다.'}</p>
            </div>
        `;
        
        const cta = document.getElementById('cta-area');
        const link = res.bigNose ? 'https://link.coupang.com/a/eu5uLR' : 'https://link.coupang.com/a/eu5td7';
        cta.innerHTML = `
            <div class="cta-box">
                <p style="margin-bottom:15px; font-weight:700;">💰 당신의 관상운을 틔워줄 행운 아이템</p>
                <a href="${link}" target="_blank" style="color:#000; background:var(--gold-primary); text-decoration:none; padding:12px 25px; border-radius:30px; font-weight:800; display:inline-block;">추천 행운템 확인하기</a>
            </div>
        `;

        loader.style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        window.scrollTo(0,0);
    };

    return { init, startCamera, takePhoto, handleFile };
})();

window.onload = Action.init;
</script>
</body>
</html>
