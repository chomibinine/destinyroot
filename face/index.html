<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>운명뿌리 | 리얼 AI 관상 스캐너</title>
    
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-base: #030509; 
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.08);
            --gold-primary: #d4af37; 
            --gold-light: #f9e596; 
            --text-main: #fff; 
            --text-muted: #9aa4b2; 
            --color-danger: #f85149; 
            --color-info: #58a6ff;
            --color-success: #4ade80;
        }
        
        * { box-sizing: border-box; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; word-break: keep-all; -webkit-tap-highlight-color: transparent;}
        
        body { 
            background: var(--bg-base); 
            color: var(--text-main); 
            line-height: 1.6; 
            font-size: 16px; 
            overflow-x: hidden; 
            min-height: 100vh;
            position: relative;
        }

        body::before { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(88, 166, 255, 0.1); filter: blur(100px); top: 5%; left: -100px; z-index: 0; }
        body::after { content: ''; position: absolute; width: 250px; height: 250px; background: rgba(212, 175, 55, 0.05); filter: blur(80px); bottom: 15%; right: -50px; z-index: 0; }
        
        .app-container { max-width: 600px; margin: 0 auto; padding: 40px 20px 120px; position: relative; z-index: 1; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { 
            font-size: 2.2rem; font-weight: 900; letter-spacing: -1.5px; margin: 0;
            background: linear-gradient(180deg, #fff 0%, #a1a1a1 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header p { color: var(--text-muted); margin-top: 8px; font-size: 1rem; font-weight: 300; }

        .glass-card {
            background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass); border-radius: 24px; padding: 30px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); margin-bottom: 25px;
        }

        .camera-section { text-align: center; position: relative;}
        
        /* 얼굴 윤곽 가이드 */
        #face-guide {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 65%; height: 75%; border: 2px dashed rgba(212, 175, 55, 0.5);
            border-radius: 50% 50% 45% 45%; pointer-events: none; z-index: 10; display: none;
        }

        /* AI 스캔 캔버스 오버레이 (진짜 랜드마크 그릴 곳) */
        #overlay-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 11; pointer-events: none;
        }

        #video-container {
            width: 100%; max-width: 350px; height: 450px; margin: 0 auto 25px;
            border-radius: 20px; border: 2px solid var(--border-glass); background: #000;
            overflow: hidden; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        #video, #captured-image { width: 100%; height: 100%; object-fit: cover; }
        /* 후면 카메라 지원을 위해 JS에서 동적으로 transform 제어 */
        
        #captured-image { display: none; }

        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 16px 28px; border-radius: 30px; font-weight: 700; font-size: 1.05rem;
            cursor: pointer; transition: 0.2s; border: none; width: 100%; margin-bottom: 12px;
        }
        .btn-primary { background: var(--gold-primary); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); }
        .btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }
        .btn-secondary { background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }
        
        /* 📄 리포트 영역 */
        #report-view { display: none; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .r-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border-glass); }
        .r-header h2 { font-size: 1.8rem; color: #fff; font-weight: 800; }
        .r-header .status { color: var(--color-success); font-weight: 600; font-size: 0.9rem; margin-top: 5px; }

        .r-section { margin-bottom: 35px; }
        .r-section h3 { font-size: 1.3rem; color: #fff; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-weight: 700; }
        .r-section h3::before { content:''; display:inline-block; width:4px; height:18px; background:var(--gold-primary); border-radius:2px;}
        .r-content { font-size: 1.05rem; line-height: 1.8; color: var(--text-main); text-align: justify;} 
        
        .basis-box {
            background: rgba(212, 175, 55, 0.05); padding: 18px; margin-bottom: 15px;
            border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.1);
            font-size: 0.9rem; color: var(--gold-light); line-height: 1.6;
        }

        .cta-box { margin-top: 40px; padding: 30px 20px; border-radius: 20px; background: linear-gradient(145deg, rgba(212,175,55,0.1), rgba(0,0,0,0.2)); border: 1px solid rgba(212,175,55,0.2); text-align: center; }
        .btn-coupang { display: inline-flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); color: #fff; font-size: 1.1rem; font-weight: 700; padding: 16px 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; transition: 0.2s; }
        .btn-coupang:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        #loader {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 5, 9, 0.95); z-index: 10000;
            flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        } 
        .spinner { width: 60px; height: 60px; border: 4px solid rgba(212, 175, 55, 0.1); border-top-color: var(--gold-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 30px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); } 
        .loading-txt { color: var(--gold-light); font-size: 1.2rem; font-weight: 600; text-align: center; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .controls { margin-top: 30px; }
        .btn-home { background: var(--gold-primary); color: #000; }
        #model-status { color: var(--text-muted); font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-text" class="loading-txt">AI 비전 모델 구동 중...</div>
</div>

<div class="app-container">
    <div class="header">
        <h1>AI 관상 스캐너</h1>
        <p>실제 얼굴 윤곽선과 이목구비의 물리적 비율 측정</p>
    </div>

    <div id="input-view">
        <div class="glass-card camera-section">
            <div id="video-container">
                <video id="video" autoplay playsinline muted></video>
                <img id="captured-image" alt="분석 사진">
                <canvas id="overlay-canvas"></canvas>
                <div id="face-guide"></div>
            </div>

            <div id="model-status">비전 AI 모델 로드 중 (약 3~5초 소요)...</div>

            <div id="camera-controls" style="display:none;">
                <label class="btn btn-secondary" style="margin-bottom:12px;">
                    📂 앨범에서 사진 가져오기
                    <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="RealAI.handleFileUpload(event)">
                </label>
                <button class="btn btn-primary" id="btn-start-camera" onclick="RealAI.startCamera()">
                    📷 카메라로 직접 촬영
                </button>
                <button class="btn btn-primary" id="btn-capture" onclick="RealAI.captureAndAnalyze()" style="display:none;">
                    🎯 얼굴 리얼 스캔 시작
                </button>
                <button class="btn btn-secondary" id="btn-switch-camera" onclick="RealAI.switchCamera()" style="display:none;">
                    🔄 전/후면 전환
                </button>
            </div>
            
            <div id="post-capture-controls" style="display:none;">
                <button class="btn btn-secondary" onclick="RealAI.retake()">
                    🔄 다시 분석하기
                </button>
            </div>

            <p style="color:var(--text-muted); font-size:0.8rem; margin-top:15px; font-weight:300;">
                * 데이터는 서버로 전송되지 않으며 기기 내에서만 처리 및 폐기됩니다.
            </p>
        </div>
    </div>

    <div id="report-view">
        <div class="glass-card capture-target">
            <div class="r-header">
                <h2>당신의 정통 관상 리포트</h2>
                <p class="status">● 안면 랜드마크 비율 측정 완료</p>
            </div>
            
            <div id="dynamic-sections"></div>
            <div id="cta-container"></div>
        </div>

        <div class="controls">
            <button class="btn btn-home" onclick="location.href='https://chomibinine.github.io/destinyroot/'">🏠 메인 홈으로 돌아가기</button>
        </div>
    </div>
</div>

<script>
/**
 * ============================================================================
 * 🔒 [REAL AI ENGINE] : face-api.js 기반 100% 리얼 안면 물리적 비율 스캐너
 * ============================================================================
 */
const RealAI = (() => {
    let stream = null;
    let isModelLoaded = false;
    let currentFacingMode = 'user';
    const video = document.getElementById('video');
    const img = document.getElementById('captured-image');
    const canvas = document.getElementById('overlay-canvas');
    const loader = document.getElementById('loader');
    const loaderText = document.getElementById('loader-text');

    // 1. AI 모델 로드 (GitHub Raw CDN 이용)
    const loadModels = async () => {
        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/cgarbin/face-api.js@master/weights';
        try {
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
            ]);
            isModelLoaded = true;
            document.getElementById('model-status').style.display = 'none';
            document.getElementById('camera-controls').style.display = 'block';
        } catch (e) {
            document.getElementById('model-status').innerHTML = "<span style='color:var(--color-danger)'>AI 모델 로드 실패. 네트워크 상태를 확인하세요.</span>";
        }
    };

    // 2. 카메라 제어
    const startCamera = async () => {
        if (!isModelLoaded) { alert("AI 모델이 아직 로드되지 않았습니다."); return; }
        const constraints = { video: { facingMode: currentFacingMode } };
        try {
            stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.style.display = 'block';
            video.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
            img.style.display = 'none';
            canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('face-guide').style.display = 'block';
            
            document.getElementById('btn-start-camera').style.display = 'none';
            document.querySelector('label.btn-secondary').style.display = 'none';
            document.getElementById('btn-capture').style.display = 'inline-flex';
            document.getElementById('btn-switch-camera').style.display = 'inline-flex';
        } catch (err) {
            alert("카메라 권한이 필요합니다.");
        }
    };

    const switchCamera = () => {
        if (stream) stream.getTracks().forEach(track => track.stop());
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
        startCamera();
    };

    // 3. 파일 업로드 처리
    const handleFileUpload = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            img.src = e.target.result;
            img.style.display = 'block';
            img.style.transform = 'scaleX(1)';
            video.style.display = 'none';
            document.getElementById('face-guide').style.display = 'none';
            document.getElementById('camera-controls').style.display = 'none';
            analyzeFace(img); // 사진 올라가면 바로 분석 시작
        };
        reader.readAsDataURL(file);
    };

    // 4. 캡처 및 AI 분석 실행
    const captureAndAnalyze = () => {
        if (!stream) return;
        const hiddenCanvas = document.createElement('canvas');
        hiddenCanvas.width = video.videoWidth; hiddenCanvas.height = video.videoHeight;
        const ctx = hiddenCanvas.getContext('2d');
        if (currentFacingMode === 'user') { ctx.translate(hiddenCanvas.width, 0); ctx.scale(-1, 1); }
        ctx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
        
        img.src = hiddenCanvas.toDataUrl('image/jpeg');
        img.style.display = 'block';
        img.style.transform = 'scaleX(1)';
        video.style.display = 'none';
        document.getElementById('face-guide').style.display = 'none';
        document.getElementById('camera-controls').style.display = 'none';
        
        stream.getTracks().forEach(track => track.stop()); stream = null;
        analyzeFace(img);
    };

    // 5. ⭐️ 핵심: 물리적 랜드마크 측정 로직
    const analyzeFace = async (targetElement) => {
        loader.style.display = 'flex';
        loaderText.textContent = "AI 얼굴 랜드마크(68개) 추출 중...";

        try {
            // 이미지/비디오 디멘션 매칭
            const displaySize = { width: targetElement.clientWidth, height: targetElement.clientHeight };
            faceapi.matchDimensions(canvas, displaySize);

            // 100% 리얼 디텍팅
            const detection = await faceapi.detectSingleFace(targetElement, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
            
            if (!detection) {
                alert("얼굴을 명확히 인식할 수 없습니다. 정면에서 밝게 다시 찍어주세요.");
                retake(); return;
            }

            loaderText.textContent = "물리적 이목구비 비율 계산 중...";
            
            // 화면에 인식된 선(Mesh) 쫙 그리기 (박진감 효과)
            const resizedDetections = faceapi.resizeResults(detection, displaySize);
            faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);

            // ⭐️ 물리적 거리/비율 측정
            const landmarks = detection.landmarks;
            const nose = landmarks.getNose();
            const leftEye = landmarks.getLeftEye();
            const rightEye = landmarks.getRightEye();
            const mouth = landmarks.getMouth();
            const jawOutline = landmarks.getJawOutline();

            // 계산 로직 (유클리디안 거리 기반)
            const getDistance = (p1, p2) => Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));

            // [1] 눈썹/미간 (명궁) 판단: 두 눈 안쪽 끝 사이 거리 대비 얼굴 너비
            const innerEyeDist = getDistance(leftEye[3], rightEye[0]);
            const faceWidth = getDistance(jawOutline[0], jawOutline[16]);
            const eyeRatio = innerEyeDist / faceWidth; 
            const isWideEye = eyeRatio > 0.22; // 넓으면 관대함/포용력, 좁으면 예민함/집중력

            // [2] 코 (재백궁) 판단: 코 밑변(Nose bottom) 너비
            const noseWidth = getDistance(nose[4], nose[8]); // 왼쪽 끝 콧방울 ~ 오른쪽 끝 콧방울
            const noseRatio = noseWidth / faceWidth;
            const isBigNose = noseRatio > 0.25; // 25% 이상이면 큰 코(재물운 발달)

            // [3] 입술 (출납궁) 판단: 입의 너비
            const mouthWidth = getDistance(mouth[0], mouth[6]);
            const mouthRatio = mouthWidth / faceWidth;
            const isWideMouth = mouthRatio > 0.35; // 넓으면 호탕함, 좁으면 섬세함

            setTimeout(() => { generateReport({ isWideEye, isBigNose, isWideMouth }); }, 1500);

        } catch (error) {
            console.error(error);
            alert("분석 중 오류가 발생했습니다."); retake();
        }
    };

    // 6. 물리적 결과 기반 리포트 생성
    const generateReport = ({ isWideEye, isBigNose, isWideMouth }) => {
        let mainTrait = 'general';
        const parts = [];

        // 미간/성품 분석
        parts.push({
            pos: "명궁 (미간/눈 사이)",
            basis: `두 눈의 내안각 사이의 물리적 비율이 안면 전체 너비의 ${(isWideEye?'22% 이상':'22% 이하')}로 측정되었습니다.`,
            desc: isWideEye 
                ? "미간이 넓고 탁 트여 있어, 성품이 몹시 관대하고 주변 사람을 감싸 안는 포용력이 돋보이는 관상입니다. 타인의 조력을 받아 크게 발전할 수 있습니다." 
                : "미간이 좁고 촘촘하게 모여 있어, 남들이 놓치는 것을 잡아내는 고도의 집중력과 섬세함, 예리한 분석력을 타고났습니다. 전문직에서 대성할 상입니다."
        });

        // 재물궁(코) 분석
        if (isBigNose) { mainTrait = 'wealth'; }
        parts.push({
            pos: "재백궁 (코/콧방울)",
            basis: `비익(콧방울)의 양 끝단 물리적 거리가 하악골 너비 대비 ${(isBigNose?'발달형(25% 이상)':'슬림형(25% 이하)')}으로 분류되었습니다.`,
            desc: isBigNose
                ? "코끝(준두)과 콧방울이 두툼하게 발달하여 <b>재물운의 저장고</b>가 몹시 큽니다. 금전 감각이 탁월하고 추진력이 강해 자수성가로 큰 부를 거머쥘 수 있는 강력한 재물 관상입니다."
                : "콧대가 슬림하고 날렵하여 세속적인 물욕보다는 <b>자신만의 명예와 고고한 이상</b>을 중시하는 기질이 엿보입니다. 안정적인 저축을 통해 내실을 다지는 것이 유리합니다."
        });

        // 말년/대인관계(입) 분석
        if (!isBigNose && isWideMouth) { mainTrait = 'brows'; }
        parts.push({
            pos: "출납궁 (입/입술)",
            basis: `구각(입꼬리) 사이의 좌우 폭이 안면 하단부 너비 대비 ${(isWideMouth?'대형':'소형')} 구조를 지니고 있습니다.`,
            desc: isWideMouth
                ? "입이 큼지막하고 선이 시원시원하여, 스케일이 크고 호탕한 리더십을 지녔습니다. 밖으로 향하는 에너지가 좋아 말년의 대인관계와 사회적 명망이 뛰어납니다."
                : "입의 형태가 작고 섬세하게 오므려져 있어, 과시하기보다는 내면을 꼼꼼하게 다지고 결정을 신중하게 내리는 <b>철두철미한 실속형 기질</b>입니다."
        });

        // HTML 렌더링
        const wrap = document.getElementById('dynamic-sections'); wrap.innerHTML = '';
        parts.forEach((p, idx) => {
            wrap.innerHTML += `
                <div class="r-section">
                    <div class="basis-box">🔎 <strong>[안면 좌표 데이터]</strong> ${p.basis}</div>
                    <h3>${p.pos}</h3><div class="r-content">${p.desc}</div>
                </div>`;
        });
        
        document.getElementById('cta-container').innerHTML = '';
        document.getElementById('cta-container').appendChild(renderCTA(mainTrait));

        loader.style.display = 'none';
        document.getElementById('input-view').style.display = 'none';
        document.getElementById('report-view').style.display = 'block';
        window.scrollTo(0,0);
    };

    // 🚀 쿠파스 링크 렌더링 (결과 매칭)
    const renderCTA = (mainTrait) => {
        const wrap = document.createElement('div'); wrap.className = 'cta-box';
        let pUrl = 'https://link.coupang.com/a/eu5td7'; let pLabel = '✨ 나의 타고난 인복을 키워줄 행운템 확인하기';

        if (mainTrait === 'wealth') {
